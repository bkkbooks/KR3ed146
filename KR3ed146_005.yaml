body:
  text: 卷五小兒初生去毒開口法小兒初離母體口有液毒形如血塊啼聲一出隨即咽下而毒伏於命門他日發為驚熱瘡疾惡痘等症須於未啼時急用絲綿裹指挖出口內濁穢以清臟腑又方熟軍枳殼歸尾生草各五分紅花桃仁各三分以水濃煎屢屢與食半盅方可食乳此方最能去毒免疾有益無損保嬰備法凡天寒孩兒生下不哭或已哭不響宜急用衣物包裹再用香油紙捻將臍帶艾火炙斷使暖氣入腹漸漸作聲而活倘或先剪斷臍帶氣絶死矣有悶臍生者兒糞門有一膜閉住其氣故不能出聲音當以手微拍之則膜破而能哭如拍之不破以銀簪輕輕挑破或不能挑者急用暖衣緊抱勿令散放用藥水浸其胞衣天寒則加火熱之久則熱氣內鼓其膜自破出聲而蘇初生不啼急看上齶有泡用銀針挑破指裹軟絹拭去惡血或白點但挑破時須低覆兒頭使血往外出切不可使其吞血下喉致生他疾又有馬牙在牙齦上白點如碎米亦急須挑出以墨擦之間日再看再生再挑小兒同母睡時切忌鼻風口氣吹兒囟門恐成風疾小兒四五歲只會叫人不能言語以真赤小豆研末酒調塗於舌下二三次即能説話小兒下地開乳時以胭脂一個雄黃酒浸曬乾將胭脂放在小兒口內擦抹永不生馬牙墊舌此方濟人謂之第一善事兒臍中久不幹以當歸焙研頻敷之臍腫出汁以桔礬黃柏末敷效兒多啼致臍中出血白石脂研末敷之如未愈再以末微炒存性再敷仍不可剝揭前藥必愈小兒初生周身無皮以白米粉干撲之俟皮生乃止兒初生遍體如魚胞如水晶破則水流又生以密陀僧生研撲之內服蘇合丸自愈小兒青盲眼以木賊草白蒺藜各等分研末炒豬肝食稀痘神方用生甘草一寸橄欖一枚劈碎同煎間日服服四五次後大便有黑物解下再服二次共七次即熱毒降也此方吳中沈香谷家行之已不出痘三世勿輕忽之兒科外治疏表法小兒發熱不拘風寒飲食時行痘疹以蔥一握搗爛取汁少加麻油和勻指蘸蔥油摩運兒之心口頭頂背脊諸處每處摩擦十數下運完以厚衣裹之蒙其頭略達微汗但不可令其大汗此法最能疏通腠理宣行經絡使邪氣外出不致久羈營衛而又不傷正氣誠良法也解煩法凡小兒實熱之症及麻症毒甚者其候面赤口渴五心煩熱啼哭焦擾身熱如火上氣喘急揚手擲足一時藥不能及用雞蛋清調緑豆粉貼足心其熱解散不復啼擾開閉法凡小兒風痰閉塞昏沉不醒藥不能入甚至用艾火灸之亦不知痛者蓋因痰塞其脾之大絡截其陰陽升散之隧道也原非死症用生菖蒲生艾葉生薑蔥各一握共搗如泥以麻油好醋同煎四味炒熱布包之從頭頂背胸四肢乘熱往下尉之其疾亦豁然而醋此方不特治小兒凡閉症皆效引痰法凡小兒痰嗽上氣喘急有升無降喉中牽鋸之聲須引而下行用生礬一兩研末少入麵粉蓋生礬見醋即化成水入麵粉取其膠黏故也好醋和作二小餅兩足心布包之一宿其痰自下通脈法凡小兒忽爾手足厥冷此由表邪閉其經絡或風痰阻其營衛又或大病後陽不布和散於四肢速用生薑煨熱搗汁半杯略入麻油調勻以指蘸薑油塗兒手足往下搓挪以通經絡俟熱回以指拭去暖痰法凡小兒胸有寒痰不時昏絶醒則吐出如緑豆粉濃厚而帶青色此寒極之痰前法不能化唯以生附子一枚生薑一兩同搗極爛炒熱一包尉背心及胸前尉完將薑附捻成一餅貼於胃口良久痰自下納氣法凡小兒虛脫大症上氣喘急真氣浮散不得歸元諸藥莫效急用吳茱萸五分酒和作餅封肚臍以帶扎之其氣自順指紋切要論小兒自彌月至於三歲末可以診切非無脈可診蓋診之難而虛實不易定也小兒每怯生人初見無不啼叫呼吸先亂神志倉忙而遲數大小已失本來之象矣診之何益不若以指紋之可見者與面色病候相印證此亦醫中望切兩兼之意也令人抱兒對立於向光之處以左手握兒食指以我右手拇指推兒三關察其形色細心體忍亦唯辨其表裡寒熱虛實足之矣三關部位歌以左手食指寅位為風關卯位大氣關辰位為命關初起風關證未央氣關紋現急須防乍臨命位誠危急射甲通關病勢彰浮沉分表星歌指紋何故乍然浮邪在皮膚未足愁腠理不通名表證急行疏解汗之投忽爾關紋漸漸沉已知入里病方深莫將風藥輕相試須向陽明裡證尋紅紫辨寒熱歌身安定見紅黃色紅豔多從寒里得淡紅隱隱本虛寒莫待深紅化為熱關紋見紫熱之微青色為風古所稱傷食紫青痰氣逆三關青黑禍難勝指紋淡淡亦堪驚總為先天賦稟輕脾胃本虛中氣弱切防攻伐損胎嬰關紋澀滯甚因由邪遏陰營衛氣留食鬱中焦風熱熾不行推蕩更何求紋形主病歌兩頭彎向中指為內為順症為外感風寒治之易其紋彎向大指為外為逆症為內傷飲食治之稍難如水字脾肺不足食塞太陰中氣怯弱脾不運化也腹疼紋入掌中心彎內風寒次第侵紋向外彎痰食熱水形脾肺兩傷陰凡看指紋以我之大拇指側面推兒食指三關切不可覆指而推蓋螺紋有火剋制肺金紋必變色又只可從命關推上風關切不可從風關推出命關此紋愈推愈出其紋先原未透關今誤推而出之大損肺氣真之戒之以上表裡寒熱虛實鑿鑿有鋸但能於臨證時認得此六字分明胸中自有主宰雖不中不遠矣小兒鬥眼黑眼珠呆而不動者是西牛黃五分白附子泡肉桂全蠍炒川芎石膏各一錢白芷藿香各二錢共研末蜜丸如芡實大每服一二丸薄荷湯下小兒痢疾山楂去積補脾茶助陰薑助陽糖助脾去滯使寒熱平調無論虛實久近一日服盡即愈大人倍用屢試神效紅白並治細茶葉山楂炭白糖砂糖各錢半老薑五分煎服若身兼微熱加真曲五分兒不食乳蔥頭乳汁並治兒之小便不通亦分四服即通乃心熱也用大蔥一個切四片以中乳汁半盞同蒸分作四服即能食乳又斷乳方用山梔一個燒存性雄黃硃砂各二分輕粉麝香各一分共為極細末擇伏斷日候兒睡著用麻油調搽兩眉毛上醒來便不食乳不效加黃丹五分神效非常聽其自落勿令小兒知忌見生人夏天不宜並忌逢五七日方名面眉丹小兒誤吞諸物誤吞銅錢多食荸薺核桃銅自化誤吞針生取蛤蟆眼一枚木通煎湯整吞下針自穿眼內從大便出又方韭菜蠶豆同煮食針隨大便出誤吞竹木屑搶喉不下用鐵斧於石上磨水灌之即下誤谷銅鐵者砂仁煎濃汁服即從大便出中諸果毒廣木香水磨汁研入麝香一釐服之即解預防臍風凡小兒下地洗過後用此末擦之每日換尿布時必摻之摻完一料永無臍風等症枯礬二錢半硼砂五分硃砂二分冰片麝香各五釐共為細末摻臍上小兒初發瘧疾名曰胎瘧每日冰糖五錢煎湯飲之雖隔兩日一發者十日必愈或以蟬蛻二兩包與兒作枕睡亦止臍風撮口臍內受風以致面赤喘急啼不出聲其下身必發青筋一道須臾行至腹卻開兩叉遲延心胸難救急用香油燈草火於青筋起處炙三次於兩叉盡處各灸三次臍上灸三次再用紫蘇前胡殭蠶炒各等分水煎俟溫以棉蘸滴口中頻滴以口開為度開口後切勿即令吮乳小兒夜啼因穿蓋過暖過熱所致諺云若要小兒安常帶三分飢與寒取雞屎塗臍中男雌女雄最妙或用犀黃辰砂各五釐和塗舌上立止又符法從略又兒啼符法黃紙朱書貼男左足心女右足心咒同前天火燒太陽之咒小兒疳症面黃腹大不瀉得食易吐名冷疳用丁香七枚為末人乳調蒸三四次薑湯服愈若吐瀉兼者橘紅丁香等分為末蜜丸米湯下苦不瀉而頻吐不止加薑半夏末麵漿糊丸薑湯送下驚風論莊在田曰驚風有急慢兩症急驚屬實熱宜用清涼慢驚屬虛寒宜用溫補二病若霄壤之相隔治法若冰炭之相反諸書多用二藥兼治急慢兩症謬妄太甚貽害無窮不可不審辨也治慢驚風心得神方慢涼之症緣小兒吐瀉得之為最多或瘧久痢久或痘後疹後或因風寒飲食積滯過用攻伐傷脾或秉賦本虛或誤服涼藥或因急驚而用藥攻降太甚或失於調理皆可致此症也其症神昏氣喘或大熱不退眼開驚搐或乍寒乍熱或三陽晦暗或面色淡白青黃或大小便清白或口唇雖開裂出血而口中氣冷或瀉利冷阡或完穀不化或四肢冰冷並至腹中氣響喉內痰鳴角弓反張目光昏暗此虛症也亦危症也俗名天吊風虛風慢脾風皆此症也若再用寒涼再行消導或用膽星抱龍以除痰或用天麻全蠍以驅風或用知柏芩連以清火或用巴豆大黃以去積殺人如反掌實可畏也若治風而風無可治治驚而驚亦無可治此實因脾腎虛寒孤陽外越元氣無根陰寒至極風之所由動也治宜先用辛熱再加溫補蓋補土所以敵木治本即所以治標凡小兒一經吐瀉交作即是最危之症若其屢作不止無論痘後疹後不拘何因皆當即用參朮以救胃氣薑桂參熟等藥以救腎氣不唯傷食當即救之即傷寒傷暑亦當即救之蓋其先雖有寒暑實邪一經吐瀉業已全除脾胃空虛倉廩空乏若不急救恐虛痰上湧命在頃刻矣庸醫見之皆誤指為熱為食投以清火去積涼藥立時告變為之奈何與其失之寒涼斷難生活不若失之溫補猶可救療此語發明吐瀉驚風之理最為明透後之君子願無忽諸今將慢驚辨症臚列於後慢涼吐瀉脾胃虛寒也慢驚身冷陽氣抑遏不出也服涼藥之後往往致此慢驚鼻孔煽動真陰失守虛火爍肺也慢涼麵色青黃及白氣血兩虛也慢驚口鼻中氣冷中寒也慢驚大小便清白腎與大腸全無火也慢驚昏睡露睛神氣不足也慢驚手足抽掣血不行於四肢也慢驚角弓反張血虛筋急也慢驚乍熱乍涼陰血虛少陰陽錯亂也慢驚汗出如洗陰虛而表不固也慢驚手足瘛瘲血不足於養筋也慢驚囟門下陷虛至極也慢驚身雖發熱口唇焦裂出血卻不喜飲冷茶水進以寒涼愈增危篤以及所吐之乳所瀉之物皆不甚消化脾胃無火可知唇之焦黑乃真陰之不足也明矣大凡因發熱不退及吐瀉而成者總屬陰虛陽越必成慢驚並非感冒風寒發熱可比故不宜發散急宜培元救本加薑桂以引火歸源必先用辛熱衝開寒痰再進溫補方為得法經驗二方列後逐寒蕩驚湯此方藥性溫暖專治小兒氣體本虛或久病不愈或痘後疹後或誤服寒涼泄瀉嘔吐轉為慢驚清熱散風愈治愈危速宜服此能開寒痰寬胸膈上嘔吐蕩驚邪所謂回元氣於無何有之鄉一二劑後嘔吐漸上即其驗也認明但系虛寒即宜服之不必疑畏也胡椒炮薑肉桂各一錢丁香十粒上四味研為細末以灶心土三兩煮水澄極清煎藥大半茶杯頻灌之接服後方定獲奇效加味理中地黃湯此方助氣補血卻病回陽專治小兒精神已虧氣血大壞形狀狼狽瘦弱至極皆可挽回如法濃煎頻頻與服參天救本之功有難以盡述者按無肉桂處有用桂枝四錢附桂枝亦可代肉桂也熟地五錢焦術三錢黨參當歸炙耆故紙棗仁炒研枸杞各二錢萸肉肉桂炮薑炙草各一錢加生薑三片紅棗三枚胡桃二個打碎為引仍用灶心土二兩煮水煎藥取濃汁一茶杯加附子五分煎水摻入諒兒大小分數次灌之如咳嗽不止者加蓿殼一錢金櫻子一錢如大熱不退加白芍一錢泄瀉不止加丁香六分只服一劑即去附子只用丁香七粒隔二三日只用附子二三分蓋因附子大熱中病即宜去之也如用附子太多則小便閉塞不出如不用附子則沉寒臟腑固結不開如不用丁香則瀉不止若小兒虛寒至極附子又不妨一二錢此所謂神而明之存乎其人用者審之此方乃救陰固本之要藥治小兒慢驚稱為神劑若小兒吐瀉不至已甚或微見驚搐胃中尚可受藥吃乳便利者並不必服逐寒蕩驚湯只服此藥一劑而風定神清矣如小兒尚未成驚不過昏睡發熱不退或時熱時止或日間安靜夜間發熱以及午後發熱等症總屬陰虛均宜服之若果系實火必大便閉結氣壯聲洪且喜多飲冷茶水若吐瀉交作則非實火可知矣此方補造化陰陽所不足實回生起死有神功倘大虛之後服一劑無效必須大劑多服為效近來所賣之抱龍牛黃等丸皆清熱化痰之藥急驚最為對症若慢驚之甚者下喉即死慎之慎之以上見福幼編此方自乾隆丁酉至今九十餘年愈人甚多醫案詳載福幼編內謙再附自驗一條俾閲者堅信以祛疑惑無致貽誤也餘子同治八年九月尚未周歲適患咳嗽發熱泄瀉醫用發散清熱消導之劑罔效因友處得福幼編商於醫欲進加味理中湯醫阻不可愈治愈危腹中氣響鼻煽口撮兩目上視喉中痰鳴敗症現矣命在須臾孰思小便清白泄瀉多日定屬陰虛仍用桂附補劑因未一周自擬熟地等稍減煎服而敗症全除泄瀉漸止次日減去附子三劑全愈足見庸醫誤人若不自主豈能得生附記方後俾後之君子詳明虛實則不為庸醫所誤耳伯謙識如鄉村製藥不及急取雞鴨窩要養雞鴨數十年者糞泥下淨土一撮去糞教寸者不要有糞煎水服立愈屢試如神謹按雞屬巽巽屬風亦從治之法也急驚治論聶久吾曰急驚之候身熱而赤搐溺上視牙關緊硬口鼻中熱氣痰涎潮壅忽然而發發過容色如故有偶因驚嚇而發者有不因驚嚇而發者然多是身先有熱而後發驚搐未有身涼而後發者也此陽症也蓋熱生於痰痰盛生驚生風宜用涼劑以除熱而化其痰則驚風自除矣切不可用辛燥驅風之藥反助心火而為害也當其搐搦大作時但可扶持不可把捉恐鳳痰流入經絡或至手足拘攣也又不可驚惶失措輒用艾火灸之燈火燒之此陽症大不宜於火攻曾見有火攻而壞事老矣戒之戒之此症雖急若從容服清涼之劑調理自可平安不可聽信時醫峻用攻擊如巴豆輕粉之類以取速效傷害不小古諺云急驚風慢慢醫此邇言言之切當而可用者也幼兒將要出痘有發熱二三日全無痘點形影而忽然驚搐狀與驚風一樣醫者不知而誤作驚風施治若以寒涼之劑或以驅痰峻藥下之必致難救遇有此症宜留辨別以免誤事清熱鎮驚湯連翹去心研柴胡地骨皮龍膽草鉤藤黃連梔仁炒黑酒芩麥冬去心木通赤苓去皮車前子枳實炒各四分甘草薄荷各二分滑石末八分燈心一團淡竹葉三片水煎分數次服凡急驚初起宜服此劑如服後痰熱未除者以後二方隨用一方泄一二次即愈若此方已效後方即不必服加減涼膈散連翹酒芩梔仁炒黑枳實炒前胡各五分大黃酒炒一錢薄荷甘草各二分水煎分數次服泄一二次痰熱自退已泄則不必服宣風散陳皮去白為末檳榔末各五錢甘草末二錢半黑牽牛四兩半生半炒取頭末一兩二錢五分共和勻一歲以下服三分二步以上服五分五歲以上服七分俱用蜜水調服微泄一二次為妙已泄則不必服已上見活幼心法又方甜杏仁六粒黃梔子七個上藥研爛加燒酒雞蛋清白乾面量兒年歲作丸如元宵樣之大小置於手足二心布條扎緊一周時手足心均青藍色則病已除但須切記男左女右不可錯置是所至要真有起死回生之功又方慢驚風亦可治用白絲毛雞烏骨絲耳又名白鳳凰多出江西泰和縣以雞尾糞門向小兒肚臍上無風雞則遠去有風雞必貼緊吸拔風毒少時即愈神效之至愈後須用麻油灌入雞口以解其毒又方通治急慢驚風辰砂輕粉各一錢殭蠶七條全蠍三個共研細用青蒿節內蟲九月中節內之紅蟲者是搗和為丸如緑豆大臨用取一丸研細入乳調服痘症總論莊在田曰諺云走馬看痘症極言其變症之速也經云痘稟於陰而成於陽譬之種豆亦必天氣陽和地土溫暖方能發生人身之痘亦由是也痘之將出全仗真陽托送斯時培補氣血尚且不暇何堪克削無如近代痘師但見發熱便用寒涼無非連翹大黃及一切涼藥元氣乍虧痘瘡立陷又云痘之一症有神司之某家子本好痘轉瞬間換為壞痘而斃如果神欲殺之當其初何不即與以壞痘先與以好痘而換為壞痘神何心哉委因不知培補妄行攻伐此立時造變之明徵也走馬看痘症痘神換壞痘此二語舉世相傳迷而不語縱更換醫師亦總是寒涼克削愛女嬌兒必驅之於萬不能生而後己或亦生民之厄也言念及此不禁為斯世斯人痛哭耳余性嗜岐黃身試既久乾隆丙申侄孫女染患慢驚為中州庸醫誤用黃連致斃聞信之下深為惻然旋於丁酉著得福幼編專治慢驚一症彼時胞客鈞為南陽大守當付梓人行世收效此書遂傳嗣見痘殤者甚多不勝扼腕遂考究痘症一門二十年來博覽群書竟得箇中祕訣臨危治愈頗獲其效萬無一失治痘之法宜溫補兼散治疹之法宜養血兼散二症俱忌寒涼削導所謂祕訣者如是而已竊取先哲名言與鄙見相符者集成一帙願後之得此書者不致為庸醫所誤依方療治定可以順遂其生爰名之曰遂生編請政方家採擇或活人之一助云爾治法痘科一症順者不必治逆者不能治可治者唯險症耳險症治之得法則生不得法則不生是治法之不可下精也內經未嘗言及今行世諸書皆本之於諸瘡痛癢皆屬於熱八字所以立意先言解毒開方定用寒涼在其父母聞之解毒最為入耳寒涼似亦應然殊不知痘瘡全以發透為吉起發必賴氣血滋培方能自內達外齊苗灌漿結痂無非陽氣為之主也寒涼則血滯克削則氣破血滯氣破毒氣乘虛深入此痘症陷塌之所由來也譬之豬脬即尿胞若欲其脹滿必需以氣充之散其氣立即陷矣此理相同顯而易見痘之始終全憑氣血但得氣血充足則易出易結血氣不足則變症百出痘之欲出陽氣蒸騰小兒發熱正是痘欲見苗斯時氣虛者宜服補中益氣湯血虛者宜服荊防地黃湯兼寒者宜服大溫中飲或大補元煎察其體氣之虛實酌而用之所謂培補氣血疏通經絡無不立奏全功時師不明此理定言用補太早則補住毒氣乃愚陋之見也不知補中即所以托毒灌根即所以發苗萬無補住之理且有散藥在內此實先哲治痘之心傳高明者必以為然淺學者何能窺其萬一要知治痘之法總不外乎虛寒實熱四字何者為虛寒凡小兒向日氣體薄弱面色青黃唇淡畏寒大便溏而不結小便清白飲食減少或不甚消化等症知腹中火少出痘時必難灌漿亦難結痂氣血不足之故是名虛寒速宜培補元陽以防變症也何者為實熱或小兒氣體壯實飲食易消出痘時大便結而燥小便赤而臊口鼻中出氣如火惡熱喜涼等症是名實熱察明果是內熱方可暫行清解荊防地黃湯用生地加大黃一二劑而火退矣然不可以虛火誤認為實火察虛火實火之法全憑大小便為主小便清白大使不燥身雖大熱乃是中宮有寒火無所依浮而在外誤服寒涼亦有此症不得以身熱便認為實火虛火者十中八九實火者數十中之一二耳痘有四宜一宜補氣真陽充足方能送毒出外以成痘倘痘頂不起等症皆元氣不足之故宜服黨參白朮黃耆甘草之類以補之二宜補血真陰充盛方能隨氣到苗以成漿空殼無膿等症皆陰血不足之故宜於補氣藥中加熟地當歸丹參川芎之類以補之三宜補脾腎脾土壯健氣血自充飲食減少口淡無味等症皆脾土虛弱之故須脾腎雙補即於前氣血藥中加枸札故紙附子肉桂等藥痘瘡自無陷塌泄瀉之患經云虛則補其母此之謂也四宜察虛實小兒飲食有味二便如常不服藥最為穩當設或灌漿不滿燒漿不幹等症必察其氣分血分何處虧虛照症調補不可妄用涼藥必口鼻臭尿臊便結有實火可據者方可暫行清解痘有四忌一忌清熱敗毒胎中陰毒必賴陽氣托送方能發出陽氣被清陰毒內歸痘之塌陷實由於此是連翹生地黃芩澤瀉等藥非有實火者萬不可用二忌克伐氣血氣血充暢痘易成功克削下咽中氣虧而毒乘虛深入泄瀉塌陷諸症作矣是大黃芒硝山甲山楂等藥在所必禁者也三忌妄投醫藥小孩出痘延醫診治求其有益也豈知近代醫師不分虛實總是涼藥毒輕者幾死毒重者不生是以不如不服藥乎余曰若純用涼藥以治險症但見治斃未見治愈也客猛然省悟而去四忌吞服醫家小丸近代痘師所帶小丸總是巴豆丸彼以為痘是胎毒巴豆下行自必可以瀉去之豈知中虛下陷性命休矣小丸數粒斷非溫補氣血之藥即抱龍牛黃等丸亦與痘症大有妨礙是以最不可誤服親友處受此害者甚多目擊心傷故特表而出之耳至於前人所制人牙散獨聖散雞冠血桑蟲之類逼毒外出旋即收陷皆非正理何曾見其治愈一人斷不可用發熱痘者胎中之陰毒也必賴陽氣以成之小兒出痘大約發熱三日肌肉鬆透然後能見點苗齊熱退乃真陽內伏交會於陰復發熱三日是運水到苗以成清漿漿足熱退及至養漿真陽外出發熱三日化毒以成膿膿成熱退而陽伏毒既化膿又必發熱蒸乾方能結痂癡落後真陽外出蒸化斑點謂之燒斑倘有黑斑乃是火衰並非因吃鹽醬之故所謂痘稟於陰而成於陽也如此治痘之法始終當以補氣血扶陽氣為第一義用藥以溫補少加發散為首務否則氣不足則痘頂不起火不足則漿水不稠且恐厥逆腹痛陰寒起而壞症作矣或問曰痘宜溫補此理其明若兼發散豈不傷氣不知純用散藥汗多則傷氣少加發散藥於溫補藥中則血脈疏通痘瘡易出無壅滯之患受解散之功所以古方補中益氣湯內有升麻柴胡大溫中飲內有麻黃溫中補氣尚用散藥可見古人用心之妙痘之初出是斷不可減去散藥者也或又問曰痘宜溫補兼散此理已明後開大補元煎六味回陽飲此二方重用附桂並無散藥兼用龍骨粟殼收澀之藥其義何取不知溫補兼散乃治尋常痘瘡之法更有一種小兒發熱一二日即遍身出痘古書無方時師袖手此乃陰毒太重陽氣太虛陰毒一發陽氣已消故瀉痢不止瀉出之物作青黑色肝氣所化胃氣將竭之兆速宜大補元煎六味回陽飲二方大劑連進可以扶元陽可以消陰毒操起死回生之功有鬼神莫測之妙二方合煎名返魂丹治痘收效指不勝屈至於清火解毒涼藥必察明果有實火者方可暫用若誤用於齊苗時則水不能升而頂陷若誤用於養漿時則漿不能稠而癢塌癢塌者真火衰也明者當前速宜參熟並用附桂同煎脾腎雙補大劑疊進尚可挽回否則寒戰咬牙吐瀉交作不可為矣至於身涼而膿不幹痂落而斑不化及痘後發毒皆因誤服生地銀花澤瀉連翹等涼藥之故不可不知熱有邪正必當體察正熱者陽氣蒸騰自內達外喜露頭面不惡寒時熱時止兼有小汗手足溫和飲食有味二便如常所謂內外無邪不必服藥邪熱者偶受風寒頭痛惡寒四肢冷而無汗荊防地黃湯內加肉桂一錢一二劑儘可解散表邪而愈古人云熱不可盡除真格言也形色痘以飽滿為形紅活為色頂陷不起是氣虛色不鮮明是血虛宜培補氣血為主真陽虛者乃無紅暈甚至通身皆白身涼不溫宜大補元煎陽回身溫轉白為紅矣又有一種遍身血泡者此非血多乃氣少不能統血故血妄行急當大補元煎陽氣充滿血泡變白而成功矣庸醫不明此理謬言血熱誤用寒涼變症日增形與色外象也必要飲食有味二便如常知其無內病可以不服藥若二便不調飲食不下煩躁悶亂夜中不寧形色雖好亦甚可憂必當察其病情何如小心用藥挽回方妙形色不佳多半是氣體虛寒手足厥冷頭重神疲便清泄瀉等症必當大補元煎兼用附桂若泄瀉不止並當添入龍骨粟殼等藥以收澀之方可回生痘以紅為貴有圈紅噀紅鋪紅之別圈紅者一線紅圈緊附痘根最為佳兆噀紅者痘根血色隱隱散漫亦氣不收之故速宜大補氣血鋪紅者一片平鋪無痘之處亦紅所謂地界不分若兼不惡寒口臭而渴小便臊而短大便燥而結內熱有據宜白虎地黃湯以利之熱退身涼即宜平補不可多劑又有一種錫光痘身涼不溫色白不紅此乃陽虛陰象也宜大補氣血附桂同施氣足陽回痘根紅而漿稠痂結矣又有一種根無紅盤頂含黑水者乃陽氣大虛陰氣凝結亦宜大補元煎兼用桂附黑水化而為膿矣痘有五泡曰水泡膿泡灰泡紫泡血泡痘有五陷曰白陷灰陷血陷紫陷黑陷水泡者皮薄而明經言氣熱生水要知清漿皆水何以不成膿火少故也必當薑桂附子等藥大劑陡進水必成膿若誤用涼藥作瀉後轉為白陷膿泡失治則破流膿水灰泡失治轉為灰陷二症亦宜參熟附桂大劑多進若有小顆粒發出謂之子救母生意在焉血泡者乃氣虛非血熱亦宜大補元陽否則變為血陷紫泡者其症有二紫中帶青者亦因氣虛不能攝血陰血凝結而成其人必身倦惡寒舌苔白飲食不多大小便清白速宜大補元陽否則變為紫陷又有一種紫黑焦枯者乃純陽無陰之症其人必口乾惡熱小便短大便結此實火也宜清涼解毒白虎地黃湯酌和大黃以行之但得線漿尚可望生失治轉為黑陷又有一種小兒因服涼藥腹中作痛嘔吐瀉痢將成慢驚頭面大熱唇焦舌黑亦似實火此乃火不歸元之故實火者二便臊結虛火者瀉利不止全在細心體察方得其真經云有者求之無者求之實者責之虛者責之蓋言萬病皆當體察寒熱虛實醫治痘症可概云實火肆用苦寒克削以斃人性命耶起脹痘至開盤頭面腮頰亦腫謂之起脹至膿成漿足痘回而脹消謂之收脹蓋緣毒氣由內達外此時尚在肌膚之間故腮頰亦隨之而腫逮至膿成漿足毒氣盡化為膿而脹自消亦必脾胃強健方能如此若當起脹而不起脹乃由元氣內虛不能送毒出外之故宜用大補氣血之藥少加發散大補元煎大溫中飲相同服之盤自開而脹自起若痘未開盤而頭面先腫乃元氣大虛此乃虛腫非起脹也其痘必不能起脹亦宜大補元氣腫自消而脹自起又有痘已回而腫不消乃元氣大虛不能攝毒餘毒留於肌肉之間不能盡化為膿所致亦宜大補元煎大溫中飲相間服之餘毒盡化而脹消矣痘書云痘出稠密封眼者有救不封眼者無救此言不確起脹者有救不起脹無救此言甚確封眼者眼弦多痘胭脂水塗之仍可以不封眼起脹者乃元氣大虛何以送毒外出必當大補元煎附子肉桂大劑多進脹起而毒化一定之理也養漿痘之緊要全在養漿漿成則毒化漿不成痘斯壞矣自發熱見點齊苗灌漿無非為養漿而設若顆粒稀疏根盤紅潤精神爽健二便如常乃上等痘也可以不藥倘形色平常全憑用藥助其氣血以養其漿最怕者無熱全仗真陽充足出而用事方能化毒成膿設陽氣不足何以蒸化其毒宜大補陽氣實為上策緊防泄瀉瀉則中虛陽氣一虧毒必內陷定當預為提防補其陽氣助其脾胃漿干痂結而成功矣煎藥方無非補中益氣湯大補元煎之類相同服之萬一失一而世之面麻者皆因不明是理養漿時被庸醫誤用消伐之藥中氣下虧所致若於養漿時大劑溫補氣血充足落痂後斷無面麻之患又有一種小兒痘後滿面潰爛名曰虛陽貫頂又曰發疽經年不愈此乃出痘時誤眼涼藥胃中受寒陽無所依上衝頭頂譬之火爐中以水潑之則熱氣必上衝此理無二速用大補元煎大溫中飲相間服之引火歸元旬日可愈收結收者漿回而脹收也結者膿干而痂結也收結如法其成功矣倘漿回而腫不消膿成而痂不結亦是真陽不足身無熱不能幹漿化毒之故膿漿充足必賴陽氣熏蒸方能結痂陽氣二字豈非痘症始終必需之至寶設此時氣體虛弱不能結痂必相其虛實無非培補氣血無不立見奇功又有一種漿不能幹而生蛆謂之蛆痘總由陽氣不足之故俱宜大補元煎大溫中飲相間服之膿自干而蛆自化痂結而愈痘毒痘本胎毒自內達外若出痘時盡化為膿痘後無餘毒矣當其初總宜培補元陽兼用散藥毒氣方能盡出化而為膿時師用黃芩連翹澤瀉等藥在彼以為涼藥可以解毒豈知痘乃胎中陰毒得陽氣則行得涼藥則滯毒氣因涼藥留滯於肌肉之內痘後所以發為大疽名之曰痘毒皮色不變者居多宜大溫中飲數劑全愈其色紅白相兼半陽半陰症也荊防地黃湯與大溫中飲相間服之數日亦愈倘已潰爛亦以荊防地黃湯與大溫中飲相兼服之計日可愈荊防解其凝結薑桂散其寒涼所以可愈倘時醫見之不分陰陽統言火毒仍用生地連翹銀花等藥以致堅腫不消潰爛不斂清膿淋漓久而下愈漸至泄瀉不食脾胃一敗不斃鮮矣若紅而帶紫者乃陽症也方可以荊防地黃湯愈之大便結者下之然陰症多陽症少痘後並未見有陽症之毒也麻疹經云疹秉於陽而成於陰謂養血滋陰蓋養陰即所以濟陽疹科諸書俱用寒涼斃人多矣疹之將出必發熱五日方能見點宜慎風寒切戒豬油葷腥等物宜服當歸三錢荊芥防風白芍生草各一錢升麻柴胡各三分倘眼紅口渴二便祕結或可少佐清涼若氣體素虛即宜於痘症藥方中求方治之多有鼻中出血又兼作瀉醫師定雲實熱不知委系虛寒速用士磚燒熱尉臍兼服溫散之劑若肆用涼藥逼火上衝必致喉痛不食嘔惡慢驚等症作矣斯時速用大補元煎大溫中飲方可挽回世之庸醫終身不醒可嘆可悲痘症藥方補中益氣湯此乃補氣散毒氣虛者初出痘時服三四劑痘易起發痘頂陷者亦宜服之黨參三錢黃耆二錢白朮錢半炙草一錢當歸二錢陳皮五分升麻三分柴胡三分加薑煎可與荊防地黃湯相間服之荊防地黃湯此方補血散毒血虛者初出痘時服三四劑痘易灌漿與前後各方相間服無所不可荊芥一錢熟地四錢山藥二錢丹皮防風雲苓山萸生草各一錢加生薑三大片為引加黃酒並沖服大溫中飲此方補氣血散寒邪提痘漿散痘毒凡痘頂不起空殼無膿嘔吐泄瀉脾胃不開痘色不紅將欲塌陷速宜煎服並與大補元煎相間大劑連進溫中散寒立時起發功難盡述熟地五錢白朮黨參各三錢山藥黃耆炙草柴胡各二錢麻黃肉桂炮薑各一錢加生薑三片灶心土水煎濃用夏布擰出藥汁少加黃酒多次灌之不可減去麻黃汗多者減之大補元煎此方大補氣血專治痘症誤服涼藥嘔吐泄瀉痘不起發危在旦夕速宜大劑連進不可減去附子與六味回陽飲相間服之立見奇功有鬼神莫測之妙倘二三劑後泄瀉不止酌加附子更加龍骨粟殼各一錢倘泄瀉全止減去附子若附太多則小便閉塞熟地五錢黨參白朮各三錢山藥杜仲棗仁枸杞炙草故紙肉桂各二錢萸肉附子各一錢加生薑三大片好胡桃仁三個打碎為引痘後減去附子只用肉桂數分調理數劑計日可復元六味回陽飲此方大補元陽專治小兒氣血本虛痘瘡自塌或誤服涼藥嘔吐泄瀉將成慢驚危在頃刻速宜服此方倘有轉頭即加入大補元煎之內同煎纍進名返魂丹真仙方也附子炮薑炙草各一錢肉桂二錢當歸黨參各三錢加胡椒末三分灶心土水澄清煎藥或減去附子亦名六味回陽飲以多進為妙白虎地黃湯此方去實火解邪熱專治小兒出痘發熱不退口渴喜冷痘瘡黑陷小便赤臊大便閉結口鼻氣熱等症酌加大黃以行為度若二便清白不喜飲冷身雖大熱乃是虛火仍宜溫補所謂甘溫退大熱不可妄投此藥此乃備而不可輕用方也石膏當歸各三錢生地木通各二錢枳殼生草澤瀉各一錢大黃錢半加燈心為引熱退身涼宜以荊防地黃湯調理之以上見遂生編謹據遂生編治驗載云甚多專治痘科百發百中之良方也謙於庚午臘底有王姓侄將周歲發熱四天見點均白色不起因伊兩子前月間天行痘發相繼而殤故大懼聞豫有妙方親來叩請豫詢其形色情狀囑伊服補中益氣湯及荊防地黃湯相間服之三劑後白色轉紅飽滿漿足至辛未人日痂結全愈辨痘法小孩發熱五指梢及中指冷是痘疹中指熱是傷寒看耳法耳後紅筋痘必輕紫筋起處重沉沉兼青帶黑尤難治用藥精詳和得生認痘法小而充實者名珍珠痘大而飽滿者名大痘四圍起而中陷者名茱萸痘平扁而不起者名蒸餅痘古書所載逆症今治愈甚多是以各書內所云不治之症概不入編免痘入眼如未預防已入眼者用真新象牙磨水點眼其痘自退或取黑狗耳上血一滴點眼內其痘即除牛蒡子搗爛貼囟門則痘不入眼如痘後初開眼有星翳以臘脂泡水沸一日三次三日愈遲治帶疾冬月出痘房中多置炭火以除寒氣使血氣和暢為妙暑月出痘房中多置涼水以收熱氣心自清涼闢穢氣法凡犯房事經水生産穢氣以大棗燒煙解之犯五辛氣者以生薑燒煙解之被死尸氣及癘氣所犯者以大黃蒼朮燒煙解之被酒氣犯者以葛根茵陳燒煙解之若遇風雨時者則燒蒼朮楓樹葉解之若血少而漿難之痘則忌燒蒼朮蓋恐愈燥而漿愈難耳不可不知也痘漿不起凡痘不起或漿起復收急取癲蛤蟆一個將蛤蟆頭對住小兒之口用綢將小兒眼遮住免蛤蟆吐漿入眼離二三寸遠約一頓飯久放去另換一個仍向兒口對之連換三次其毒已被蛤蟆吸盡即灌漿收功此法起死回生之神效痘毒色白其色紅亮者以癰法治之色白者因出痘多服涼藥血寒氣滯以致毒髮色白若再以涼藥服之其毒流走患生不一久則生管成漏漏久必生多骨害人不淺凡遇此症須用小金丹服之神效頭面頸喉凶痘凡痘中有紫黑乾硬獨大無紅暈或疼或不疼者即痘疔也宜挑宜灸否則痘不能起脹行漿必致倒陷不救甚之諸痘未出有於天庭或印堂先現一二顆與別痘異者此痘能閉諸毒急宜以燈火燒之或挑破用口吸盡惡血以明礬二錢胭脂米五錢共為細末敷之方名曰拔疔散以可透發起脹行漿結痂庶無內陷之險也小兒麻症論麻症初起多有咳嗽噴嚏鼻流清涕眼淚汪汪兩胞浮腫身體漸熱二三日或三四日始見點於皮膚之上形如麻粒色若桃花間有類於痘大者唯見形之後形尖稀疏漸次稠密有顆粒而無根暈微起泛而不生漿大異於痘也雖云較痘稍輕而變化則速始終調治俱宜留神總之初起宜先表法透徹最忌寒涼已出時當用清利收散後貴於養血兼雜症者則隨症參治之溫疹症見傷寒也若發於未痘之先為瘙疹月內為爛衣瘡百日內為百瘡發則遍身紅點如粟米之狀乃兒在母腹受熱所致調攝謹慎自能速愈痘方愈而疹隨出蓋痘疹發遍身出疹色赤作癢始如粟米漸成云片因痘後餘毒未盡更兼恣意飲食外受風寒之所致宜疏風清熱為主至疹出多癢色紅赤隱於皮膚中為癮疹乃心火灼於肺經更兼外受風濕而成治宜先散風濕後清熱毒斯得其法皆非麻疹稟諸胎元毒也麻症與傷寒辨發熱之初寒熱往來咳嗽噴嚏鼻塞聲重且流清涕其症與傷寒無異但麻症則眼胞略腫目淚汪洋而浮腮赤噁心乾嘔此為異耳若見此症必是發疹須宜謹風寒節飲食避厭穢戒葷酒忌辛熱用藥表散使肌膚通暢腠理開張或身有微汗則邪從汗解而毒易出耳熱至三日麻當出矣一日出三遍三日出九遍至六日間當出盡矣及出至足頭面將改收靨之處其熱即退疹子漸次收下熱亦漸次而退至八九日麻始收齊而熱乃退盡也若發不出者固危出不盡者亦險出而旋收者更險治之其可緩乎論麻症輕重或熱或退而無他症者輕頭面不出者輕出透三日而後漸收者輕紅活潤澤頭面勻淨頭面勻淨而多者輕紅紫慘暗乾焦不潤者重移熱大腸變痢者重黑暗乾枯一出即沒者難治鼻青糞黑者難治鼻扇口張者目無神光者難治胸高氣喘心前煽動者難治一眼白赤色聲啞唇腫心煩口渴腰腹疼痛口鼻出血人事不清大小便祕狂亂不寧舌苔黃黑口氣腥臭此名閉症毒滯於中而不得出將作內攻最危候也急以清毒解表湯主之若疹能出可救發不出難救方用升麻防風荊芥麻黃連翹牛子桔梗石膏知母黃芩蟬蛻麥冬甘草水煎服一麻症鼻出血者毒重口出血者毒尤重口鼻出血不必止住血出則熱毒解散矣初起手足心如火燒者毒亦重初起失於清解則熱蘊於胃日鼻腥臭必生牙疳毒入大腸則成痼痢發表太過元氣損傷則成疳積若或失治於前其必貽患於後雖明初發之重輕宜顧後來之生死雖謂麻也只詳其前而可不思其後乎感風熱而出麻者俗謂飄麻此皮膚小恙不致傷人只散風清熱而即愈矣小兒初生彌月之內而出麻者俗謂胎麻可不藥而愈麻有四忌一忌葷腥生冷風寒夫穀氣通肉氣滯凡是葷腥俱有滯毒所以忌也果生則難克化物冷則能冰伏冰伏不化毒乃滯留又當忌也若風寒閉塞毛竅不開則毒氣何由出乎此數端者俱不可犯也一忌驟用寒涼麻雖熱症固不宜用辛熱之劑然初熱之際虛實之症未形輕重之勢未見遂驟以苦寒之藥而峻攻之幾何不冰伏其毒而不得出其反至於內攻乎故善治者唯達毒而不郁毒只解毒而不冰毒也一忌誤用辛熱麻本熱症若復投辛熱之藥是猶火上覆加薪也以火助火其毒不愈橫乎然麻症初起之時亦有四肢厥冷者然熱極似寒之故切不可妄認虛寒而妄投以熱藥也即遇天時大寒亦宜置暖室切不可因嚴寒而遂投以辛熱之物以濟腹中之火也一忌誤用補澀毒火之發最要疏通尤嫌補澀蓋疏通則毒得外泄而解補澀則毒滯內留為殃但初發之時症多吐瀉愚夫愚婦急欲止之若誤用參朮砂仁補澀之藥則關門閉盜毒滯於中必作內攻之禍矣麻症治法夫痘為陰毒其勢更緩或死或生尚判之於成漿之日麻為陽毒其熱甚烈若存若沒早定之於方出之時故發熱三日麻當現於皮膚若腠理緊祕風寒嚴束氣滯於中毒凝於內不能出現則毒作內攻須臾告變故痘則慮難成漿麻則懼其不出麻前痘後最為緊要此古今之通議也當發熱三日之間急宜觀形察色審聲辨症以為調治之方如聲重鼻塞肌栗惡寒是為風寒所束宜用加味升麻湯升麻乾葛防風荊芥牛蒡連翹桔梗木通赤芍甘草柴胡黃芩陳皮蟬蛻元參加蔥白水煎熱服令取微汗一二服間其麻即出如大熱熏蒸肌膚乾燥目赤唇紫毛髮焦豎煩渴不安驚狂顛譫二便祕結而出不快者乃熱毒壅盛故也宜用桅子解毒湯桅子黃芩黃連石膏知母牛子連翹升麻柴胡防風赤芍甘草大便祕加酒大黃煩躁加麥冬嗽甚者加杏仁桔梗花粉驚譫用抱龍丸或牛黃丸無汗腠理祕加大黃再用紫蘇煎水令熱氣熏之或用酒遍身擦之然後以被蓋片時其麻即出治風寒閉者亦如是若為穢氣所觸而出不快則用沉香檀香荊芥燒煙燻之又有毒氣本盛元氣又虧而出不快者宜用人參白虎湯臺黨二錢知母一錢半加升麻防風牛子炒芩水煎服孟氏治麻方石膏二兩煅荊芥地骨皮桔梗各八錢赤芍牛子薄荷陳皮枳殼各六錢川貝甘草各四錢紅花三錢乾葛歸尾桑白皮各一錢共為末每服三錢開水下此方能發表透肌清毒活血理肺消痰清胃解結不拘四時皆可服誠治麻之良方也麻發不起凡麻發不透氣喘欲死即用芝麻五合以滾水泡之乘熱熏頭面即發起死回生之妙也又方櫻桃四五斤入瓷瓶內密封埋土中過兩三月俱化為水遇此症危急者取此汁一杯略溫灌下垂死回生經驗無比有志仁人多預製以濟人功德不小萬全湯治小兒感冒發熱無論早晚皆可服之柴胡當歸各五分白芍麥冬各一錢白朮土炒黃芩神麯各三分茯芩蘇葉各二分焦楂三粒甘草一分水煎熱服冬加麻黃一分秋加桔梗三分夏加石膏三分春加青蒿三分有食加枳殼三分有痰加白芥子三分瀉加豬苓一錢吐加白蔻一粒有驚加金銀器各一件同煎照方按時對症服之仙授清火散郁湯白芍一錢白茯苓二錢陳皮甘草法半夏各一分黑山梔白朮土炒柴胡各三分水煎服即愈
