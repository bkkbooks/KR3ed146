body:
  text: 卷二癰疽總論王洪緒曰癰疽二毒由於心生蓋心主血而行氣氣血凝而發毒毒借部位而名治論循經則誤症之根盤逾徑寸而紅腫者謂癰癰發六腑若其形止數分乃為小癤按之陷而不即高雖溫而頂不甚熱者膿尚未成按之隨指而起既軟而頂熱甚者膿已滿足無膿宜消散有膿勿久留醒消一品立能消腫止疼為療癰之聖藥白陷者謂疽疽發五臟故疽根深而癰毒淺根紅散漫者氣虛不能拘血緊附也紅活光潤者氣血拘毒出外也外紅里黑者毒滯於內也紫黯不明者氣血不充不能化毒成膿也膿色濃厚者氣血旺也膿色清淡者氣血衰也未出膿前腠里之間癰有火毒之滯疽有寒痰之凝既出膿後癰有熱毒未盡宜托疽有寒凝未解宜溫既患寒疽酷暑仍宜溫暖如有生熱毒嚴冬尤喜寒涼然陰虛陽實之治迥別閲占方書總覺未詳因暢其旨備莧焉諸疽白陷者乃氣血虛寒凝滯所致其初起毒陷陰分非陽和通腠何能解其寒凝已潰而陰血乾枯非滋陰溫暢何能厚其膿漿蓋氣以成形血以華色故諸疽平塌不能逐毒者陽和一轉則陰分凝結之毒自能化解血虛不能化毒者尤宜溫補排膿故當潰膿毒氣未盡之時通其腠里之功仍不可緩一容一縱毒即逗留一解一逐毒即消散開腠而不兼溫補氣血虛寒何以成膿猶無米之炊也滋補而不兼開腠僅可補其虛弱則寒凝之毒何能覓路行消且毒盛者反受其助猶車粟以助盜糧矣滋補不兼溫暖則血凝氣滯孰作釀膿之具猶之造酒不暖何以成漿造飯無火何以得熟世人但知一概清火以解毒殊不知毒即是寒解寒而毒自化清火而毒愈凝然毒之化必由膿服之來必由氣血氣血之化必由溫也豈可涼乎況清涼之劑僅可施於紅腫癰癤若遇陰寒險穴之疽溫補尚虞不及安可妄行清解反傷胃氣甚至陽和不振難潰難消毒攻內腑可不畏歟蓋脾胃有關生死故首貴止痛次宜健脾痛止則惡氣自化脾健則肌肉自生陽和轉盛紅潤肌生唯仗調和補養氣血之劑若夫性寒之藥始終咸當禁服癰之與疽截然兩途陽症為癰陰症為疽治法迥別世人以癰疽連呼並治貽害無窮然諸名色必由部位而名即如毒生頭頂而有善疒貢發疽之名頸項有落頭對口腦疽之號井泉疽患登心口貼骨疽毒踞環跳馬刀癰生於臉上骨槽鳳患於牙床足心為湧泉之穴臂上癰乃云臂毒諸名由部位以推治法憑白紅而別初起未潰當觀現在之形已潰爛久須問始生之色初發色紅仍施癰藥初生色白當用疽丹各症治法逐列於後使學者辨症而精治焉癰癤治潔陽症凡患色紅腫疼痛根盤寸余者是癰毒發三四日尚未作膿以嫩膏圍外內以醒消丸熱陳酒送下三錢即止其痛夜間得睡次日患皮起皺再服全消如過四五日患將作膿亦以醒消丸與服消其四圍腫硬痛息毒敢此以大變小之法有膿之患頂取咬頭膏貼加以代刀散三錢酒服穿之或刀點分許穿之以洞天膏貼不幾日收功如患盤數寸者患居背心腦後腰腹肚腋陰囊等險之穴用五通丸醒消丸早晚以敗毒湯輪送一次皮皺痛息再服至愈倘潰即用托毒散醒消丸亦早晚輪服如患盤不滿一寸亦紅腫音是癤蟾酥丸梅花點舌丹皆可消腫止痛牙癰牙根肉紅腫痛甚者是刺出毒血取珍珠散吹之內服龍膽瀉肝湯而愈倘牙骨及腮內疼痛不腫不紅痛連臉骨者是骨糟風也倘以癰治則害之矣故治病貴在識症腸癰凡腹內生毒不可藥治者以皂角刺酒煎溫眼一碗其膿血以小便中出水煎亦可牡丹皮散丹皮五錢苡仁一兩瓜蔞仁去油二錢桃仁去皮尖研二十粒水煎服此千金方也又方多服六一散膿血從大便出膿盡即愈至神至隱之方也子癰腎子作痛而不升上外觀紅色者是也遲則成為潰爛致命其未成膿者用枸橘湯一服即愈疔毒按疔瘡名色甚多或大或小或圓長其色或白或黃或紅紫紅緑倘辨別不清以生黃豆令本人嚼之如無豆腥之味即是疔瘡其患甚險其害最速生面目耳鼻之間顯而易見生肩足衣遮之處隱而難知早覺者晨醫夕愈遲知者枉死甚多即明槍易睹暗箭難防之意故婦女而患暗疔直至發覺誤認傷寒致毒攻心走黃不救黃即毒也如頭面手足唇鼻肩臂等處生一泡或紫紅或黃黑者疔也初起刺擠惡血見好血而止取拔疔線插入以膏掩之次日疔毒化膿而愈凡屬疔毒宜服奪命湯又方紫花地丁一兩銀花三兩白礬甘草各三錢煎服各疔俱效有人生紅緑疔已走至乳旁服之立愈真神方也又方白菊花四兩少則不效甘草四錢水二碗酒半碗煎一碗溫服然不如生菊花根葉搗自然汁為妙凡口唇生疔須看大腿彎中如有紫筋用銀針刺出血即俞有人不知疔在何處但唇內癢極須臾半面腫硬痛甚見腿後起有紫筋刺之立效又以五穀蟲一錢焙乾為末加白礬三分蟾酥三分以燒酒化煬共調勻塗疔上破流毒水即愈又方雄雞冠血點上其效如神又方大蛤模一個取肝貼之立消兼治面上生疔對口疔等症疔瘡出血不止飲真麻油一大盅即止或飲菜籽油更妙走黃疔毒發腫神昏謂之走黃如在將昏之際急取回疔散二錢開水送服少刻大痛痛則許救毒化黃水痛止命活或用前菊花飲地丁飲服之或用芭蕉根捶汁服之均妙拔疔根法疔毒重者好而復發此故根未出敵也若不急治再發則根愈深而難治矣萆麻子一粒去油乳香一分去油共搗爛用飯為餅貼之少時疔根自出又方蔥白加蜜捶融將疔刺破敷之如人行五里其根自出又方銀硃水飛曬乾一錢萆麻仁二錢嫩松香五錢黃丹水飛曬乾一錢輕粉五分共搗如泥以銀針將疔頭挑破用此藥作一小丸如黃豆大安別膏藥上不拘何項膏藥當中貼之疔即拔出最為極效並治無名腫毒已破未破不必挑動均照拔疔法用之自能拔毒收功或竹木瓦石入瘡入肉用此貼之自出屢試如神刀鐮疔患形闊如韭菜長有寸余肉色紫黑者是也忌行針刺以生礬三錢蔥白七根共搗爛作七塊蔥湯逐塊送下蓋暖取汗無汗再服蔥湯催之汗出為度取爛雞屎塗患立愈遲則毒歸心腑致命蓋蔥礬二味用熱酒送下再服蔥白湯一盅少頃汗出如淋其病若失此方不但治疔並治一切惡症初起未成膿者更妙紅絲疔手小臂足小腿生如紅線一條者是也要在紅絲兩頭始末刺破毒隨血出而愈遲則毒入腸胃不救或以浮萍嚼塗刺處或用多年屎坑上碎木椽子煅灰研細和飴糖塗刺處隨飲前法蔥礬七塊酒蔥湯下蓋暖汗出即愈其效如神楊梅結毒四君四物合名曰八珍湯此瘡以化毒為貴熏置為忌罨定復發難治初發以三黃九每日五鼓取四錢熱陳酒送服醉蓋取汗或以瀉肝湯每日早晚輪服忌服輕粒升藥則毒留筋骨難以斷根抑且不能生子致傷人命如有因服升藥熏罨復發在五日之內日服三黃丸再取紫銀茶時飲如潰以渣煎湯患處日洗兩度接服聖靈丹可祛毒盡色轉紅活用洞天膏收功如陽物硬而不痿白精流出此乃妒精用破故紙韭菜子各一兩為末每服六錢水一碗煎半碗服如見愈宜以藥剩倘毒重服聖靈丹無不全愈又方羊角胡桃殼俱燒灰存性研細末早晚以酒調服錢半四日後毒從大便出如血如膿漸減作每日一服半月毒盡後服八珍湯以補之膿窠坐板濕毒猴猻疳以五美散和嫩膏調敷外以棉紙掩綁不可動揭五日後揭下再敷一二次全愈如濕毒癢極先以金銀散敷上次以前膏加敷又方松香一兩雄黃一錢為末入竹紙捲成條子用菜油浸一宿取出倒吊燒之滴下油候溫頻塗效流火患生小腿紅腫熱痛不潰不爛治法當以礦灰化於缸水內次日水面定結一層如薄冰者取起以桐油對調膩厚每日拂上三次三四日全愈後不復發醫時忌食豬肉又方馬錢子磨水塗一日一次其痛即止陰頑惡癬以鮮角膏加醋煎至稠膩瓷瓶貯之此症先行剃之剃後以膏塗之日剃日敷俟毒水流盡再敷數次全愈又治癬方雞蛋一個浸米醋內七晝夜其蛋自化治癬時先以山甲刮破患處以化蛋醋絞和搽之三四次自愈漆瘡取杉木屑煎湯溫洗接以蟹黃滑石二末白蜜調敷天泡瘡形如水泡用蓮蓬即蓮房燒枯研末井泥調敷神效又黃水瘡癢而兼痛破流黃水流處即生由脾胃濕熱外藉風邪發於心下者急宜早治以蛤粉一兩煅青黛三錢熟石膏二兩輕粉黃柏各五錢共研細末先用香油調成塊次用涼水調稀塗之並治天泡瘡及鼻中生蟲凍瘡以陽和解凝膏貼一夜可愈潰者貼三張收功又方冬瓜皮茄根煎水洗又方以蚶子殼煅研極細麻油調搽濕則乾摻數日全愈大麻瘋方鎮江丁參領得此祕傳治之全愈又以醫治多人無不取效如神但患此症者眉毛若盡脫落其症難治如眉毛未脫雖手足骨節有塌損者皆可取效若初起未深之症百拭百效也先服湯藥四劑每日一劑服完再服丸藥每丸一錢加楓子膏春秋八釐夏六釐冬一分湯藥方陳皮白芷苦參天麻秦艽川續斷防風荊芥羌活風藤薏仁牛膝當歸海桐皮蒼朮木香桂枝連翹甘草各三錢黑棗二枚生薑一片水二碗煎至一碗服渣再煎二次服丸藥方大胡麻小胡麻白蒺藜各一斤四兩苦參一斤防風荊芥各八兩當歸蒼朮各六兩薏仁續斷牛膝各四兩共研細末水迭為丸每日早午晚三服每服三錢或二錢照數加楓子膏捻圓攪和以毛尖茶送下楓子膏方大楓子去殼取仁銅鍋內炒至三分紅色七分黑色為恰好太過無力不及傷眼炒後研成細膏如紅砂糖一樣用銅勺盛向火上熬四五滾倒在紙上放地上以物蓋之待用如上面黴變拭去照常用一年內切忌房事切忌食鹽犯之不愈並忌食醬酒醋及一切雞魚發氣動風等物又方用粗如酒杯之蛇一條竹刀破腹去雜切寸段取瓦放於炭火上以蛇段豎放瓦上跌倒者系無毒之段棄之不用不倒者有毒用炙存性磨粉拌入飯內覓通身毛毛鴨一隻與食次日鴨毛盡脫以鴨殺之石鍋內煮爛勻作四五日食凡吃鴨第一頓其腫者更腫第二三頓收小吃完愈雖潰爛不堪者亦效此王洪緒經驗方也遊風丹毒身上忽然紅腫遊走無定身熱作癢或痛或不痛或生頭面或生手足丹名總屬心火三焦風邪濕熱而成此症自胸腹起於四肢者順而易治從四肢起於胸腹者宜急治之遲則難治防風升麻梔仁麥冬荊芥木通乾葛簿荷元參牛蒡子甘草各一錢燈心草十莖水煎服大便閉者加大黃枳殼各一錢水煎服忌魚腥雞鵝次用瓷鋒刺去惡血則毒隨血散刺法取瓷器鋒利者一小塊用竹筷破開夾瓷片露鋒於外輕輕敲之其血自出不可刺深傷肉輕者不必刺又方以蚯蚓放碗中加白糖用碗蓋住半日後化水搽之極效或以油菜搗汁塗瘡上隨塗隨消如無油菜時子研汁麻油敷之亦效耳後鋭毒患發汗後又名耳後發宜別陽實陰虛治無一錯色白者以陽和丸與二陳湯同煎服或以小金丹服消如色紅者醒消丸服消驢眼患生腳骨俗呼夾棍疽未潰色白以疽治紅腫以癰治如潰爛日久形如驢眼者莫以臁瘡治當問初起紅白以癰別治魚肚癰有陰有陽患生腿肚此乃肉緊筋橫在一身用力之處最痛難忍外以扎藥扎上內以五通醒消丸二丸每日早晚輪服初起立消以藥咬穿庶不傷筋而無縮腳之損色白者應以疽治扎藥忌用孕婦亦然大癰潰後議凡大癰潰後世人每投炙耆炙草或用半炙半生殊不知托裡散內用人參者並非以參補虛不過以參助耆添其托毒之力卻無補毒之害而炙耆只補氣不能托毒炙草只補中不能解毒倘毒氣未盡誤投炙耆炙草或用保元十全等湯致毒反得補助毒攻內腑余之治法凡遇初潰大癰止其痛痛息則毒散其腫亦退色轉紅活即可無須用參耆補托如須用耆草亦皆用生不用炙也唯體虛年老者投參而耆草則皆炙也如體旺家貧者無參亦易收功爛久不斂如久潰腐爛不堪以洞天救苦丹三服每服三錢陳酒送服醉蓋取汗隔兩日又送一服再隔兩日再送一服所隔之兩日每日以醒消丸三錢陳酒送服服後毒水流盡七日後再服醒消丸兩次接服大棗丸每日早晚各進五錢雖危險者亦可奏效毒氣攻心凡受降藥之毒定致神昏嘔吐此係毒氣攻心急用護心散以生甘草一兩煎濃汁稠調令病者時刻呷咽咽至大半自然止嘔神氣清爽接服醒消以平其勢或飲真麻油一大杯或用白沙糖三四兩開水調服亦可又方取活癩蛤模一隻眼紅腹無八字紋者勿用竹刀破開去腸雜貼心坎上腹脹者並貼肚臍或取蛤蟆肝煎水服之更妙輕者不眼亦可永戒食蛤蟆並治麻斑疹子及一切心腹脹悶或砂症氣閉欲死等症俱極神效陰疽論王洪緒曰陰毒之症皮色皆同然有腫有不腫有痛有不痛有堅硬難移有柔軟如綿不可不為之辨夫腫而不堅痛而難忍流注也腫而堅硬微痛貼骨鶴膝橫痃骨槽等類是也不腫而痛骨骱麻木手足不仁風濕也堅硬如核初起不痛乳岩閫癧也不痛而堅形大如拳惡核失榮也不痛不堅軟而漸大癭瘤也不痛而堅如金石形如升斗石疽也此等症候盡屬陰虛無論平塌大小毒發五臟皆曰陰癰如其初起疼痛者易消重按不痛而堅者毒根深固消之難速治之法方有一定學者覽之瞭然陰疽治法初起之形闊大平塌根盤散漫不腫不痛色不明亮此疽中最險之症倘誤服寒涼其色變如隔宿豬肝毒攻內腑神昏即死夫色之不明而散漫者乃氣血兩虛也患之不痛而平塌者毒痰凝結也治之之法非麻黃不能開其腠理非肉桂炮薑不能解其寒凝此三味雖酷暑不可缺一也腠里一開寒凝一解氣血乃行毒亦隨之消矣是一定而不可移之法照方依治萬無一失倘有加減定難奏效流注發無定處如塊如核漫腫元頭皮色不變或痛或不痛久則破而流走是也若忽然身生疙瘩紅腫遊走名遊風丹毒與此不同不可誤認此症色白腫痛毒發陰分蓋因痰塞清道氣血虛寒凝結一曰寒疾一曰氣毒其初起皮色不異唯腫唯疼身雖其熱內末成膿以二陳湯加陽和丸同煎數服全消消後接服小金丹七丸社其續發如皮色稍變極痛難忍須服陽和湯以止其痛消其未成膿之餘地使其已成膿者漸至不痛而破此乃以大疽變小之法如患頂軟即為穿之膿多白色以陽和膏貼之但此症破後毒痰流走患生不一故初破之後五日內仍服小金丹十丸以杜後患接服犀黃丸陽和湯每日早晚輪服使毒痰消盡不補亦可收功倘孩子不能服煎劑者初起以小金丹化服至消乃止成膿者亦服小金丹消其餘硬之地使患不痛即為穿之俟其毒盡用保元湯耆草宜生忌炙加入肉桂五分日服收功如孕婦患之當問胎懷月數倘將滿六個月犀黃丸有麝香不可服當以陽和湯冶之愈後再服三四劑以代小金丹杜其流走甲疽凡指甲邊生一赤肉突出時常發者甲疽也用四妙膏以封患口日易三度毒消口斂瘰癧患生項間初起一小塊不覺疼癢在皮裡膜外漸大如桃核旁增不一皮色不異以子龍丸每服三分淡薑湯送服每日三次至消乃止倘小孩不善服丸每取小金丹一丸陳酒沖服蓋暖取汗服至消而止數年內忌食香橙食則復發凡瘰癧有潰爛間有成膿未潰者亦有未成膿者須服犀黃丸止其己潰之痛松其成膿未潰之脹消其未成膿之核已成膿者用咬頭膏穿之日服溫補祛痰通腠活血杜氣之劑外貼陽和解凝膏而愈凡瘰癧爛延肩胸脅下極不堪者用荊芥根煎湯洗患處以雄腦散麻油調榻內服洞天救苦丹三服犀黃丸六服服完九日後皮色變白孔內紅活接服大棗丸肌肉漸長用生肌散日敷收功凡瘰癧爛至咽喉如飲熱湯外覺熱痛者乃危險之極遲則爛至咽喉不救急取竹片一根量本人中指量其三指共積若干長短男左女右再就其手下腕骨正中骨頂之處即以所量中指之竹片定準一直量上盡頭乃肘髎穴也以墨記定取艾圓連灸三壯膏掩可保咽喉不穿凡瘰癧大忌並刀橫痃一名魚口便毒在左謂魚口右謂便毒生於小腹兩旁大腿界中形如腰子皮色不異硬如結核按之微痛者是也日取角刺粥時飲三四日全消或以子龍丸每服三分淡薑湯日服三次全愈乃止大忌開刀開則刀口無膿唯出白膩漿三百日內必死白潰者亦然又方五倍子炒黃研末陳醋調勻攤布上布上加紙一層貼之過夜即消潰爛貼之亦效乳岩初起乳中生一小塊不痛不癢症與瘰癧惡核相若是陰寒結痰此因哀哭優愁患難驚恐所致其初起以犀黃丸每服三錢酒送十服全愈或以陽和湯加土貝母五錢煎服數日可消倘誤以膏貼藥敷定主日漸腫大內作一抽之痛已覺遲治若皮色變異難以挽回勉以陽和湯日服或以犀黃丸日服或二藥每日早晚輪服服至自潰用大蟾六隻每日早晚取蟾破腹連雜以蟾身刺孔貼於患口連貼三日內服千金托裡散三日後接服犀黃丸十人之中可救三四潰後不痛而癢極者斷難挽回大忌開刀開則翻花最慘萬無一活男女皆有此症貼骨疽又稱附骨疽若生大腿里側名咬骨疽治法與附骨疽同患在環跳穴生大腿外側又名縮腳疽皮色不異腫硬作痛者是外用白芥子搗粉白酒釀調塗或以大戟甘遂二末白蜜調敷內服陽和湯每日一劑四五服可消消後再服子龍丸或小金丹以杜患根大忌開刀開則定成縮腳損疾骨槽風患在腮內牙根之間不腫不紅痛連臉骨形同貼骨疽者是倘以癰治則害之矣初起最易誤認牙疼多服生地石膏以致成功爛至牙根延及咽喉不救當用二陳湯加陽和丸煎服或陽和湯消之倘遇潰者以陽和湯犀黃丸每日早晚輪服如有多骨以推車散吹入隔一夜其骨不痛自行退出吹至次日無骨退出以生肌散吹入內服保元湯加肉桂歸芎耆草宜生收功而止惡核痰核大者惡核小者痰核與石疽初起相同然其寒凝甚結毒根最深極難軟熟未潰之前忌貼涼膏忌投涼藥唯內服陽和湯犀黃丸可消亦有以大田螺搗爛敷塗消之者大忌開刀開則翻花起槓用大蟾破腹刺數孔連雜蓋患拔毒軟槓內服溫補托毒消痰之劑犀黃丸儘可收功如孕婦丸內有麝香忌之石疽初起如惡核漸大如拳急以陽和湯犀黃丸每日輪服可消如遲至大如升斗仍如石硬不痛又日久患現紅筋則不治再久患生斑片自潰在即之證也潰即放血三日內斃如現青筋者可治內服陽和湯外以活商陸根搗爛加食鹽少許敷塗數日作癢半月皺皮日敷日軟而有膿袋下垂以銀針穿之當用千金托裡散加熟地同生耆各一兩代水煎藥服十劑後以陽和解凝膏滿貼患上空出穿針之眼使其血括若皮膜中似成膿弄用布綁緊使皮膜相連內服大補保元等湯參耆忌炙服至收功如其毒氣未盡忌投補劑失榮生在項間此患多生肩胛以上初起微腫皮色不變日久漸大坐硬如石推之不移按之不動其症與石疽相同急照石疽各方治之患孔毒根爛孔有惡肉凸起名曰毒根往往有用降藥爛去者此乃歐之速斃也獨不知弱體豈可增痛況爛去仍又長出安可再爛余所制平安餅專貼毒根外以陽和解凝膏貼掩一日一易輕者二三日重者六七日不癢不痛毒根自落貼餅時日服托毒散俟毒根落當服保元四物二湯收功陰疽用膏議凡患一應色白大小等疽忌用洞天膏貼嫩膏敷用則寒凝愈結最忌用千捶膏鯽魚膏貼蓋此二膏內皆有巴豆萆麻貼則被其提拔助成每見橫痃乳岩貼至致命孕婦貼則墮胎凡諸疽潰後宜貼陽和解凝膏
