body:
  text: 卷一頭風治一切偏正頭風硫黃一錢川椒炒研三分拌勻熔成小餅左疼塞左鼻使涕從右出右疼塞右鼻使涕從左出若正疼則左右換塞待清涕流過自愈內以茯神抱木者佳搗末湯酒任下二錢數服效又方石菖蒲根搗汁酒沖服效又方雞蛋三個人川芎末三錢和勻炒熟食數次愈又方白芷三錢天麻一錢防風一錢荊芥錢半煎服即愈治頭面發腫豬頭風野苧麻根搗極爛敷之即愈頭風外治神方桑木燒灰淋汁乘熱薰洗諸般頭痛仰臥用生羅卜汁少許注鼻中左疼注左鼻右疼注右鼻頭眩暈倒鮮白果三個研開水沖空心服至重不過五服老少皆治治大頭瘟項腫腮大形如蛤蟆靛青花三錢雞子清一個燒酒一碗共打勻吃下即愈真神方頭痛奇方生薑一片破開入雄黃末於內濕紙包煨乘熱貼太陽婦人血風頭暈欲死倒地不知人事生蒼耳草嫩心陰乾為末每用一錢酒調服神驗此物能通頂門故易奏效也頭面發熱有光彩他人手近之如火燒蔥汁五錢酒調服吐出蟲即安頭面腫大此症名大頭瘟自頸至頂腫成一桶咽喉閉塞急用延胡索錢半皂角川芎各一錢藜蘆五分躑躅花二分半共為末用紙捻蘸藥推入鼻中取嚏日三五次甚效嚏出膿血者更妙無嚏者難治左右看病之人用此取嚏亦不傳染又方蚯蚓十餘條以白糖拌入碗喋蓋好半日即化為水至遲者一日必化用鴨毛蘸水敷之即消百發百中之仙方也如無白糖之處用蚯蚓糞井水調敷亦可須戒殺生發中生癤如珠相染不已此名火珠遲則難治急用生羅卜搗爛好醋泡透敷之此林屋山人經驗方也頭角太陽生瘡當日頭重如山二日即變青紫三日青至心胸而死此症有因好服春方藥而生者有因食煎炒厚味而生者初起用金銀花二斤煎湯飲數十碗方可少解其毒然必潰爛再用金銀花元參各三兩當歸二兩甘草一兩水煎日服一劑七日始可收口又手腳指頭生瘡亦多不救亦可以此法治之頭上軟癤雞肫皮明礬為末麻油調搽又方野芋頭磨醋敷捲毛瘡生頭上如葡萄狀黃柏一兩乳香二錢五分為末槐花煎水調敷抓傷麵皮橄欖核磨水搽之過宿則無痕跡眉上生瘡肥皂燒存性枯礬要燒透各等分為末麻油調塗先用白礬泡水洗淨又方白菜搗塗亦效耳內膿血腫痛有虛有熱其症不一甚至痛不可忍夜難安枕用韭菜自然汁灌入百發百中其效如神耳內膿血不幹石榴花片瓦上焙枯研末加冰片少許吹入三四次即愈其痂不必挖動聽其自落為妙或用龍骨研末吹入亦可耳內如有蟲行或血水流出或干痛難忍用蛇蛻燒存性研末吹之立愈此經驗祕方也耳爛流膿血方陳皮一錢燈草一錢燒灰冰片一分上藥共研勻吹入諸蟲入耳用麻油滴入蟲即出韭汁雄雞冠血俱效又方雞冠血能治壁虎入耳耳定耳內生粒如棉花子大極痛用人指甲瓦上煅存性研細入冰片少許吹入耳中其痛即止又方老鼠刺葉即十大功勞葉剪取葉尖瓦上煅存性研細加冰片少許吹入耳中自效耳流膿腫痛油胭脂水粉拌勻手捻成末吹入神效又方明礬龍骨各煅一錢為末吹耳即愈耳痛難忍鐵刀磨水滴耳中即安又方川芭蕉根搗汁滴之尤效螞蝗入耳取田中泥放耳邊自出蜒蛐入耳生半夏末麻油調塗耳門蟲聞香即出螞蟻入耳用手將耳扯動即出或用穿山甲燒灰研末調水灌入即出耳猝聾閉方萆麻子一百粒大棗十五枚去核共搗爛入男胞乳汁和成作錠如棗核樣以絲棉裹一枚塞之覺耳中熱為度一日一換二十日瘥目中起星翳荸薺搗汁灑紙上候燥刮點日效又方胡椒韭菜廣皮橘皮菊葉木鱉之類皆可搗爛以棉裹塞鼻中過夜則星自落日久者多塞幾次愈目中生障翳鵝兒不食草搐鼻塞耳貼目去翳神藥也又方烏賊骨研細和蜜點之火眼初發青果核茶水磨搽神效一方用生地搗爛貼兩足心治小兒眼發尤驗泥沙入目腫痛欲瞎用極粗牛膝一段約二寸長令患者嚼如泥左眼右嚼右眼左嚼吐出搓丸塞再眼角泥沙裹藥和淚流出塵芒入目生藕搗汁以棉沁汁滴入目中即出飛絲入目其有入目後赤腫痛閉者以明礬一撮放水碗中將舌舐水隨舐隨快見水面有絲一條眼即無恙雖患三四日者亦無不效或以滾水一杯安鹽少許明礬三錢將舌尖浸於水中絲亦自落水內又方用雄雞冠血滴入目中亦治沙塵入目又方白菜揉爛帕包滴汁二三點入目即出打傷眼睛方生豬肉一片以當歸赤石脂二味研末摻肉上貼之拔出瘀血眼即無恙又方以生半夏為末水調塗之即愈眼目昏花黑豆一升枸杞四兩同煮取豆揩之風火眼痛靜坐運目平明時用津唾以大指揩之更將自己小便揩之爛眩風眼文蛤黃連去毛防風荊芥穗各五錢苦參四錢銅緑五分為極細末用薄荷煎湯作丸彈子大臨用時以熱水化開乘熱洗眼日三次此方價廉功倍若倉起自用兼以濟人甚美又方紅棗二枚青礬一分蒸水洗眼火眼時眼皆治捲毛倒睫木鱉子一個去殼為末棉裹鼻中左眼塞右右眼塞左一二夜即愈切不可將毛拔去拔後重出毛硬而卷將為終身之纍又方五倍子為末蜜調敷眼皮上其睫自起兩目忽然不見取地上三尺下黃土攪水澄清洗之此葛仙肘後方也風火眼治法黃丹和白蜜調敷太陽穴立效又方每日望井中周圍三遍能去火氣眼生紅子有人白眼珠上生一紅顆頃刻頭面皆腫用真熊膽二粒米大開水調服立刻平復目睛垂出至鼻或時大便血痛名曰肝脹羌活煎汁服數盞又方目珠縮入用老薑燒熱敷眉心即愈眼中急起胬肉此症不過半日即遮白眼一日即遮黑眼用刀上鐵鏽滴涼水少許用筷子頭磨起鏽水點患處頻點頻開瞽目神方一婦雙目不見夢觀音大士念誦能伏災風火普明照世間二語誦至百遍即愈試之雙目復明蓋此婦平日祀大士最虔故神默祐而愈後有人雙目不見初誦數千遍不效嗣後虔心齊戒誦至數月雙目亦明鼻血不止多年尿壺火上烘熱向鼻熏之立止如神百發百中又方亂髮一丸烏梅一個燒灰吹鼻又方白及末唾津調塗山根便止山根即鼻梁上也鼻中生毛晝夜可長一二尺漸粗如繩痛不可忍此食豬牛羊血過多所致用硇砂乳香等分為丸服十粒毛自落又方豬毛焙存性研末吹入鼻中即愈如食牛羊血過多者或加牛羊毛即可鼻垂紅線尺許痛甚欲死真硼砂上梅冰片各一分為末以人乳調之輕輕點在紅線中間頃刻即消鼻大如拳疼痛欲死黃芩生甘草麥冬花粉各三錢桔梗天冬各五錢紫菀二錢百部紫蘇各一錢水煎服四劑即消鼻淵老刀豆慢火焙乾為末酒服三錢不過三服即愈鼻淵鼻鼽鼻塞鼻瘡俱用辛荑研末入麝香少許研勻以蔥白蘸塞鼻中數次愈鼻流黃水絲瓜梗近根處三五寸燒灰存性酒調服愈鼻生息肉藕節有須處一節燒灰存性吹入立效又方以枯礬研和豬脂搗丸以棉裹塞鼻數其肉隨藥而出鼻衄不止取本人鼻血以紙捻蘸之點眼角內立止血出左鼻孔者點右眼出右孔者點左眼左右齊出者兩眼俱點又方以蒜頭去皮搗爛塗兩足心厚一寸許左鼻塗左右鼻塗右又方以水金散煎眼外用龍骨末吹入立止鼻流濁涕蒼耳子炒二錢半辛荑仁薄荷葉各五錢白芷一兩共為細末每食後蔥湯調服二錢腦漏辛荑末一兩拌煙吃即愈又方馬兜鈴五錢麻黃三錢北五味二錢甘草二錢水二碗煎八分去渣入砂糖半盅調服自愈入中腫大生蒲黃二錢川連頂好冰片各一錢共為細末麻油調敷人中及唇邊口角生紅白顆粒此即疔瘡有頭疼寒熱痛等症赤有麻木不知痛癢者須查疔瘡門起急治之唇破生瘡瓦松生薑汁搗融入鹽少許敷之口生肉球有根如線吐出乃能飲食捻之其痛入心此名血餘症用真麝香一錢研末作兩次服自愈或用人發燒灰服亦可口內上齶生癰此名懸痛生口上齶形如紫葡萄舌難伸縮口難開合鼻內出血時發寒熱急用食鹽燒紅枯礬各等分研細末以筷頭蘸點日三五次自消舌忽縮入銀針刺破舌尖出盡惡血以蠟燭油搽之即愈舌上出血舌忽出血如湧泉或紫或黑由心火上炎以致血熱妄行用六味地黃湯加槐花三錢煎服立愈又以鍋底煙子敷之更妙即鍋臍煙煤又取火化從治紅見黑則止水能制火也又方茅草根生車前子亂髮各為末吹擦立止此林屋山人經驗方也又方槐花研末敷上即止舌卒中如豬胞狀滿口不治須臾死用百草霜和酒塗舌下立愈出千金方要鄉間燒雜草者舌硬生衣犀牛黃硃砂各一分玄精石二兩共為細末將舌尖刺出紫血用此藥搽之即愈口舌生瘡黃柏八分川連五分兒茶一分生研細末搽之舌腫凡人舌猝然腫硬咽喉閉塞至危之症皂礬量用多少於新瓦上煅紅色為度放地下候冷研細撬開牙關以竹管吹入舌上極效忌食龜肉及鰍魚二物舌菌生舌上出血不止即不救五倍子炙研一錢烏梅去核一錢炙糠緑三分共研細末摻菌上以小膏藥蓋之方能久留於舌上否則隨津咽吐矣日日換之愈後乃止屢效舌爛腐潰飲食難進疼痛異常取地龍即蚯蚓十條吳茱萸五分共研和麥粉少許醋調塗兩足心以絹縛之立效治舌長數寸方番木鱉四兩刮淨毛切片川連四錢水二碗煎至一碗將舌浸下效兩腮腫痛生大黃末蔥汁調塗四圍露頂數次愈風熱腮腫絲瓜燒存性水調塗效痄腮赤小豆四十九粒為末水調塗效牙疼方菖蒲根於端午午時用鹽水泡之曬日中過時取起曬乾收入磁瓶勿令黴爛用時切一薄片貼牙疼處效牙蝕此症每因患骨槽風所致透骨穿腮亦屬危險用南星散拂患處數日愈胃火牙疼方煅石膏三錢生地二錢丹皮一錢甘草五分以上四味為主再按各經加藥上庭四齒痛屬心加川連麥冬下庭四齒屬腎加黃柏知母左上盤牙屬膽加羌活膽草左下盤牙屬肝加柴胡山梔右上盤牙屬大腸加枳殼大黃右下盤牙屬肺加黃芩桔梗上兩邊牙屬胃加白芷川芎下兩邊牙屬脾加白芍白朮左右上兩口角各二齒加香附川芎下兩口角四齒加赤芍白朮牙床出血以松針熬汁一盅入麥粉少許攪勻澄清飲下即愈牙疼灸法以蒜頭一個加輕粉一錢搗爛令本人兩手虎口交叉在大指盡處穴上放藥男左女右用蜆殼或圓眼殼蓋好扎住少頃灸處熱辣作痛牙痛即止將藥揭去隨起一泡牙痛永不再發又方用刻歡丸一粒噙於痛處丸化即愈不拘風火蟲牙均效牙齒疼痛法患者朝東立定行法之人用鐵釘一個在患者腳後跟地上畫一字口中默念子醜寅卯十二支左疼左腳後跟右疼右腳後跟如火牙將釘插入火字中蟲牙插入蟲字中風牙插入風字上立愈出石云選祕驗之果效牙疳奇效方凡大人小兒爛嘴牙疳凶極者用大黃三錢炒緑豆粉二錢丁香十粒各研細和勻以開水調塗兩足心其患立瘥驗效如神牙疳本胃經熱毒多發於大人熱病小兒痘瘖之後始則腫腐臭爛甚至落齒穿腮其變最速多致殞命故有走馬之名牙疳敷藥先以甘草湯浸絹帕拭去腐肉血或用銀針刮去腐肉漱淨血滓方將舊軟筆蘸藥搽之其方一用緑礬一錢煅紅石膏三錢煅粉口兒茶硼砂人中白人中黃各一錢冰片二錢共研細末一用緑礬五錢煅紅人中白三錢煅雄黃二錢麝香冰片各一分共研細末此皆應驗神效之方用敷患處今其吐出惡血毒涎無不收功齒長數寸此名髓溢症用真白朮為末人乳拌蒸服之即愈此出千金翼方固牙良法牙痛方藥最多臨時見效者少即有效者難免復痛另得一法平日小便時咬緊牙關須久久行之則永無此患其妙無窮又飯後漱齒晚間洗齒亦良法也牙齦腫痛瓦松白礬等分水煎漱之産效齒中出血川芎煎水或飲或漱自止又方麥冬湯漱亦止又方黃柏煎水漱口即止走馬牙疳大棗兩個去核用緑礬三釐灌入棗內外用泥包炭火燒枯去泥將棗研末搽上即愈此方神效有人合藥施送獲德不淺下頸脫落此症起於腎肺虛損元神不足或談笑高興忘倦一時無氣不能接續所致治法患者須平身正坐令人以兩手托住下頦向腦後送上關竅隨用絹條兜頦於頂上務須避風為至要外用天南星研末薑汁調塗兩頦一夜即上次日當服煎劑調理恐風邪外受致痰涎壅盛口眼歪斜風中臟腑則十無一廖矣煎劑宜用人參如無以黨參代之制白朮白茯苓製半夏各五錢當歸二錢殭蠶二錢天麻陳皮各一錢川芎八分甘草三分製附子二分燈心四十根生薑三片水煎服頸上生瘡大如櫻挑有五色者瘡破則頸皮斷牛黃乳日日飲之久則自愈對口瘡活鯽魚一大尾入瓦盆內搗爛加頭上萆下發垢四兩和勻敷之極厚外以紙貼一二日即愈加生山藥一條同搗並治乳癰瘰癧又方豬眼稍處臭肉形如腰子有花紋者量瘡大小用多少個和糯米飯同搗成餅緊貼不空頭立時止痛已潰者亦拔毒收功愈後永遠戒食鯽魚喉蛾不拘單雙又名喉菙生於咽喉關上者輕關下者重此症喉閉片時即不可救若男子從鼻梁中心尋至頭頂婦女則從後腦尋至頂上小兒則看兩手虎口如有水泡紅子即用銀針挑破喉蛾即破忌見燈火一面用老蒜搗融如繭豆大敷經渠穴穴在大指下手腕處寸脈後即是男左女右用蜆殼蓋上扎住用別物蓋亦可並時起一水泡銀針挑破將水揩淨以去毒氣立刻安痊痊再服甘桔湯以免後患無藥之處不服亦可此方屢試屢驗其效無比甘桔湯金銀花二錢甘草一錢桔梗八分牛子一錢五分水煎服又方燈心草燒灰吹入喉神效又方治一切喉菙及咽腫痛白殭蠶三錢水煎服下咽即效又方手指甲燒灰吹入其蛾立破喉中結塊不通水食危急欲死百草霜即鍋底煙煤鄉村人家燒雜草者真少和蜂蜜為丸如芡實大新汲井水化一丸灌下甚者不過三丸此名百靈丸又方膽礬三釐含口內惡涎自出吐之自愈兼治咽喉十八種毒豬牙皂七根去邊水二盅煎六分去渣入蜂蜜少許蛋清少許溫服即吐出風痰毒氣自泄勝用刀針又方外用醋調皂角末塗頸與下頦干又換塗乳蛾自破又方單雙蛾皆治麻雀糞二十一粒砂糖少許和成三丸每用一丸以薄綿裹之吞咽下甚者不過三丸立見奇效喉閉腫痛效驗方巴豆一粒不拘用何物包好塞鼻孔中男左女右立效咽喉爛方用土蕎麥根一個擂碎食之即愈鎖喉風閉痰涎壅塞湯水難進者用冰片一分火硝膽礬青黛各二分硼砂三分殭蠶五分共研細末用管吹入喉中痰涎自出痰盛者加雄黃五分此方亦治舌大如胖及風熱牙痛一方用熟豬油和醋漱口即稠痰盡出而愈咽喉腫痛用雄黃燕子泥為末燒酒和餅敷之亂髮繞喉取自亂髮燒灰白湯調下一錢治乳蛾神效方乳蛾急症也此方甚效有志力者宜預製以救人臘月八日雄豬膽一個裝入白礬末陰乾之後研末再入臘八日豬膽內如此三四次倘遇患者用一二分吹之即愈神驗或用天名精丸化服亦可小兒鎖喉風用芙蓉葉槌汁煮雞蛋一貼囟門一貼肚臍即愈喉瘡已破疼痛難食豬腦髓蒸熟醋和食之治咽喉不通牙關緊閉不省人事用巴豆搗爛綿紙包壓去油作捻點燃吹滅熏鼻中使煙氣由鼻熏入喉內即時吐出痰涎惡血便愈神效又方凡喉症先一二日胸膈氣緊出氣短促忽然喉痛手足厥冷氣閉此係危症切忌牛黃入口不救唯用皂角蟲蛀者不用研末醋調一錢重則一錢四分或用鵝毛蘸藥入喉攪動亦可並敷喉外干則隨換少時吐出痰涎即愈此係急症諸藥性緩唯此功效甚速屢試皆驗喉風第一方也蘇子湯鎖喉纏喉乳蛾風火閉住皆治此林屋山人極驗方也蘇子前胡赤芍各二錢桔梗甘草各一錢元參連翹浙貝各一錢五分煎服驚嚇失言不語有人因受驚嚇失音不語用陀僧七分茶調服即愈屢試如神忽然口不能言附子研末吹入喉中即愈又方豆鼓煮湯加入好酒服之或用人乳汁半合和好酒調服咽喉聲啞通草水煎服或用橘皮煎濃汁俟冷飲之陰虛聲啞人之失音由於色欲過度元氣耗喪雖參茸無能為力唯有未破身十六七童男女五更早起未食之前不必漱口嚼爛海南子檳榔一二個與病者服之換十人嚼至十次其病自愈男病用童女嚼女病用童男嚼咽喉腫痛日輕夜重痰如鋸聲乃陰虛也熟地一兩茱萸四錢麥冬五味牛膝各三錢茯苓五錢水煎服下喉一聲響亮火熱俱消喉腫心痛閉目不語起首脈散牙緊發慌手足麻木此名硃砂症又名心經疔非喉風也急用紅紙捻燒燃照心窩背心兩處見有紅點用針挑破內有紅筋挑出如無紅點少刻再看或服藥後再看必有並用雷擊散治之諸骨鯁喉類情治法用犬吊一足取其涎徐徐咽下或醋煎威靈仙咽下凡治鯁之法可以類推如鸕鷀獺堂治魚鯁磁石法治針鯁發灰治發鯁虎骨治諸骨鯁皆取其以類相制也魚骨鯁食橄欖汁下如無鮮者用其核磨水飲之堅瓠集云凡骨鯁者用碗水虛空以手指寫鳥飛龍下魚化丹邱八字自愈一切雞魚骨鯁靈符即化畫吞符法用茶盅盛水半盅不拘生熟水茶俱可用左手三山訣托水盅再將右手捏起靈官結用中指在茶盅內水上面此靈符一道畫者吞者俱要朝南方一口吞之依此法無不神效治竹木骨諸物鯁喉法行法之人朝東丁字步立定左手三山訣托水碗右手劍訣指向碗內水上畫符口中念嘰咒曰山林竹木人少雪知斬此法出石云選祕梁安胡謙伯試之果效冶一切骨鯁水食不能下用人指甲燒存性為末吹入喉立效又方野苧根搗汁飲能治雞骨鯁又方威靈仙砂糖酒煎服竹葉卡喉此物能閉喉管遲則難救急取牛口涎以滾水對服即化稻穀卡喉急取鵝口中涎灌之即下蓋鵝涎能化谷也鴨涎亦可擔肩癰癤唯擔夫有之五倍子燒存性為細末加黃丹用水飛過醋調敷之其效又方照癰毒各方治之蛇頭惡毒生各手指頭又足趾頭生者亦是宜急用頭髮扎住指根方用娛蚣焙枯為末豬膽調搽神效又方雞蛋一個穿一小孔入信石一分套指頭上熱則再換立刻止痛如神真仙方也又方雄黃枯礬各等分研末用麻油敷之亦極效驗又方白蘿蔔挖孔入雄黃三分蒸半熟套指上或用真烏梅仁嚼爛敷之均極效驗又方如色白者照後脫骨疽陽和湯治之脫骨疽此症生手足各指頭或生指節指縫初生或白色痛極或如粟米起一黃泡久則潰爛節節脫落甚至手足背延腐黑陷痛不可忍宜用頂大甘草研極細末用香麻油調敷要敷極厚一日一換不可間斷忌食發物不出十日必愈真神仙方也再用金銀花元參二味為君當歸為臣甘草為使水煎服一連十劑永無後患藥味分兩宜重不宜輕少減則不效並忌抓擦為要又方大人用陽和湯小兒用小金湯重則用犀黃丸色紅者照上蛇頭惡毒方治之此林屋山人百發百中之方也又方甘草嚼融厚敷干則隨換日夜不斷數日必愈神效指頭麻木痛癢取蜒蚰和銀硃共搗搽之若遲延不治必生蛇頭蛀節等疔痛苦難受初起多擦幾遍決不生矣虎口毒生大指次指間鮮螃蟹搗爛塗之自消永遠戒食螃蟹代指指甲潰爛黃蠟松香熔和作筒套指頭上久之自愈穿掌毒生手心新桑葉研爛塗之愈後永遠戒食鵝肉虎口並備手指縫生瘡或腫或爛痛不可忍若不早治即爛入手生蒲公英捶融敷之數日即愈又方白芷滑石黃丹各等分研極細末敷之神效手足凍裂用蘿蔔一個剜空灌滿蠟燭油安灰炭火上熬透用筆蘸熱油塗患處油凍抹去再塗頻塗即愈鵝掌風生手掌上紫白斑點迭起白皮堅硬幹燥甚則迭迭脫皮血肉外露或癢或痛久則成癬難愈用米糠油時時搽之數日斷根屢試神效又方豆腐熱沫久久洗之拭乾後塗以桐油燒松毛煙燻之自愈永戒鵝肉又方砂仁桑葉煎洗又方用紅油搽三四次至愈而止乳結硬痛大鯽魚頭煅灰酒服一二錢汗出即瘥乳癰紅腫疼痛者男女皆有此症生蒲公英一兩忍冬藤一兩搗爛水二盅煎一盅食前沖酒服睡片時渣敷乳上數次即愈此為乳癰聖藥屢著神奇不可輕視按本草乳岩以此亦可治又有乳癰多至二三百頭者取柳樹根刮去皮搗爛蒸熱布包尉之次則隨換過一宿即愈此孫真人千金方也又方白礬雄黃松羅茶各一錢共研細末飽時服每用一錢以豆腐皮包之吞下飲酒盡醉未成者一服消已成者兩三服愈婦女乳汁不通貝母知母牡蠣粉各等分為末用豬蹄湯調服二錢即通此祕方也無子食乳腫痛難消用麥芽一兩炒煎水當茶即止又方用本夫穿過包腳布敷乳過夜腫消痛止而愈或本婦現穿之鞋包乳上過夜亦消胸痛方蒲公英一味研末或酒或開水吞服神效胸滿腹脹此脾土衰弱肝木氣旺木來剋土故也甚至身面黃腫亦有不黃腫者用蒼朮二斤淘米水泡一日兩夜燒存性甜酒麴四兩燒存性皂礬一斤醋泡曬乾入瓶內煅存性加平胃散共為末醋為丸如梧子大每服三四十丸酒下米湯亦可日服兩次神效此仙方也胸前生孔有人胸生一孔咳嗽則與此孔相應隨有膿血而出此肺痿也用黨參生黃耆當歸金根花各三錢生甘草連翹各錢半官桂一錢煎服數次自愈龜胸龜背龜尿時時搽之久久自平龜尿難得以鏡對龜照之尿自出也或加首烏末同尿敷之日久自愈一切心痛不拘男女大小立效馬兜鈴一個燒存性以溫酒調服一方用香附川連各一錢生白芍五錢水煎服立愈又蛔厥心疼烏梅二枚川椒十四粒煎湯服立愈卒急心疼一說胃氣痛人稱心氣痛即胃脘痛脾痛也若真心疼痛則手足青不可治矣棗丸詩云一個烏梅二個棗七十杏仁一處搗男酒女醋送下之不害心痛直到老心膈飽脹腹中又飢又痛胡椒七粒研末好酒沖服即愈心氣怔忡焦白朮時時煎服極效多食則有橫中滯氣唯用荷葉包裹久蒸或用蜜炙則可服也心疼忽長肉一條手不可近也此腎火也真硼砂真梅冰各一分點之立化為水內服六味地黃丸二料全愈並用吳萸研末醋調敷兩足心過一晝夜一換敷至數日為止心口生疽此名井泉疽又名慢心鋭毒初起若心口內有塊漸大發高毒陷即死醫皆束手諸書亦無藥治之法唯余家祕集載以本人兩手十指以線量其長短共有若干積於一線放喉管正中處雙環至背脊之中看兩線合攏盡頭處為中穴又以本人中指之中一節用竹片量准作一寸放在中穴之左右各遠一寸各以墨記分列三穴如形樣每穴用艾三團一齊火灸灸畢全愈此林屋山人祕方也心窩成漏一人胸口一片如碗大無皮潰爛成漏膿血時流經久不愈用荸薺磨成粉摻之數日即愈神效非常肺癰緑橘葉一把洗淨搗汁服吐出膿血即愈又方用蚌內涎水服之神效又方竹絞汁一盞服之吐出膿血自愈肺癰試法請患易識獨肺中患毒難知有人祕傳兩腳骨疼痛者或腳骨不痛而舌下生如細豆一粒者再心口之上內微痛或兩脅微痛及咳嗽口渴喉干此皆肺中生毒之證也即用甘草桔梗各三錢煎服服下如覺稍安肺之患毒無疑矣以犀黃丸見外科方服至一料全愈此是預識預治百無一死世人但知腳痛醫腳咳嗽醫嗽舌下一粒便以刀刺且此一粒癰未成膿定然色淡癰愈亦消重則其色紫黑如用刀刺立害諸書皆云口吐臭痰胸中發腥作痛者肺癰也若不早治直至吐臭痰發腥始知肺癰猶小舟飄入大洋也倘見此症吐膿膿色皆白用犀黃丸治無不效貧寒不能治藥者用陳年醃芥菜滷每早取半杯用豆腐漿沖服服後胸中一塊塞上塞下塞至數次方能吐出數日膿儘自愈一說再以通草肥蘆根生苡仁桔梗煎湯代茶飲之凡患此症終身戒食鴨蛋白紅蘿蔔石首魚甲魚食則復發難治此林屋山人祕法也又肺癰腸癰皆吐臭痰用棉花捲竹片上蘸油點火使本人觀之若肺癰看火頭是二個腸癰火頭只一個又方元參八兩天冬四兩桔梗二兩炙草一兩水十碗煎至二碗另加蒲公英金銀花各五錢再煎至一碗食後即服初起即消日久即愈極效無比肝氣道地潮烟二兩白米飯一碗拌和捶百杵分作四餅用濕草紙包灶火內煨存性研末作四服肝氣發時以砂糖調陳酒送下至重者四服除根又方夏枯草一兩煎水體虛者加瘦豬肉四兩同煮當茶飲服過三四兩斷根此藥能舒肝氣養肝血止肝風故切奏效如神屢試屢驗而本草不言其能治肝病何哉凡肝病最忌食雞終身忌食椿芽為要又方用胡桃一個對破開再加大元眼肉七枚入胡桃內擂合用藍布一小方包之再以濕草紙包裹煨炭存性將紙布灰吹去研極細末以瓷瓶盛之每發時開水沖服一茶匙將一料食完永無復發屢試如神真肝氣痛第一方也治胃氣痛並治肝氣咒曰天火燒太陽地火燒五方雷火巽方發燒死諸不祥太上老君急急如律令黃紙朱書將符焚化入醋湯內服之神效治九種心胃肝氣痛荔核煅存性五錢木香二錢香附一兩共研末每服二錢早服女人以醋湯下晚服米湯下男人早晚均以淡鹽米湯下凡氣痛急切無藥以食鹽一撮放刀口上炭火燒紅入水中乘熱飲之吐痰愈後戒食鱉魚又方凡氣痛常發十年五年不愈者小蒜連葉七根以鹽醋煮熟痛時頓服永遠戒鱉可以除根胃脘痛有滯有蟲也香附醋浸透炒研良薑生薑汁浸透炒研因寒發者用良薑二錢香附一錢因怒發者用香附二錢良薑一錢寒怒兼者各錢半以末調米湯少加鹽與生薑汁服之立愈心胃蟲疾作痛或滴水入口即吐或口渴飲水不止或吐清水者皆是用蔥白汁一杯飲下隨飲真小磨麻油一杯少頃即愈蟲當化水除根雖痛至牙關閉欲死者亦效又方鰻魚淡煮飽食三五次即愈此魚最能殺蟲故也隔食反胃糯米粉以牛口涎拌和作小丸煮熟食之神效取牛涎法以水洗淨老牛口用鹽塗之少頃涎自出愈後終身宜戒牛肉凡病隔食胸前生二小骨漸漸交合則不能食法用生鵝血乘熱飲之數次胸前二骨自化永遠戒食牛鵝又方小兒胎髮一團陰陽瓦焙存性研細末陳酒送下效諸般咳嗽桔梗炒荊芥炒紫菀飯上蒸一次再炒百部飯上蒸一次再炒白前飯上蒸一次再炒各四兩共為末每服三錢臨時開水調服如初感風寒者生薑湯調下此方系咳嗽神藥切勿輕視服者多效又方枇杷膏神效見後胸膈帳滿咳嗽不安並治各項咳嗽外治法用官粉香油入鐵器內熬數滾離火用頭髮一團蘸粉擦胸膈數次即愈又方蕎麵雞蛋清和成團擦之亦效或用哮吼第一方亦可咳嗽痰喘用真蚌粉長者為蛙圓者為蛤取研粉若用蛤粉則不效新瓦炒紅人真青黛少許用淡菀菜水滴麻油數點調服二錢神效有婦人痰喘咳嗽終夜不寐面浮如盤一服即愈或用哮吼第一方治之其效如神又方雪梨四兩生薑一兩共搗汁去渣加蜜四兩共煎數沸入瓷器內封固不拘時服一劑即愈無病亦可服最能滋陰降火忌食蘿蔔咳嗽氣喘生山藥半碗搗爛甘蔗汁半碗和勻燉微熱服立止咳嗽氣喘遇寒即發乾薑泡皂角泡去皮子弦蟲蛀忌用肉桂紫色者去皮各等分共搗篩白蜜和勻杵三千下為丸如梧子大每服三丸開水下嗽發即服日服數次忌蔥面油膩其效如神咳嗽痰血涎唾中有少血散漫者此腎經相火炎上之血也若血如紅縷從痰中咳出者此脈絡受熱傷之血也若咳白淺紅色似肉似肺者必死又咯出痰中有血絲屬腎經咳嗽有血屬肺經嘔吐成盆成碗屬胃經自兩脅逆上吐出屬肝經溺血屬小腸經下血屬大腸經牙宣血出屬胃腎虛火真青黛瓜蔞仁去油海石炒黑山桅炒黑訶子肉各等分蜜為丸噙化嗽甚加杏仁又方款冬花百合蒸焙等分為末蜜丸龍眼大每臥時嚼一丸薑湯下又方大柿餅一個去子入真青黛一錢棉扎緊飯上蒸熟臨睡時食薄荷湯下極效獨聖湯治多年咳嗽肺痿咯血紅痰用白及三兩為末每服二錢臨臥糯米湯下台州獄吏憫一重囚囚感之云吾七犯死罪遭刑拷肺皆傷損得一方用白及末米飲調服其效如神後日凌遲剖其胸見肺間竅穴數十皆白及填補色猶未變也久嗽連至四五十聲生薑汁半杯白蜜二匙同放茶碗內滾水沖溫服三四次即愈年老久嗽不能臥核桃肉不去皮生薑各一兩研膏蜜為丸二錢一顆每臥時嚼一丸薑湯下氣促難臥服即安定又方潞堂參一錢陳皮桔梗紫蘇各錢半五味子十五粒水煎食遠溫服咳嗽聲啞訶子皮五倍子五味子黃芩甘草各等分為末蜜丸櫻桃大每一丸噙化咽下又方青蒿二錢童便煮服極效小兒晝夜咳嗽食少發黃此脾虛也用真山藥一味煮熟加糖調服神效癆症咳嗽吐血方枇杷膏專治氣血兩虛勞傷虧損吐血咳嗽發燒身體瘦弱四肢痠軟精神疲倦腰背疼痛飲食不進以乃一切不足弱症服之屢效咳嗽尤應驗如神輕者二三料重者四五料除根貧富可用不必另服別藥兔致誤用害事即無病常服可保身強神旺此方得自仙授藥極平易功最神奇見者廣傳功德無量枇杷葉七十片新鮮者佳毛刷洗淨大雪梨二個深臍者佳去皮心切片用白蜜二兩先熬滴水成珠大便乾燥者多加大便溏瀉者不用以白糖代之大棗半斤或黑棗微棗皆可去核建蓮肉四兩去心不去皮先將枇杷葉放銅鍋內砂鍋亦可以河水煎出膿湯用綢瀝清汁去葉與渣不用後將梨棗蓮蜜和入煎以蓮肉融爛為止用瓷瓶收貯隨意溫熱食之凡虛病服藥多則脾胃受傷飲食減少病更加重虛弱咳嗽者若不早治肺損難治唯此方最益肺臟治咳嗽應效如神如虛弱並不咳嗽者枇杷葉不用只用河水同煮咳嗽多痰者加川貝母一兩研極細末俟煮熟時入內煮一二滾取起若吐血用藕節二十一個搗汁同煮冬月多制久收不壞夏月隨食隨制專治童子虛勞咳嗽吐血燒熱人龍即蛔蟲二十一條童便洗淨瓦上焙乾以黃色為度黑色則不效不破皮紅棗三十個飯上蒸熟去皮核蘿蔔子一錢五分炒研末大熟地五錢煮爛杵膏自制真藕粉一兩五錢真川連六分拌炒研末以上共搗為丸如桐子大每早以白滾湯送下七粒逐日加二粒至二十一粒為止服至一料全愈屢試神驗大人亦治切勿輕視吐血治法血吐在水內浮者肺血也羊肺煮熟蘸白及焙研末食沉者肝血也羊肝煮熟蘸白及食半沉半浮脾心血也羊心羊皮煮熟蘸白及極效此聖惠摘玄方也脾肺之血系屬氣虛以補氣益脾為主肝血系屬勞傷以滋陰降火為主如概用滋陰之藥則殺人如草菅矣俗謂非勞病而治成勞病即此是也吐血最忌用參無論人參高麗參均不可服此係名醫祕傳人多不信後有時醫試每治吐血之症用參者多不能愈不用參者全活甚多又方凡勞傷吐血咳嗽用童便之清利者日日飲之勿間或自己戒食蔥蒜等臭濁之物並戒房事則小便日清去其頭尾數滴日飲二三次再服南棗三個自不噁心一月見效久飲除根身體強健吐血服小便者百無一死誤服寒涼者百無一生此屢試屢驗良法也又方凡吐血多者用三四兩重大當歸一枝切細取好陳酒一斤慢火煎至一滿碗候將要吐時口中有血務必含住取藥一口連血咽下其血必止隨將酒分作幾次飲完即此一劑而愈後不再發每有醫家阻云吐血尚要戒酒豈可用酒煮藥殊不知神驗非常此方活人甚多從無一誤如一時煎熬不及用當歸一二寸嚼融帶血吞下即能漸止不致大吐亦可救急此林屋山人經驗方也咳血痰內有血出於肺與上咳嗽門參看款冬花百合百部蒸焙各等分為末蜜丸龍眼大每臥時薑湯下一丸又方大蘿蔔一個切頂剜去肉一半入黃米糖令滿原頂蓋之火內煨熟食效喀血痰帶血絲出於腎與上咳嗽門參看天冬一兩茯苓杏仁貝母甘草各五錢共研末煉蜜為丸梧桐子大每服二三十丸吐血成鬥命在須臾貫衆五錢為末黑頭髮瓦煅研細五錢側柏葉多取搗汁一碗入末於汁內隔湯煮一炷香時取起加童便一茶杯黃酒一小杯徐徐飲之神效驗癆蟲法用乳香燒煙燻病手背男左女右以袖帕蓋手掌心良久有毛從掌中出白者可治紅者難治黑者不治無毛者即無癆蟲灸癆蟲法用濕紙條貼背脊上紙先乾者即癆蟲處以墨點記用老蒜切片貼上以艾一團放蒜片上燒之多燒為妙無蒜用姜亦可先備火盆鐵鉗如蟲出即用鉗夾火盆內或送野外埋入土內恐飛入人口鼻內須謹防之治癆蟲法雄精硃砂硫黃去沙泥各一錢麝香一分各研極細末瓷罐收貯以上好燒酒和勻用獨大蒜頭去蒂蘸藥從尾閻脊骨徐徐逐節擦上如有腫處或極痛之處即系癆蟲所在須於腫痛處多擦數次其蟲自滅不拘新久一切癆病皆能除根如病重者須擇天醫吉日總以午時擦之為妙端午日更佳忌戊日已日除日此藥能開背後三重失竅即虛怯疰夏之人於端午擦之亦能神清氣爽經絡流通大有神益此方傳自海外屢試如神凡勞怯之症服藥末效者宜用建蓮淮山藥磨成粉以人乳牛乳豬脊筋髓蒸熟拌食大能補益去病唯泄瀉者忌服童子癆此方並治傳尸癆貓糞取屋上曬白者用黃土包裹火內煨焦取出用碗蓋住候冷去土研末黃糖和為丸每服三四錢效若仙丹屢試屢驗此王洪緒方也男女童癆野茄棵內蟲取數十條和入食物內食之勿使病入知數次病愈極效茄梗上有蛀孔內即有蟲蟲身帶緑色嘴黑者即是又方露天糞坑內蛆取入稀布袋內於流水處漂洋極淨瓦上焙黃色每一兩入粳米糯米各二兩炒和磨細以砂糖米湯調服治哮吼妙法病發先一時用鳳仙花又名指甲花連根帶葉熬出濃汁乘熱蘸汁在背心上用力擦洗冷則隨換以擦至極熱為止無則用生薑擦之再用白芥子三兩輕粉白芷各三錢共研為末蜂蜜調勻作餅火上烘熱貼背心第三節骨上貼過熱痛難受正是拔動病根務必極力忍耐切勿輕易揭去冷則將藥餅揭下烘熱再貼一餅可貼二三日無論病愈未愈多備藥餅換貼不可間斷輕則貼一二日重則貼三四日或五六日永不再發有人患哮吼四十餘年貼至數日斷根無論寒熱虛實鹽醬醋酒哮吼皆治神驗第一方也藥味不可加減並治痰氣結胸痰喘咳嗽又方海螵蛸瓦上焙枯為末大人五錢小人二錢紅砂糖拌勻調服數次斷根噁心吞酸此脾胃虛冷也用核桃嚼爛薑湯送下脾家冷積食後胸滿兼治一切痰氣橘皮一斤甘草食鹽各四兩水五碗慢火煮乾焙為末每服二三錢白滾湯沖服胃寒嘔吐黃水並治痰飲吐水暖胃膏生薑一斤搗取自然汁碗許入牛皮膠乳香末沒藥末各五錢同煎膠化離火將藥作三四大膏藥以一張貼胃脘痛處用袖綁捆三個時辰然後取周歲小孩所穿之鞋一隻銅鑼上烘極熱在膏上輪流尉之尉至膏硬換膏再貼再綁三時再尉至愈為止止後用紫油厚朴三斤用老薑二斤切片同煮一時去姜不用乾薑四兩用甘草二兩同煮一時去甘草不用將兩味炒乾為末黑棗煮湯去皮核為丸每服二錢開水送下久服斷根此方名尉胃丸功能溫中降氣暖胃消痰大有奇效此林屋山人經驗方也痰氣結胸梨汁一盅薑汁白蜜各半盅薄荷三錢研細末和水煮十餘滾服降痰如奔馬痰疾癲狂狂病有因傷寒而得之者此一時之狂也照仲景張公傷寒門治之用白虎湯以瀉火也更有終年狂病而不愈者或持刀殺人不認父母妻子見水則喜見食則怒此乃心氣之虛而熱邪乘之痰氣侵之遂成狂矣此等欲瀉火而火在心不可瀉也欲消痰而痰在心之中不易消也唯有補脾胃之氣則心自得養不必祛痰痰自化不必瀉火火自無矣方為化狂丹高麗參三錢白朮茯神各一兩甘草菖蒲各一錢半夏菟絲子各三錢附子一分水煎服一劑狂定二劑病痊此方妙在補心脾胃之三經而化其痰不去瀉火蓋瀉火則心氣愈傷而痰涎愈盛狂將何止乎尤妙在附子一分引補心消痰之劑直入心中而氣尤易補而痰尤易消又何用瀉火之多事乎此所以奏功如神也又方青橄欖十斤打破砂鍋內熬十數滾去核入石臼內搗爛再熬熬至無味去渣熬成膏用白帆八錢研末加入攪勻每日早晚取膏三錢開水送下服完自愈凡癡癲羊癲風等症皆痰迷心竅所致服此甚效此林屋山人經驗方也痰迷譫語方鮮豬心一具辰砂一錢甘遂二錢二味合研末藏豬心中外用牛糞煨熱取出藥味和作兩丸將豬心煮汁和丸吞下即愈治豬羊癲風時常跌倒不省人事竟成廢人二服除根奇效方皂礬一兩煅紅魚膠一兩切斷面炒鉛粉一兩炒黃硃砂三錢以上研為細末每早空心陳酒調服三錢自愈消渴飲水不止渴而飲水不止為上消飲水多而作瀉為下消多食易飢為中消三消湯黨參白朮當歸茯苓生地各一錢黃柏知母黃連麥冬天花粉黃芩各七分甘草五分水煎服神效三消皆治又方好梨日日食之多食必效又方緑豆煮汁並作粥食最妙飲水不止小便如膏茴香炒苦楝子炒各一錢研末空心酒調服腹中易飢食下片刻即吐此蛇積也用醋泡大蒜汁飲數碗吐出一蛇即愈不吐再服數碗自愈又方雄黃五錢調水服數次即愈飲食過多脹滿不安用鹽擦牙溫水漱下二三次如湯沃雪也又方人端正坐定將頭仰起開口呵氣一口徐徐接連復呵呵至三十六口為度便即腹中寬舒此係醒脾消食之法也食麵不消生薑汁沖好酒熱服自化又方生蘿蔔取汁燉熱服神效凡食麵用醋斷不作脹又方生蘿蔔汁治食豆不消神效肉食積滯及雞鴨等山楂炭研末為丸每服四錢數次即愈又雞蛋滯飲醋即消又豆豉水亦消又多食大蒜並治整煮雞蛋積滯也又淘糯米水煮熱飲一盞能消鴨滯及鴨蛋積滯食積痞塊木賊草五錢研細末每服五分開水空心調服年近者一料即消年遠者不過兩料全愈屢試如神噎膈諸方韭汁梨汁薑汁人乳各一盞和勻飯上蒸熟早晚頻飲效又方逢口食時自初虧起用白乾面二斤水調揉熟向日和成丸如桂圓核大以日色復元為止即將面丸於是日曬乾收好按一歲一丸空心煮食平淡而有奇功面圓外實內虛尤為奇異不可輕忽多制可以濟人價廉功大不見日則不效又方有肝旺脾弱即嘔吐屢治不效者此木剋土也宜用平肝補脾之藥治之必愈不可認為噎膈也又方患此症者有蟲藏於肺管時長時縮食後少頃即吐皆有蟲也用靛青葉汁或靛青亦可酒和服立效又方此症胸前必有二小骨漸漸交合則不能食而死取生鵝血對口乘熱灌之其骨自化飲食可進永戒食鵝牛二物治翻胃方九節菖蒲切片燒灰每服一錢燒酒送下又方甘蔗汁一升入生薑汁二合溫熱作五次服甚效並治乾嘔不出又凡人飢餓每有螬皮上胃食物必吐若誤用翻胃之藥其吐更甚宜用川椒煎湯飲即安並治嘔吐不能服藥又方酒後乾嘔以甘蔗汁飲數次極效治嘔吐一切雜病嘔噦橘皮四兩生薑一兩加開口川椒十粒水二大碗煎至一碗徐徐呷之即止嘔吐不止門內一步泥和水吃即止又蔗汁薑汁各一杯和勻能治乾嘔厄逆諸方川椒去子及開口者炒四兩麵糊丸如桐子大每服十丸食遠以醋湯送下神效又方荔枝七個連殼核燒枯為末食遠以白滾湯調服立效若遇然厄逆只須紙捻通鼻取嚏即止倘厄逆日久不愈一連四五十聲者用生薑搗汁一合加蜜一匙溫熱服之效病後厄逆柿蒂丁香各二錢生薑三片煎服立愈虛寒痰阻氣滯火厄均宜若虛甚者加人參五分又方炙半夏三錢荔枝肉五個箬外蒂三十個煎水代茶飲又方刀豆子燒灰存性開水調服二錢即止上吐下瀉此尋常吐瀉也如因暑熱吐瀉不止須照霍亂症治之樟木煎水服立止神效並治霍亂亦效又方陳鹽梅一個瓦上焙枯加生薑一大片同煎服屢試神驗又方治小兒吐瀉不止用舊鐵釘有鏽者煎水飲入口即止通治蠱毒覺腹中不快以生黃豆嚼之不同腥氣者中蠱也急以升麻濃煎湯飲以手探吐毒在上者用升麻煎湯吐之在腹者用鬱金煎湯下之或合二味服之不吐則瀉活人甚捷又方先取炙甘草一寸嚼之咽汁若中蠱毒隨即吐出仍以炙甘草三兩生薑四兩水煎日三服含甘草不吐者則非蠱毒也闢蠱毒法凡人家房屋潔淨並無灰塵即繫有盅之家勿與往來以免凡食茶水菜飯等物將要食時用筷子向杯碗上敲動並向主人問云食內莫有盅毒否一經問破則可兔害腹痛辨證用方治法臍眼上痛者食痛也臍眼下痛熱手按之不痛多急或痛加刀割或吐或瀉或痛甚覺有冷氣皆寒痛也手按之更痛冷物尉之不痛或自下而痛上或時痛時止腹滿堅結皆熱痛也時發時止痛在一處而不移者或有塊硬起者蟲痛痞痛也又聞煎炒食物香氣則痛痛時口吐清水或口渴者亦蟲痛也寒痛飲胡椒湯加糖衝入不可加鹽或飲薑湯均妙又方白芍三錢甘草肉桂各一錢水煎服此仲景神方也熱痛服六一散最妙或服痧藥亦可若痛甚者或嘔或瀉者照霍亂痧症治之又上吐下瀉而腹痛者作霍亂痧症治之不效者須照上吐下瀉方治之蟲痛如有塊硬起者用手在硬處久久揉搽揉至一日其蟲即死從大便而出或查痞疾方治之須宜詳明腹痛神方小麥杆燒灰滾水淋之服之虛實寒熱皆宜急肚疼方用本人頭髮三十根燒過酒服即以酒調芥子末封在臍內即安肚腹麻木此風襲也多煮蔥頭食之並用蔥姜炒熱尉之自愈忽然肚黑凡肚皮忽然青黑色此乃血氣失養風寒得以乘之所變怪形真危惡之敗症也若不速治難救急用大青研細末每服一錢五分以好酒調下黑退即愈否則終危此起死回生之方也大青多生溪溝旁葉以火麻葉藥店多假生草藥店有之又有小青葉細性味相同功力稍緩又方鉛粉和鹽炒焦敷之亦效臍中出水龍骨醋泡焙枯研敷或用赤石脂研末敷效肚臍生癰肚臍腫大如瓜臍眼高突者是紅赤者照癰毒方治之不紅不熱者照陰疽方治之又有少腹疽生臍下一寸五分氣海穴或生二寸關元穴或生三寸丹田穴皆由七情火鬱而生也分別紅白陰陽治之小腸疽生小腹內按之如掌堅硬而熱微痛小便頻數汗出憎寒皮色如常或現微腫脈緊實而有力者是也服犀黃丸見後即愈此林屋山人祕法也痞積不拘何膏藥二張以一張揭開用白信石五分摻膏上小兒止用三分再用一張合黏將背面貼患處以布束緊數日痞化為水治皮裡膜外者尤速如貼膏後腹中脹悶乃痞將散須服湯藥枳殼八分大腹皮鹽水炒一錢蘇梗八分厚朴一錢二分青皮一錢莪朮八分山楂二錢烏藥六分香附一錢五分砂仁五分廣木香三分水煎空心服三劑全愈又食積血痞木賊研末三四分白湯空心服即消年遠者連服三日蟲積諸方苦楝根取向東不露出土者去皮及骨四兩使君子去殼二兩生薑三兩水五碗煎至三碗去渣再熬至一碗加白蜜四兩又熬至一碗露一宿次早隔湯頓服空心服一日服完須於朔日服蟲頭向上故也不吐不瀉蟲以大便成團出少則一服多則二服除根一切蟲積皆治若小兒則分兩量減可也又蟲積作痛口中有涎流出湯飲不能進危在旦夕者花椒生薑等分水煎服即愈花椒慎勿原粒吞下恐黏肺而肺上生瘡也又蟲心痛海螵蛸一塊以醋磨濃頓服自效米瘕好食生米者是茶葉癖雞糞糞要白色者佳白米各三錢同炒焦為末煎水服吐出米汁即愈又治茶葉癖方用新鞋一隻將茶葉盛滿任意食之食完再盛一鞋連食三鞋自不食也男用女鞋女用男鞋奇效又方日食棐子七枚以愈為度寸白蟲疾此症面色黃瘦飲食少進發時腹痛口吐清水用尖檳榔一兩廣木香五錢研極細末大人每服五錢小兒每服三錢開水調下其蟲即隨大便而出先用煎炒香味令病人聞之然後服藥神效須在月初重者兩三服愈又方鴨蛋一個破一小孔入使君子肉末一錢檳榔末一錢用紙封口蒸熟食之蟲隨大便出又蛔蟲上出口鼻用川椒閉口者不用研末沖水服即愈各種臌脹手按之下陷不起者水臌也隨手即起者氣膨也周身老黑色皮內有黑斑點者血臌也蘿蔔一枚周圍鑽七孔入巴豆七粒入土種之待其結子取子又種待蘿蔔成仍鑽七孔入巴豆七粒再種如此三次至第四次將開花時連根拔起陰乾收淨磁器內遇臌脹者取一枚捶碎煎湯服之重者二枚立愈有心人宜預種之施送又方西瓜一個切去頂挖空將蒜頭去皮填滿將原頂蓋好封固糠片火煨一日取蒜食之又方陳香櫞一個切去頂挖穰入小茴香令滿將頂蓋之用泥塗封煨熟去泥存性研末收貯服二三錢數次愈又氣臌用陳久大麥芽煎湯服漸消臌症峨嵋山僧奇方治一切水腫濕腫氣腫肚腹四肢發腫乾雞屎一斤炒黃黃酒三大碗煮一碗濾去渣一時飲盡少頃腹中動作瀉一二回次日用田螺二個滾酒泡熟食之即止此方奇效無比但不可令病者知之若治小兒則只用雞屎一兩加丁香一錢和蒸餅為丸桐子大每服一錢米湯下又方雄豬肚一個內入大蒜四兩去皮煮爛食五六個忌鹽醬醋百日自效水臌小便淋閉大田螺四個大蒜五個車前子三錢為末共研成餅貼臍中以布束縛則水從小便出漸消終身戒食田螺螺螄又方商陸根蔥白同搗填臍中小便利則腫自消發背治法參看癰毒陰疽門發背乃癰疽中大患緣其患位對心對肺對臍故也偏曰搭手因手可搭而名紅腫痛甚者應稱背癰易治如患色白腫痛者當以流注法治如平塌不痛者當以陰疽法治此皆陰發背也如誤服寒劑誤敷涼藥誤貼涼膏定然毒攻內腑不救此林屋山人祕法也背癰方牛皮膠四兩蒸化好酒兌服不飲酒滾水兌服初起服此毒不內攻不傳惡症又方未成者用活癲蛤蟆一個系放瘡上半日蛤蟆受毒必死取放水中吐出毒氣復活再換一個仍如前法換至三四個後則毒散矣屢試極效又方瓜蔞五枚取子去殼真乳香五塊如棗大者共研細末以白蜜一斤同熬成膏每服三錢溫黃酒化服桐江一人因母患背癰百藥不效後夢呂仙授此方服之而愈背熱如火此虛火也生附子研末口水調敷兩足心腎虛腰痛其痛悠悠緩緩即是腎虛也壯本丹凡腎虛腰痛久則寒冷此藥壯精骨補元陽利大小便養丹田功效甚大肉蓯蓉酒洗焙乾杜仲酒洗巴戟酒浸去皮青鹽煆以上各五錢核桃即胡桃破故紙鹽炒小茴香各一錢共為末用豬腰子一對剖開去白膜入藥在內扎住再用麵包緊入火內燒熟去藥與面每服一個酒送下勞傷腰痛炙黃耆五錢杜仲二錢補骨脂鹽水炒二錢紅花二錢胡桃肉八個用酒煎服立愈腰痛方去濕而腰膝自利只須一劑痛止多服則陽旺反非所宜白朮土炒三兩芡實二兩薏苡仁三兩水煎分數次服兼治夢遺亦只服一劑腰痛難忍絲瓜根燒灰存性酒下二錢立止又方刀豆殼燒灰沖酒服極效閃跌毆打腰痛腰閃作痛及手足傷損不出血但有青紫內傷者先以蔥白搗爛炒熱將痛處擦遍隨以生大黃研末薑汁調敷儘量飲以好酒即三月半年不愈者皆神效又方真硼砂研極細末用燈心點眼四角立愈一方王不留行一錢二分炒研細末好酒調服即愈腰腳風痛不能踐地松毛搗如泥一升酒三升浸七日每飲一合日二服按松毛節能行血中之氣治腰膝痠痛及中風日眼歪斜歷節痛俱宜服筋骨痠痛腰背軟手足麻痹等症十大功勞葉即老鼠刺葉採一筐剪去葉上刺好酒一斤拌蒸曬乾七蒸七曬紅花一兩炒白當歸一兩酒浸炒微枯虎骨一兩酥炙同為細末砂糖調服每日五錢作三次服神效纏腰瘡腰生紅瘤兩邊生紅筋圍至臍即死陳京墨水磨濃和雄黃末塗之又方雄黃六錢膽礬三錢研末唾津調搽神驗又方白糖生百合同搗爛敷患處立效又方龍膽草研末柿漆調搽立驗男女交合精脫氣絶男女交感樂極精脫而死切不可驚走下床男脫則女以口哺送其熱氣女脫則男以口哺送其熱氣一連數十口呵之則必悠悠然陽氣重回矣再以人參附子湯灌之送氣之法先須閉口提丹田之氣上來盡力哺於口中送下喉去若貧者不能得參急用黃耆四兩當歸二兩附子五錢水煎服亦有生者又方用人抱起坐之以人之口氣呵其口又恐不能入喉急以筆管通其兩頭入病人喉內使女子呵之不必皆妻妾也凡婦人皆可盡力呵之雖死去亦生陽萎陽物軟而不舉者是千口一杯飲此方專治陽痿不舉一杯作十二三百口緩緩飲之能生精養血益氣安神其功不可盡述高麗參好黨參亦可熟地枸杞各五錢沙苑蒺藜淫羊藿母丁香各二錢遠志去心沉香各一錢荔枝肉七個上藥浸上好酒二斤三日後蒸三炷香久取起浸冷水中拔出火氣過三十三日飲之又方麻雀肉冬月煮食功能起陽生子其效無窮或用麻雀蛋煮食更為神妙陽舉易泄有人交合之初陽舉易泄百治不效後用大蚯蚓又名曲蟺要韭菜地內者十一條破開長流水洗淨加韭菜汁搗融滾酒沖服日服一次服至數日即能久戰可望生子癆病火動陽物易舉皮硝放手心兩手合住其硝自化陽物即不舉矣必須安心靜養為妙保生惜命者宜加意焉陰陽強不倒精自流出此名強中乃陽盛突熱不急治必發大癰難治用生地黃柏知母龍骨大黃枳殼各一錢水煎服若胃虛食少者則用黃柏甘草砂仁各一錢水煎服陰頭生瘡名下疳鱉甲炙研細末雞皮清生調服外用生甘草研末蜜調頻塗又下疳陰庠用生甘草煎湯久久黛洗海螵蛸末摻之愈陽物脹挺甘草梢二兩小黑豆五合煎濃湯服又莖中作痛用甘草梢煎服即愈腎漏陽萎不舉精流不止痛如針刺韭菜子破故紙各一兩共為末每服三錢水調日三服即止陰毛生八角蝨生毛孔肉裡奇癢難忍用百部浸燒酒內浸透蘸酒塗搽擦之數次自絶小腸氣痛腎子腫脹偏墜名曰疝氣用老絲瓜又名水瓜又名線瓜瓦上焙枯研末熱酒沖服重者不過三服即愈雖氣痛衝心亦效又方凡疝初起必發寒熱疼痛欲成囊癰者用新鮮地骨皮即枸杞子根生薑各四兩共搗如泥用袖包於囊上其癢異常一夕即消永不再發疝氣腫脹如斗並治寒疝偏墜沉香紫蘇各五錢老香櫞一個切碎以雄豬尿泡一個洗淨入藥於內好酒四五斤煮爛搗麵糊為丸桐子大酒送下四五十丸藥完全愈陰囊癢名腎囊風又名繡球風已破者為腎囊癰地骨皮二兩吳萸一兩煎湯久久熏洗效又鏽舊釘頭數根滴醋一酒杯瓦罐底磨濃調抹四五次全好又方乾者用油胡桃油潤之濕者用甘爐石蛤粉撲之又方陰囊濕癢蘇葉枯炭共研末摻之即止腎莖肛門瘙癢陳葫蘆燒灰存性撲摻患處立愈腎腫如水晶腫大潮濕灶心土三升研碎炒熱鋪凳上再以川椒小茴撒在上面將陰囊熏燙冷則再炒三次愈又方或多因坐地所受風濕或蟲蟻吹著所致用蜂蛻五錢水煎洗腫處二三次即愈腎陰腫大荔枝核燒研末蜜調敷並煎湯服即愈腎子爛出鳳仙花子生甘草等分為末麻油調敷即生肌小便不通食鹽炒熱填臍眼上用艾火燒五次即通又方田螺一枚鹽半匙生搗敷臍下一寸三分雖腹脹如鼓可通又方牛膝二錢車前子一錢同研末水煎空心服又方有種氣閉小便不通醫家往往以澤瀉木通車前豬苓等藥全無一效唯用當歸身一兩川芎五錢柴胡升麻各二錢五分水二碗煎八分一服即通曾救多人孕婦及老年之人加高麗參一錢此林屋山人祕方也口渴小便不通生地二錢元參一錢五分麥冬木通黃芩葶藶桑白皮天花粉地骨皮以上各一錢煎服甚效小便白如米汁此心脾不調小便在地片刻白如米汁腎氣渾濁也用真川朴薑製一兩茯苓一錢水酒各一碗煎服不飲酒者水煎服極效小便過多此脬音胞氣不足用益智仁鹽炒烏藥各等分為末酒煮山藥為丸如梧桐子大每服七十丸空心淡鹽湯下名縮泉丸或用益智仁二十四粒鹽水炒煎服亦效又方夜間尿多懶於起動者臨睡服胡桃數個甚效夜睡遺尿夜間遣尿於床不論大人小兒用白紙一張鋪席下俟遺尿於上取紙曬乾燒灰酒服即愈不愈如法再服一次無不神效此祕方也小便出血血出如小便者是若血如點滴者為血淋照血淋治當歸一兩煎服雖尿血頭痛難忍效驗如神又方萵苣菜搗敷臍上又方雞蛋殼田螺燒灰瞿麥炒各二錢為末酒調服又方加小兒一歲者用大甘草一兩二錢水六碗煎至二碗一日服完即愈交腸小便出屎大便出尿名為交腸用舊幞頭燒灰酒調服五分即愈又方用褲襠燒灰開水沖服日服二三次愈男用女褲女用男褲童女尤佳病後失精按此症法治雖近於義頗不近理因無藥可治姑備救急凡男子病後傷於交接以致陰莖腫痛或縮入肚內絞痛欲死此症無藥可治唯急取本婦陰毛燒灰為末水調服更取洗陰水飲之可保無恙遲則不能救矣淋症論參看小便門淋有五種勞淋氣淋熱淋血淋石淋是也勞淋氣淋屬虛熱淋屬熱血淋有虛有熱石淋或因熱起或因虛起久而成砂石者也勞淋勞傷虛損小便不出小腹急痛尿出白汁一點一滴者是玉鎖丹見遺精方服之最效又方牛膝一兩乳香一錢酒煎服水煎亦可諸藥不效痛甚者服此數劑其效如神血淋更效唯夢遺失精之症則不可服再氣淋者小腹急滿小便欲解不出解後常有點滴者是治法與勞淋同又方甘蔗上青梢一兩酒煮服三日愈熱淋小便熱而赤短而澀臍下急痛者是滑石六錢甘草末一錢水沖服日服數次三日即愈血淋小便內有血點或血條者是淡豆鼓五錢煎服雖痛不可忍者無不奇效或用勞淋牛膝方亦效石淋又名沙淋小便急脹莖中痛如刀割苦楚萬狀尿如沙石者是瓦松即瓦上無根草煎濃湯乘熱熏洗小便約兩時即通又方銀硝入鍋內隔紙炒至紙焦為度研細用溫水沖化每服二錢再加滑石二錢水調服神效無比此藥能化七十二種石塊為治五淋要藥石淋尤效老人精敗淋清少年亦可用八味丸照六味丸加附子肉桂加牛漆車前服之如神遺精諸方加減地黃湯熟地六兩山萸肉真山藥各四兩芡實丹皮雲苓各二兩蓮鬚一兩龍骨生研水飛淨三錢魚膘四兩蛤粉炒成珠共研末蜜為丸如梧子大每日早晚服三四錢一月即止屢試如神功在諸方之上此林屋山人經驗祕法也益腎湯夢遺人以為心氣之虛不知非心也蓋腎水耗竭上不能通於心中不能潤於肝下不能滋於腎故相火上灼有燥脾土以致三關不閉無夢且遺徒責夢中冤業誰任其咎法當大劑補腎而少佐以益心益肝益脾之品自然漸漸成功不止而止也熟地一兩茱肉四錢茯苓茯神當歸白芍各二錢白朮薏仁生棗仁各五錢北五味白芥子各一錢肉桂黃連各三分水煎服一劑即止夢遺十劑全愈此方妙在心肝腎脾肺五臟兼補不只止其遺安其夢尤妙在黃連肉桂同用使心腎兩交自然魂魄安而精竅閉若不補其五臟而唯是止澀之則精愈旺而夢益動久則不須夢而自遺矣此方之所以奇妙而入神也玉鎖丹治腎經虛損心氣不足思虛太多真陽不固溺有餘瀝小便白濁如膏夢中頻遣骨節拘痛面黑肌瘦盜汗虛煩食減乏力此方性溫不熱極有神效五倍子一斤白茯苓四兩龍骨二兩為末水糊丸梧子大每服七十丸鹽湯送下一日三服又方蓮子心二錢硃砂一分共研勻開水調服數劑愈又方雄雞肫皮七個焙乾為末每服一錢空心酒下截腸怪病大腸頭出寸余痛苦難忍干則自落又出名曰截腸腸盡則不治初截時用盆盛真脂麻油坐入浸之另飲大麻仁汁數升而愈肛門生瘡肛門主肺肺熱即肛塞腫縮生瘡雞內金即雞肫皮燒存性為末干敷其效如神大便虛閉連須蔥頭三個姜一塊鹽一錢豆豉十餘粒搗作餅烘熱敷臍中捆定良久氣通即愈不通再敷必效又熱閉者或口渴或小便短澀黃而臊者是叭達杏仁松子仁大麻子仁柏子仁各三錢搗爛滾水沖蓋片刻當茶飲或加甘蔗汁半杯更妙老年人或患癰毒大便閉結者服此最效大小便閉塞不通以病人坐桶上燒皂角煙燻自通或用大皂角燒存性為末粥飲下三錢效又方苦楝子茴香穿山甲各八分牽牛子鹽水炒錢半煎服有人大小便不通呻吟立哭七晝夜百藥不效服此三劑愈此方妙在多用牽牛以其能達右腎命門走精故奏效如神人多以為性烈棄而不用不知施之得當自能有益於害也大便下血名曰腸紅又名腸風槐花荊芥各炒二錢為末酒調服又方當歸身山萸肉生地阿膠石膏炒珠各一兩一斤棉花子以上五味俱炒焦黑色為度研末用柿霜一二兩和勻每早服四錢開水調下臨晚再服三錢俟糞色變黑血漸止矣忌食花椒胡椒燒酒又方有人大便下血百藥不效勢甚可危食辣椒又名辣茄必須多食少則不效食後下血更多因此斷根人多以辣茄性熱豈知此物能去大腸之熱故奏功如神也又糞後下血用艾葉生薑煎濃服三合寒泄胡椒大蒜作餅敷貼臍上或酒炒艾絨作餅敷均效又方生薑艾葉煎服熱泄六一散服之最妙或用緑豆湯溫服亦可久泄不止諸方車前子鹽水炒七次真山藥炒雲苓各二兩炙草六錢共為末每服二三錢炒糊米煎水調服此神方也又方陳石榴皮焙乾研末每服二錢米湯下百方不效服此便止不可輕視又方白朮一兩車前子五錢煎服立止此分水神方也又方用大蒜搗貼足心或貼臍中此外治出千金方也又方大蒜須加銀硃搗融敷臍眼內立止如神又方臭椿樹皮五錢用酒二碗煎服立愈五更溏瀉五神丸專治五更腎泄久不愈者以此丸補命門相火即以補脾也破故紙酒炒浸蒸用四兩胡桃肉去皮四兩五味子炒三兩吳茱萸鹽水炒一兩生薑煮棗為丸胡椒大每眼三錢臨臥鹽湯下又方五味子二兩茱萸湯泡五錢同炒為末每早陳米湯服二錢老人五更瀉黃老米三合炒蓮肉去心三兩豬苓澤瀉炒白芍土炒各五錢木香半錢白洋糖一兩乾薑二錢共為細末和勻每服三錢空心開水下其效如神一說並治脾虛泄脾泄不止瀉出食物不化小兒科痘症內未有妙方應參看凡大人小兒泄瀉食物不化胃無火也是胃陽虛生白朮雲苓各二錢川朴薑汁炒砂仁陳皮各一錢生益智錢半水煎數服即愈屢用皆效又方柿餅燒紅放地上用碗蓋住不蓋則成灰無性俟冷研末米湯調服二錢卻愈有一小兒由六歲至十二歲泄瀉食物不化百藥不效服此三次全愈痢疾諸方痢症每起於暑天之鬱熱而又感以水濕水露之氣紅白相間如血如膿甚者如屋漏水如魚凍冰裡急後重崩逐瘀痛欲下而不能欲不下而不得一日夜數十次甚至百餘次氣息奄奄坐而待斃此痢之概也若驟止其邪則死在頃刻不止其邪則危絶如絲欲補氣而邪氣轉加欲清火則下行更甚此時唯有因勢利導之方可行或疑人已氣血虛敗更加利導恐其難堪不知邪氣一刻不去則正氣一刻不安古人治痢無止法信不誣也方用白芍當歸各三兩蘿蔔子一兩枳殼麵炒一檳榔車前子甘草各三錢水煎服一劑即止二劑全安可用飲食矣此方之奇妙全在重用歸芍蓋水瀉忌當歸之滑而痢疾則正喜其滑也芍藥味酸以平肝木使木不敢再侵脾土又有枳殼檳榔消逐其濕熱之邪又加車前子分利其水濕而又不耗其真陰之水所以功勝於茯苓也尤奇其用蘿蔔子一味蓋蘿蔔子味辣而能逐邪去濕且又能通達上下消食利氣使氣行血分之中助歸芍以生新血而祛蕩其敗汙也少加甘草以和中則無逼烈之患此奏功之神奇實有妙理耳又方不拘紅白久近皆治有患痢日夜不止夜不能睡藥窮待斃矣用此一服即安三服全愈蘿蔔捶取自然汁兩酒杯生老薑自然汁半酒杯生蜂蜜一酒杯細茶陳者佳濃煎一杯和勻服若無蘿蔔多用萊蔔子冷水浸透搗取汁亦可又方元胡索末三錢酒調服雖腹痛欲死者亦神效又方金銀花五錢炒枯研末不拘紅白用開水調白糖空心服服後其痢更甚兩日全愈奇效無比小兒一歲服一分又治紅白諸痢方罌粟殼去肉二枚石榴皮二片甘草二片大紅棗二枚烏梅二枚水煎當茶服輕者照方重者倍之屢試神效孕婦痢疾雞蛋二個破一孔如指頭大入黃丹五分用銀簪攪勻以紙封口入飯甑內蒸熟食神效噤口痢疾用蓮子肉去皮炒為末每服一錢空心米飲湯調下又方五穀蟲水洗淨瓦上焙黃色研為末用黑砂糖拌勻新汲水送下即愈又方神麯炒山楂白糖各二兩川連一錢另蒸烏梅三個甘草五分荔枝肉七個用水三碗煎溫服且吐且飲自然思食止痢此方屢試神奇活人無數不可輕視久痢不止麻油煎鹹魚食數次甚效此方奇驗莫測其理凡瀉痢初起即以細茶生薑各三錢水二盅煎服重者各五錢服休息久痢方豆腐醋煎常常服之甚效又方用雞蛋一個打破用黃蠟一塊如指大熔化以雞蛋拌和燒熟空心食之脫肛不收用生鐵二斤水煮沐汁日洗數次雖脫肛多年亦效又方多食辣茄極效有一小兒脫肛數月百藥不效後食辣茄數次肛即縮上並不再脫屢試如神此物味宜辣食宜多食少而不辣者不效並治大人脫肛及痔瘡腸風下血俱極神驗食後下血更多即易愈也又方用蟬蛻為末菜油調敷肛門立效腸痔便血刺蝟皮五錢紅雞冠頭五錢血宋二錢槐花五錢共研末每日調下二錢痔漏神效丸方末破曰痔已破曰漏當歸酒洗川連酒洗象牙末各三錢淨槐花小川芎酒洗滴乳香各二錢露蜂房一個槐樹上佳榆樹上次之炒共研末黃臘二兩熔化入藥末為丸空心煎漏蘆湯送下三錢至五日漏孔內退出肉管待二三指長剪去再出再剪管盡肌生而愈神效之極又方夏枯草八兩甘草節四兩連翅四兩去子為末金銀花一斤煎濃湯為丸每晨鹽湯送下三錢初起者一料全愈久者兩料除根又方蒲公英一斤生豬腳一隻同煎湯去浮油濾渣熏洗又方象牙二斤銼研極細每早用白煮整雞蛋三個蘸象牙末二錢食或以末調入粥內食服完自愈內痔腫痛豬大腸六兩蚯蚓十餘條煮融去蚓食腸極效又內痔不出用草烏為末口水調點肛門痔即反出乃可用藥敷治遠年內外痔雄豬大腸三尺截去肛門七寸刺蝟皮三張新瓦焙存性白礬槐米各四兩三味為末入大腸內兩頭扎緊煮爛搗為丸桐子大每早開水下四五錢痔瘡腸風下血生何首烏研末每早米湯調下三錢洗痔瘡方蘄艾歸身尾蒼朮川芎枸杞根防風荊芥花椒皮硝槐皮以上藥各三兩加韭菜根六兩煎數滾先熏後洗一日數次不過三四日自愈又方尿壺一把入皮硝一兩開水泡入借氣熏洗之痔瘡神方用胡桃去肉五倍子填滿殼內線扎好黃泥封固炭火煅黑煙淨為度取出研細蜜為小丸每服三錢紅腫翻頭痛不可忍大螺螄一個入冰片五分久之化為水以雞翎掃上止痛消腫永戒食螺男女久痔不痊翻花疼痛難忍忌用刀針不致吃苦殞命番木鱉水磨濃如冰片少許搽敷或用紙浸透汁貼之亦可痔漏脫管生肌方立秋後馬齒莧三十斤取汁熬膏以槐角三斤焙研末入膏內每服三錢開水送下效又方以退管散五錢黑糖拌空心陳酒下管自出乃止坐板瘡腫痛多膿者用密陀僧生礬大黃等分為細末敷之或用絲瓜皮焙為末燒酒調塗效股上生瘡生股尖者名臀尖亦有生兩旁者色紅腫照癰毒各方治之色白者照陰疽方治之懸癰又名騎馬癰在海底初起細粒漸大如桃李俗呼偷糞老鼠潰爛之後一經房事即成漏生管難治體弱者更危即用生甘草濃煎多服以殺其毒外用野紫蘇面青背紫者是葉焙乾為末麻油調敷又方潰爛久不收口未生管用水仙膏敷之神效已生管者用拔管散治之又方橫紋生甘草一兩截數段水泡文火烘乾再泡再烘以中心水潤為止切細加當歸一兩用酒煎服日服一次半月後方能消盡腳氣論足受寒濕腫而痛者為濕腳氣宜清熱利濕搜風又有攣縮枯細痛而不腫者名乾腳氣宜養血潤燥此症始受於濕復夾風寒暑熱之邪而成故先起於腿足必腳屈弱而舉體轉筋肢節痛而足胻腫小腹不仁心中悸動胸滿便澀但發熱頭痛身疼之候絶似傷寒人多誤治故仲景以腳氣為類傷寒症另立篇目以別之古人謂之厥症類傷寒則難察能致人死則難治詳究其症候之由平居於酒色及勞役之後外感風寒暑熱忽然手足逆冷或熱其氣逆從腳下而起上衝小腹作痛或脹悶或嘔吐或昏迷或兩足脛紅腫寒熱如傷寒狀此或一月一發半月數月一發漸漸四肢攣縮腳膝腫大此為腳氣非中風寒也或發作而手足不病者亦謂之腳氣此病南方人最多雖由卑濕之氣所感而始實自酒後房勞傷其胃腎倘不知為腳氣而誤以傷寒中風治之其不至於殺人者鮮矣外治法白礬二兩地漿十大碗新杉木數片煎六七滾用衫木桶新者更佳盛一半浸腳留半徐徐添入上以衣被圍身使略有微汗洗完隨飲薄粥如一次未愈再洗一次照前方更加硫黃三錢無有不愈矣取地漿法於淨土地上掘二三尺深用新汲井水傾入攪濁少俟澄定取半清半濁者吹去浮沫用之又方治腳氣兩脛紅腫鳳仙花葉枸杞葉同煎濃湯浸洗並生搗融敷之男女有於腳氣痛不可忍方用乾木瓜一個明礬一兩煎水乘熱先蒸透足俟水略溫再洗二三次即愈治寒濕腳氣方花椒一兩蔥一把姜三大片水數碗煎湯熏洗腫消痛止治一切手足風痛及酒腳風漏肩風濕氣作痛其效如神方用蔥蒜姜各取自然汁一碗醋一小碗熬濃入飛面二斤牛膠四兩熬成膏用青布攤貼患處或加鳳仙花汁一盞鶴膝風三陰之氣不足風邪乘之兩膝作痛久則膝頭漸大腿漸細痛而成敗症矣宜早治之大何首烏煎酒服以醉為度更搗渣敷膝頭數次可愈永遠戒食鰍黑兩魚又方冷飯糰草即商陸取葉入鹽少許搗敷患處數次自愈又方鮮白芷酒煎成膏每日酒送服二錢再取塗患處效膝上生病又名牛頭癰連須蔥頭切碎用糯米飯乘熱拌敷重者五六次必消瘭疽生手足肩背纍纍如赤豆剝之出汁用大鯽魚一個亂髮一大團豬油四兩同熬成膏塗之永戒鯽魚烏龜肉腿痛轉筋氣衝入腹此寒也若不急治痛衝入心難救急用木瓜茱萸各二錢食鹽五分水煎服愈腿癢難忍名寒毛瘡用做過豆腐之渣炒熱敷以布包緊冷則隨換包過一夜即愈腰臀腿膝疼痛不己真茅山蒼朮米泔水浸一日夜曬乾鹽水炒五錢黃柏去皮酒浸一日夜炙焦五錢水煎空心服日服二三次其效如神並治一切腳氣極驗兩腿不能動作臥床不起此亦痿症如不起床席已成廢人者內心熾盛以熬干腎水也苟不補腎惟圖降火亦無生機雖治痿獨取陽明是胃火不可不降而腎水尤不可不補今傳一奇方補水於火中降火於水內合胃與腎而兩治之自然骨髓增添燔熱盡散不治痿而痿自愈方名降補丹熟地元參麥冬各一兩甘菊花生地沙參地骨皮各五錢車前子二錢黨參一錢水煎服此方降中有補補中有降所以為妙胃不生火自不耗腎中之陰腎水既足自能制胃中之熱兩相濟而兩相成起痿之功孰有過於此者乎足軟難行足軟不能步履人以為腎水之虧不知非腎也蓋氣虛不能運用耳方用補中益氣湯高麗參二錢炙耆焦術各錢半炙草陳皮各一錢當歸五分升麻柴胡各三分姜三片棗三枚再加牛膝三錢炙耆一兩臺黨三錢水煎服四劑即能行走此方內有石斛一味經名醫刪去更見功效又方杜仲一兩半酒半水煎連服數劑三日就行五日全愈腎虛腳軟痛極者服此最效火把焦刺腳火把焦頭斷落地上刺入腳底比蛇咬更毒從腳腫至大腿猶可救治至腹則無救矣急用蛔蟲數條搗爛敷之即消腫而刺自出臁瘡爛腳此瘡多因濕熱而起若叉手甲抓傷破爛淋漓纏綿不已欲求速愈切忌手抓為要方用驢蹄剔下腳皮或人剔下腳皮煅研以麻油調搽效濕處燥摻又臁瘡有蟲蛀用馬齒莧研末蜜調敷蟲自出黃香膏治臁瘡屢試如神並一切癰毒大瘡日久不愈亦效松香白水煮透取出放冷水內搓洗數十下再煮再洗如此九次倒地待冷取起每一兩加輕粉三錢銀硃一錢白蜜少許煉老成珠加菜油少許燉熱攪勻看瘡之大小作餅置瘡上將綢條扎住一周時取下用滾水搓洗極淨翻轉再貼周時取下再洗再貼只要一個藥餅直貼到好不須另換將此藥餅洗淨收好如遇此瘡再與別人貼仍前一周時一洗一貼此餅若醫過三人之後貼上即好若醫過十人貼上更能速愈奇絶妙絶又婦人臁瘡用舊船石灰為末麻油調搽亦效脛瘡一名黃水瘡生腳肚初起如栗搔之漸開黃水浸淫癢痛潰爛繞脛而成錮疾用酸石榴皮煎水冷定洗之日日浸洗自愈兩足痛如刀割先用生薑切片蘸油擦痛處隨用生薑火燒熟搗爛敷患處其痛立止腳趾縫中生毛拂著痛不可忍真桐油煎熱滴一點於毛上毛即脫落忍痛片時即愈腳心生瘡又名牛臉腳心名湧泉最為要害之處如有瘡癤初起色白不甚疼痛無論已破末破須查陰疽各方加意治之或以生草烏酒磨塗之愈腳底木硬牛皮膠以生薑汁化開調南星末塗上烘物尉之又腳底開裂用白及刮取細末以口水調敷有挑夫腳底破縫難行此藥敷之止痛能行神妙無比腳底生繭切忌用刀蔥頭荸薺共搗汁一碗煎再用松香四兩麻油八兩熬至滴水成珠方入前汁攤膏藥貼上即落腳底板紅腫熱痛名為腳隱大蒜頭量用和鹽搗爛敷過一夜次日即愈又雞眼方取活蜈蚣用香油泡一二日取出搗爛敷之過夜根即拔出不致再發並治蛀皮癬又行路腳底起泡方用生灰面調敷一夜即平腳冷如冰生附子二錢好酒麴三錢共為末燒酒調敷足心甚妙遠行健步細辛防風白芷草烏各等分共為細末凡人將行遠路者先將鞋底內用水微噴濕將此藥摻勻於內雖日行數百里腳不腫痛又方蘿蔔炒研末白礬研末共鋪鞋底內遠行腳不作痛極效外感初起柴胡荊芥製半夏黃芩甘草水煎服此先治之法也四時不正之氣由皮毛而入營衛今用柴胡荊芥先散皮毛之邪兔致入里半夏黃芩使不得夾痰夾火為患又用甘草以和中所以邪先散而正氣又不受傷又方亦先治法也柴胡白芍天花粉各二錢當歸甘草陳皮黑桅子各一錢水煎服此方不獨治外感也凡肝氣鬱者服此一劑即快又治內傷初起者服此一劑亦效
