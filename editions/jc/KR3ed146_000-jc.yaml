body:
  text: 跋古人有言曰生之於我利亦大焉夫治生以不傷為本養生以醫藥為先醫家之言以素問靈樞而下汗牛充棟不可殫述然讀之者未必盡解解之者亦未必盡得其奧旨醫之道難言矣然而三折肱者神明變化妙術生人雖草根樹皮至賤之品間一用之而靈透心脾如響斯應似又有無足難者故諺云醫者意也既得其意而無不可通者也梁安胡君謙怕念切恫眾嘗留心於是歲庚午手一編示予題其端曰經驗選秘蓋即君所輯之良方也吾人利濟為心秘之以利己易若公之萬世以利人脾人人習知按症試方瞭然心目是猶聚千百良醫於一堂而施其活人之術也胡君之功顧不遠且大哉昔抱朴子肘後備急方有方而無論孫真人千金要方又廣至九十餘卷令人目送五色閱之者未免傷繁今君所輯有簡便者有詳述其病源者有疏其方之意者且方以類聚使人知按症以求方症隨方注而不必循經以求症較之肘後千金兩方書尤為簡括周備君不以醫名而能通醫理若此此即所謂既得其意而無不可通者也因勸手付民復歡喜讚歎而為之序時同治十年歲次辛未如月之吉海寧鄒淦儷笙氏撰
