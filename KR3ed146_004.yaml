body:
  text: 卷四通治經閉蠶砂四兩炒半黃色用無灰酒斤半用瓦罐煎滾瀝去蠶沙將酒入瓷瓶封固每溫飲數杯自通如因脾胃損傷血枯不行者用加減補中益氣湯黨參白朮各二錢炙耆柴胡各七分歸身白芍川芎陳皮各一錢神麯炒麥芽炒炙草各五分薑棗引水煎服如因氣鬱血閉不行者用開鬱二陳湯陳皮茯苓蒼朮香附制川芎各一錢半夏制青皮莪朮檳榔各七分甘草木香各五分姜引水煎服更宜服四制香附丸以經行為度四制香附丸此婦人常用之要藥也淨香附一斤用酒醋鹽水童便各浸三日焙研烏藥八兩共為末醋和為丸開水下室女經閉遍身浮腫月水初行誤用冷水洗手血見冷則凝不出面色青黃遍身浮腫人作水腫治之不效宜用通經丸通血消腫即愈三稜莪朮赤芍川芎當歸紫菀劉寄奴各八分川山甲一片共為末米糊為丸酒送下經逆上行從口鼻出血先以好京墨磨一盞服之其血立止次用歸尾紅花各三錢水盅半煎八分服處女經水久閉繹緯屑四錢紅花四錢胡桃肉半斤陳酒半斤煎服赤白帶下帶久不止者專以補虛為主宜服十全大補湯去地黃加陳皮半夏乾薑分兩隨酌煎服亦有諸藥不效年久不愈乃濕熱也貫衆一個去皮毛以好醋泡透慢火炙熟研末每服三錢空心米湯調服神效赤白帶下臍腹疼痛白芍二兩炒乾薑五錢共為細末每服三錢空心溫米湯調下效驗如神乾血癆神方過三年者不治白鴿子一隻去腸雜入血竭一兩以線縫合陳酒煮熟食之瘀血即行如心中慌亂急食白煮豬肉一塊即止病二年者用血竭二兩三年三兩血淋白雞冠花燒灰存性米湯調服三錢數服愈種子芻言方書每載種子一門誠屬綿延宗祀之苦衷竊蕃謂子孫蕃衍皆由租宗積德已身行善上天賜以嗣息使獲多男之慶得遂燕翼之謀所關非淺豈可強求每見富貴之家年未四十託名無子藉號體虛廣蓄姬妾偏覓奇方金石雜投辛溫並進以為育麟有望誰知腎火熾而情欲肆情欲肆而精液漓神衰形喪終嘆無兒兼之年壽不永中道棄損而與寡欲多男之說不大謬哉上天好生挽回甚速奉勸艱嗣君子深體天心廣行陰出言配天地之和居心存忠厚之意肅房幃而勿求美色談嗜欲而毋所乃躬或敦宗睦本或濟急扶危或流傳善書或創興義學或矜恤孤婺或施槥助葬或饋藥送衣或有力而獨為或無資而勸募一切善事次第力行自然螽斯載詠鱗趾呈祥也況夫人而求子原為家業無人可付宗祧無人可守耳如有家業而乏子嗣財已無主不思修為專圖睃刻繼嗣凱奪𣂏訟多端身未寒而家已破仍飽他人之腹徒增一已之衍愚孰甚焉何如以無主之財而作有益之事乎伏願求子者勿恃藥餌堅守仁心身其康強子孫其逢吉矣即或不然早立應嗣飲之食之教之誨之雖毛里不屬而怙恃有恩如同己出亦可守祧也有心求嗣者當不河漢斯言保命延生種子戒期內經云冬不藏精春必病瘟夏日宜獨宿淡味保養金水二臟以卻秋冬疾病二至乃陰陽相爭之候宜節嗜欲兔生百病正月初一天臘玉帝校生人祿命犯者削祿奪紀初三萬神都會犯者奪紀每月同初七上會日初九玉帝誕犯者絶嗣十四十五十六三元下降犯者天亡二十五月晦犯者減壽每月同二十七北斗下降犯者奪紀每月同二十八人神在陰犯者惡疾每月同三十司命奏事犯者減壽每月同月小戒二十九二月初一犯者奪紀每月同初二萬神會初三文昌帝君誕犯者削祿奪紀十五老君誕犯者奪紀每月同十八先師諱辰犯者奪紀十九大士聖誕犯者奪紀二十五二十七二十八三十同前三月初一同前初三玄天上帝誕犯者奪紀初九牛鬼神出世犯者産惡胎十五同前十六准提菩薩誕犯者奪紀十八中嶽帝誕二十五二十七同前二十八東嶽帝誕犯者奪紀三十同前四月初一初三同前初四萬神化善犯者失音初八釋迦佛誕又善惡童子降犯者血死十四呂祖誕犯者削祿紀十五鍾正陽仙師誕十六惡疾二十五二十七二十八三十同前五月初一南極長生大帝誕犯者減年初三同前初五地臘五帝校人祿命初六初七十五十六十七十八二十五二十六二十七以上九日名九毒日犯者得病損壽若十五日子時犯者主三年內夫婦皆死十六為天地造化萬物之辰犯者大凶十三關聖誕犯者奪紀二十八三十同前六月初一初三十五同前十九大士得道二十三火神誕二十四雷祖誕二十五二十七二十八三十同前七月初一初三同前初七道德臘五帝校人善惡犯者奪紀初十陰毒日犯者惡疾十五申元地官校藉犯者奪紀十九神誕犯者惡疾二十五二十七二十八同前三十地藏菩薩誕犯者奪紀八月初一初三同前初三又灶君誕犯者多病初十北嶽帝誕十五太陰朝元之辰犯者大凶二十五同前二十七先師孔子聖誕犯者奪紀二十八三十同前九月初一南鬥降辰犯者奪紀初二同前初九鬥姥元君誕犯者男女俱陷黑簿亥時犯者雙亡十五同前十九大士出家犯者困苦二十五二十七二十八同前三十藥師佛誕十月初一民歲臘犯者奪紀初三同前初五諸神下會犯者凶初六天曹考察初十西天王降犯者暴亡十五下元水官校藉犯者減壽二十五同前二十七北極紫微大帝誕二十八三十同前十一月初一初三同前初六西嶽帝誕十一太乙天尊誕十五同前十七阿彌陀佛誕犯者奪紀十九太陽誕二十五掠刷大夫降犯者凶二十七二十八三十同前十二月初一初三同前初七犯者惡疾初八王侯臘犯者得病十五同前十六南嶽帝誕二十天地交泰犯者奪紀二十四司命上奏善惡二十五玉帝三清巡視諸天定來年禍福犯者得病損壽二十七二十八同前除夕諸神考察犯者得病損壽遇閏同前每歲四立二分二至並前一日為四離四絶三伏甲子庚申上下弦日父母誕諱夫婦本命及正沖日酷暑嚴寒疾風暴雨雷電晦瞑日月薄蝕以及過醉空腹遠行鬱怒病餘産後犯者得病損身停燈行房最干神怒俱宜嚴戒唯室參井鬼柳張房心八星為合宿是宿所在可以交合非唯生子大貴亦利身大吉夫娶妻必期偕老生子必望長成乃人有伉儷極篤而中道死亡産育艱難而半途夭折者只因縱欲暗犯天奪其算神降之殃而不自知也不知雖房幃正色而亦有克治之道焉此本即將拙庵秦太史所傳刪繁就簡止擇其最重者録之願篤信者每縫禁忌留心謹避必臻上壽矣求嗣得孕法昔褚澄言男精泄於先而女精後至則陰裹陽主男孕如女精泄於先而男精後至則陽裹陰主女孕又言月信初盡其濁氣未清而交媾即女務待經止兩足日則女體虛而濁氣盡再男人保養月餘陽勝於陰定成男孕又論子宮左右如男泄於婦人之左生男右則生女此男清女濁男左女右陽壯陰衰之至論也又必俟天氣晴明日暖風和明星亮月姑受胎者多富貴聰明倘疾風暴雨或醉飽或服藥石而受胎者多夭其迷霧氣怒而受胎者多愚蠢貧賤或雷電之後而受胎者定生怪物求嗣者慎諸調經種子湯歸身川芎吳茱萸各一錢熟地制香附各錢半白芍茯苓丹皮各八分元胡索陳皮各七分若經水先期者色必紫加條芩八分過期者色必淡加官桂乾薑熟艾各五分不論先期落後每服加生薑三片水一碗半煎八分俟經水至日空心服起以渣再煎臨臥服一日一劑服至經止兩三日交媾即孕經期准而不孕者以續斷沙參杜仲當歸益母草各二錢川芎一錢砂仁炒研五分制香附二錢橘紅一錢紅花三分至期服四劑下期再服而孕又經通不受胎者取參曬乾磨粉日以二錢熱陳酒送下兩月內即孕保産無憂散專治一切産症有胎即能安胎臨産即能催生不拘月分凡胎動不安腰痠腹痛一服即安再服全愈臨盆艱危者一服即生橫生逆産六七日不下及兒死在腹中命在須臾者一服即下懷孕者七個月即宜預服一劑八個月服二劑九個月服三劑十個月亦服三劑臨産服一劑斷無難産之患百發百中功效如神當歸酒炒川芎各一錢五分川貝母去心菟絲子酒泡各一錢厚朴薑汁炒蘄艾醋炒各七分生耆荊芥穗各八分羌活生甘草各五分枳殼麩炒六分白芍酒炒二錢冬月只用一錢生薑三片用水二碗煎至八分溫服藥須照方稱准不可加減如人虛極再加人參三五分更妙已産後此藥一滴不可入口切勿誤服此方藥劑分兩雖輕功效甚大不論強弱老少皆宜佛手散一說當歸鬚用一兩川芎七錢程山令云當歸用四錢川芎錢二分今擬五錢三錢系徐玉神所定也謙按當歸川芎為血分之主藥倍用亦宜也當歸五錢川芎三錢水酒煎服臨産催生無過此方之妙大抵漿水未行宜用無憂散已破或延時不生用佛手散至穩且當萬無一失若治橫生倒産子死腹中則加黑馬料豆一合炒焦乘熱淬入水中加童便一半煎藥服少頃再服一劑神效加昧歸芎湯治陰氣虛弱交骨不開此方最妙當歸五錢川芎二錢自敗龜板三錢婦人頭髮一握皂水洗淨瓦焙存性水煎服神效安胎飲專治婦人慣於墮胎屢試神驗平時無小産之患真保胎第一方也蓮肉去心不去皮家用青苧麻洗淨膠白糯米各三錢水煎去麻每早連湯服一次或服湯不服蓮肉米亦可按小産由於房勞傷損足三陰腎傷則精氣不固肝傷則血熱妄行脾傷則貽元自墮蓮肉清君相之火而能固澀真氣苧麻利小便而通子戶清淫欲之瘀熱糯米補益脾陰能實陽明空竅使胎不妄動而胎氣自安以五穀果實為方誠王道之劑也子鳴氣足時子在腹中鳴者謂之子鳴此由孕婦或缺身向高處取物子在腹中失脫口中所含疙瘩故啼治法或令孕婦作男子拜狀或以豆撒地令孕婦撿之子復含著則止矣又胎動下血不止宜服保産無優方即止一說以黃連甘草各一錢水煎服孕婦漏胎漏胎者謂既有孕而復下血也女子之血在上為乳汁在下為經水一朝有孕而乳經俱不行者聚之子官以養胎也今胎漏下是氣血兩虛胞中有熱下元不固也宜用黨參白朮歸身赤芍熟地黃柏知母阿膠艾葉條芩炙草各等分薑棗引水煎食遠服又治小産用絲棉一兩入瓦罐內封口煅灰存性空心熱酒沖服須於小産月內服以後永不再墮誤服藥欲胎墮生白扁豆去皮為末米湯調服即安或煎濃汁服亦可此症貽氣已動未墮口噤自汗手強頭低似乎中風人多在識若作風治必死慎之慎之或用無憂方服之極為妥效臨産須知凡孕婦未産數日前胎必墜下小水頻數此欲産也慎重之家合用藥物慣熟穩婆預宜備之以防不虞又燒紅石放盆內以醋澆之房中轉游數次産母常聞醋氣自無血暈之疾再房中只令穩婆一二人緊閉門戶勿使雜人往來更禁無事詢問大驚小怪總須聲靜切勿言談為要其臨産時白蜜開水薄粥美膳常要齊備渴則取蜜半盞汗水化服可以潤燥滑胎令其易産飢以薄粥食之令其中氣不乏自然易生如酷暑之時必用冷水酒掃房間解其鬱蒸之氣四面窗開以薄帳遮之使産婦溫涼得宜庶新血不致妄行可勉血暈如嚴寒之候房中四處燃火常使和暖之氣如春更要閉其戶牖塞其穴隙使邪氣不入庶兔風寒之疾催生諸方按保生無憂方服之當生即不生亦能安胎即橫生倒産胎死腹中亦能順生毫無苦楚百發百中萬應萬靈其藥甚平其功最大誠千古不磨之方切不可好奇而輕忽也朱丹溪先生云佛手散為催生聖藥又穩當又效捷與無優散功力相同凡老婦並矮小女子及體弱交骨不開者服加味歸芎湯尤極相宜催生之藥惟此三方最穩最靈萬無一失切勿亂用別藥又牛膝一物催生斷不可用慎之慎之又方陳麥草須取露天者更妙無則用舊草帽之草亦可每用一兩洗去塵灰剪寸段煎湯服難産極效此方須傳窮鄉僻壤醫藥不便及無方醫藥者全活一命陰功莫大又方用本年皇曆面上欽天監印花焚服勿令人知屢試神驗又催生祕訣行法之人朝東立定左手三山訣托水碗右手劍訣空書牛馬二字於水碗內口中默念咒曰合縫開合縫開是男是女早下來莫傷母命勿損汝胎書符畢即與服之立效難産說難産者多因産母倉惶坐草太早或胞漿雖破兒身未轉或轉未順被母用力以致足先來謂之逆産手先來謂之橫生或漏其肩與耳與額者謂之側産或被臍帶纏拌不得下者謂之礙産倉猝之間二命所繫不可無端嚷鬧大驚小怪更不許穩婆混行動手總以鎮靜為主無論逆産橫産礙産將兒輕輕送入用前佛手散服之最穩最靈臨産兒尚未生有物先出形如胞衣乃子宮也此時兒尚未生切勿用萆麻子塗頂心以致誤時速將子官納入服以補藥用無憂散最妙靜候兒生母子無恙胞衣不下以明礬三分研末開水沖服立下又方萆麻子十四粒去殼搗爛貼兩足心胎衣即下下後趕急將藥洗去久則恐腸出也如腸已出仍用此藥敷囟門上腸自收入藥隨洗去勿遲産後陰戶垂出肉線長三四尺觸之痛引心腹老薑三斤連皮搗爛入真麻油二斤炒乾先用舊綢五尺招疊輕輕乘起肉線使之屈作二三團納入陰戶再用綢袋盛姜使姜氣就近熏之冷則隨換熏一日夜收入大半二日收盡神效非常肉線不可斷斷則不治並宜禁風産後惡露不止産後衝任損傷氣血虛憊舊血未盡新血不斂相併而下日久不止漸成虛勞者宜大補氣血使舊血得行新血得生不可輕用固澀之劑使敗血凝聚變為癥瘕及為終身之害用十全大補湯如小腹刺痛者四物湯加元胡索蒲黃炒各等分水煎服産後血暈五靈脂半生半炒為末白湯調一錢灌之入喉即活又方生半夏末以少許吹入鼻中自醒又方提起頭髮坐定不可倒眠急以磚石燒紅投陳酒內對鼻孔熏之自醒另用當歸六兩川芎三錢芥穗三錢炒黑水煎臨服入好酒童便和服神效之至或服華他愈風散最為神妙華他愈風散治産後中風口噤手足抽掣角弓反張或血暈不省人事四肢強直或心煩倒築吐瀉欲死等症荊芥穗去根不用焙乾研末每服三錢童便調下口噤則撬牙灌之齒噤則不研末以童便煎之俟微溫灌入鼻中其效如神若無童便則用黑豆亦可並治産後鼻血不止者亦服三錢即愈産後腰痛女人之腎胞脈所繫産後下血過多則胞脈虛脈虛則腎氣虛腎主腰故令腰疼其症隱隱作痛用補腎地黃湯熟地杜仲青鹽水炒去絲獨活肉桂續斷各一錢生薑三片棗二枚水煎空心服乳癰初起芙蓉根切碲酒煎儘量飲之即內消內吹外吹乳結核痛寒熱交作甚者噁心嘔吐胎熱所致為內吹兒食乳所致為外吹俱並用柴胡陳皮川芎山梔炒黑青皮石膏煅黃芩酒炒連翹各一錢甘草五分橘葉二十片水二碗煎八分食遠服外用蔥白切碎炒熱敷乳上以帛包之冷則換數次效又方硃砂書子醜寅卯十二支字放本婦所戴簪上本命所屬之字不寫戴之即愈於初起時用之最妙血崩百草霜三錢陳京墨磨濃一酒杯桃枝嫩杪三個楊柳嫩杪三個冬月則用嫩枝搗爛砂糖煎化調服立止陰內生蟲癢極難忍豬肝切成長片以豬油拌川椒末同碎蔥煎乾待稍溫納入陰內少頃取出再換其蟲隨肝而出如數次蟲出盡再以五倍子川椒白礬蔥頭煎水洗自愈又陰癢生瘡用蛇床子一兩艾葉白礬杏仁各五錢川連三錢煎水久洗自愈醒迷至寶丹痰迷心竅癡呆癲狂不論新久其效如神膽南星生棗仁遠志肉茯神柴胡各三錢川貝母半夏曲各二錢陳皮砂仁生甘草廣木香各一錢共為末蜜丸桐子大硃砂三錢為衣每晨開水送下三四十丸發禿重生嫩棗樹枝取一把截作一尺長滿插瓷瓶勿令到底上面以火燒之則汁流於瓶內先以溫米泔水洗頭後將汁刷在禿處自之發自生面上黑點兼能美容陀僧白芷三奈鴿子糞各等分研極細末每晚以蜜水調搽如敷粉法半月見效又方治頭生白屑用白芷玉不留行等分為末乾摻一夜篦去點痣方用鹼泡水入糯米十四粒以石灰一小塊入鹼水融化點之再加信石少許更速妙腋下狐臭石緑三錢輕粉一錢水醋調搽藥完除根未搽藥時己搽藥後常以生薑汁塗之終身戒食泥鰍汗瘢一方用生黃瓜蘸硼砂末擦隨搽隨愈搽後以汗出效雖人女科內男人並治刺蒺藜一味研極細末過篩去刺用白蠟調搽以手指用力推擦黑斑隨手而愈唯薄留影子連搽五六次後除根愈後永遠戒食各種飛禽野鳥不致再發女人病邪與邪物交獨言獨笑悲哭恍惚雄黃一兩松香二兩熔化以虎爪攪之丸如彈子大夜燒籠中令女坐其上以被蒙之露頭在外扶住熏之藥完次日再配連熏三日邪自斷永遠忌食螃蟹又夜寐鬼魘以雄黃戴頭上及系左腋下俱可兔又男女為鬼怪所迷以桐油多塗陰處數次自絶灸鬼法治一切邪祟驚狂謔妄逾牆上屋尋死等症將病者兩手大拇指用細麻繩縛並平正於兩指縫中離指甲角一分半之處名鬼哭穴用艾火灸三七壯自愈治精怪纏攏法須黃紙硃砂書之咒曰天火燒太陽地火燒五方雷火巽方發燒死諸不祥太上老君急急如律令佩戴並焚服神效此符能闢諸邪小兒佩戴以囊系之邪神遠遁
