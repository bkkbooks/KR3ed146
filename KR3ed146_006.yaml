body:
  text: 卷六急救論治凡五絶卒死急取韭菜搗汁灌鼻中或加皂角末麝香同灌更為快捷凡縊死溺死及一切自盡等症人多畏懼不救亦有以為已死不能復活者不知救治得法亦可回生即使萬無生理亦當盡人事以聽天命不可見死而不救也縊死不可割斷繩索或有回生丹灌之即活真仙丹也急用手裹衣物抵住穀道若系婦女則連陰戶抵住抱起解繩安放平正揪髮向上揉其項痕捻圓喉管腳喘兩肩以兩竹管吹氣入耳內或刺雞冠熱血滴鼻中男用雌女用雄男左女右再屈伸其手足又輕輕摩其肚腹如此即有氣從口出不可鬆手或以皂角末吹鼻少刻以淡薑湯或清粥與食令潤咽喉漸漸能動乃止從早至晚雖已冷可活自夜至早稍覺難救總之身體稍軟心下微溫者雖一日以上若依此救法多吹多摸無不活者勿謂已冷不救也溺死撈起時急急將口撬開橫銜筷子一根使可出水以竹管吹其兩耳研生半夏末如豆大吹其鼻孔又用皂角末置管吹其穀道如系夏月將溺人肚膜橫覆牛背上兩邊使人扶住牽牛緩緩而行腹中之水自然從口中並大小便流出或以生薑擦牙再用生薑湯調蘇合丸灌之或生薑汁灌之如無牛以鍋覆地將溺人臍對鍋臍俯臥以手托其頭如系冬月急將濕衣更換一面炒鹽用布包尉臍一面厚鋪被褥取灶內草灰多多鋪於被褥之上令溺人覆臥於上臍下墊於棉枕一個仍以草灰將渾身厚蓋之灰上再加被褥不可使灰迷於眼內其撬口吹耳鼻穀道灌薑湯等俱照夏天法其冬天蘇醒後宜少飲湯酒夏天少飲粥湯切忌火烘逼寒入內不救倘或微笑必急掩其口鼻如不掩則笑不止不救又不急於見火一見必大笑不救又灌酒湯不可太熱恐傷齒盡落暴死凡人涎潮於心卒然昏倒扶入暖室扶住正坐用火炭沃醋使醋氣衝入病人鼻中良久自醒或搗韭菜汁灌鼻中或用皂角末吹鼻得嚏自醒倉急無藥急於人中穴及兩足大拇指離甲一韭菜許用艾火各灸三五壯即活又痰厥死以巴豆搗爛綿紙包壓取油作捻燒煙燻鼻中片刻吐出痰血即愈或用生半夏末如豆大吹兩鼻凡人卒然昏倒身冷無痰此名氣厥亦名中氣但扶正坐氣順自安或用皂角末吹鼻取嚏尸厥凡男婦奄奄死去脈動無氣氣閉不通名謂尸厥以菖蒲屑納鼻孔中再用肉桂屑放舌下或別取本人左角發燒灰成末和熱酒灌之立愈並以竹管吹其兩耳壓死跌死倉卒無藥急以熱小便灌之免惡血攻心急扶起盤腳坐地以手提其發將生半夏末約豆大吹兩鼻中以生薑汁灌之只要心頭微溫雖至一日亦活再用白糖調水與服散其瘀血或加童便灌之又方回生丹灌之立活魘死原有燈即存燈切不可點燈去照但夜咬其腳跟或咬大拇指而唾其面用生半夏末約豆大吹入兩鼻或用皂角末吹鼻取母雞冠血搽面上干則再搽即醒初聞時不可遽前呼喚但稍動臥處徐徐喚之雷擊死宜禱謝雷神虔心懺悔須戒殺生蚯蚓又名地龍搗融敷臍上半日即活或用回生丹灌之亦可活也中邪死用韭菜心於男左女右鼻內刺入六七寸今目開血出即活或搗韭菜汁灌鼻更視上唇內有如粟米粒者以針挑破取出中寒冬月中寒卒倒身強口噤手足厥冷如無醫藥當濃煎薑湯灌之凡凍死有氣者以灰炒熱盛囊中尉其心頭冷即易之再用薑汁熱酒各半溫服切忌遽以火烘冷與熱爭必死中暑方蒜頭二顆研爛取路熱淨土為末攪新汲井水調勻服一盞立止又方扁豆葉搗汁飲之亦效又方六一散益元散均妙又方暑月行路中暑卒死急以稻草為長帶曲兜肚臍外用熱土圍臍令人溺尿其中即活切勿飲冷水及臥冷地一受寒冷則不救痧症諸方生白礬為末每服一二錢不拘男婦用陰陽水調下各項痧症及受暑昏暈不省人事者服之立可回生此物能升清降濁故奏效如神存人濟人者宜佩帶身旁或路道或深夜可當仙丹又方以生芋艿食之如非痧則生澀難食若是痧則食之味美連食二個即愈尋常腹痛食之亦效又方藿香正氣丸服之穩而且效唯斑痧症即紅斑紅點也萬不可服霍亂症按此症嘔吐難以進藥宜飲烏梅水少許然後服藥極效上吐下瀉者是無論冬夏皆有又有吐而不瀉瀉而不吐者亦是又有吐瀉不出者名乾霍亂治不得法皆不可救也凡遇此症斷不可與飯食即米湯亦不可飲並忌食姜一入口即不救須俟愈後平定久久方可進食些少亦不宜多霍亂諸方食鹽一撮放刀口上燒紅以陰陽水一盅沖服服後腹痛漸止再服藿香正氣丸全愈又方陳皮藿香各五錢黃土澄水二盅煎服雖垂死立生又方細看病人背上如有黑點用針一一挑破出血即愈若遲一日則不能救矣又方白礬末陰陽水調服一二錢神效瘧疾三方按瘧疾口渴不可飲冷茶水及生冷之物犯之其疾更甚唯以薑湯乘熱飲之誠良法也倪涵初曰瘧之為害南人患之北人尤甚弱者患之強者尤甚雖不致遽傷其命然不治則發不已不得其道則惡邪內伏正氣日虛久而久之遂不可藥豫所定三方甚為平易無奇絶不入常山草果等劫劑且不必分陰瘧陽瘧一日二日三日及非時瘧人無老幼病無久近此三方不用加減唯按其次第服之無不應手而愈第一方廣陳皮陳半夏薑汁煮透茯苓威靈仙各一錢蒼朮米泔水浸一日切炒制川朴柴胡黃芩各八分青皮檳榔各六分炙草三分生薑三片井河水各一盅煎九分飢時服渣再煎服如頭痛加自芷一錢此方平胃消痰理氣除濕疏導開先之功受病輕者二服而愈勿再藥若三服後病勢雖減而不全愈用第二方少則三服多則五服第二方生首烏三錢陳皮柴胡茯苓黃芩各八分白朮炒當歸威靈仙各一錢知母鱉甲醋炙研各二錢炙草三分生薑三片井河水各一盅煎八分加無灰酒五分再煎一滾空心服渣再煎服此方妙在補瀉互用虛實得宜不用人參黃耆拼去常山草果平平無奇實有神效即極弱之人纏極重之病十服後立奏奇功萬無一失所云加減一二即不靈應者正此方也第三方人參炒白朮各一錢炙耆當歸各一錢二分陳皮柴胡各八分炙草三分升麻四分首烏二錢知母炒一錢或加青蒿子八分麥芽一錢生薑一片大棗一枚水二盅煎八分半飢時服用三五服元氣充實永不發矣方雖有三方第二方實為主治良方既不刻削亦不峻補是以功獨歸之其第三方專為有力者而設貧家安得有參宜多服第二方可也治瘧神符法按此咒語甚有義理登高山補脾土望海水壯腎水三九三千八百陰陽始終數也河伯肺神也謙屢試神效咒曰登高山望海水水中有一龍三頭九尾不食諸物唯食瘧鬼朝食三千暮食八百食之不足差使來索符藥入五臟瘧鬼須拼跡不伏去者縛送與河怕急急如律令瘧發之日清晨焚符入米飲湯內服之立效三日大瘧惡日前用陽和解凝膏布攤貼背用常山雲苓官桂甘草檳榔各三錢小黑豆四十九粒酒水各二碗慢火煎二碗當晚以一碗先服蓋暖而睡留一碗次日惡前兩時燉熱服蓋暖臥待瘧至即至亦輕亦有當日而愈者愈後忌房事戒食生冷勞碌風霜忌食雞羊牛各蛋白扁豆自慎半月永截不發小瘧減半黃疸又名亞力黃四肢無力黃胖者是一名黃疸痧膽礬不論多少入瓦罐內蓋定炭火煅至白色為末煮棗肉和丸如芡實大每服五丸日三服用好黃酒送下忌食醋及生冷發物若有蠱服之亦吐出神效謙按此方治五疸黃腫功在諸方之上幸勿輕視瘟疫方黃砂糖一杯生薑汁一杯用白滾水一大杯調勻乘熱急服蓋被出汗即愈四時瘟疫皆治又方雷擊散專治瘟疫並治忽然腸痛手足厥逆面色青黑並上吐下瀉霍亂硃砂症以及一切痧症牙皂北細辛各三錢半硃砂明雄各二錢半蕾香三錢枯礬白芷各一錢桔梗防風木香貫衆陳皮蘇薄荷法夏甘草各二錢共研極細末貯瓶中勿泄隨帶身邊凡遇急症取二三分吹入鼻中再用一二錢薑湯沖眼服後安臥片時汗出而愈此方於乾隆元年貴州省疫癘盛行忽于丹平山石壁上雷火擊書此方活人無數道光元年江南各省軟腳痧盛行亦照此方治之神效闢瘟方孔平仲云天行瘟氣宣聖軫念世人遺有良方每年臘月二十四日五更取片花水平旦第二汲者盛淨器中計家中人口多少浸乳香至元旦五更煎水從幼少起至長老每人以乳香一小塊飲水三口咽下則不染時症矣又方貫衆一個白礬一塊放水缸內亦效解救百毒凡解毒藥俱宜冷服大忌飲熱湯飲熱則不可救矣若見酒必死掘地須淨地有黃土地更好三尺深傾水攪成泥水名曰地漿水能解百毒凡食隔夜果餅菜蔬茶水酒漿或飲田塘溪澗井溝之水誤中無名百毒者取飲數碗極為神效愈後戒食鮮魚中水銀毒飲之更妙又方緑豆甘草煎湯能解百毒但覺腹中不快即以生黃豆嚼食不聞氣者中毒也急以升麻五錢煎飲以手探吐亦解解砒霜毒倘無藥處急飲人溺或糞汁均可防風一兩研末冷水調服或用四兩冷水擂汁灌服亦可屢試如神萬無一失又方生緑豆五合擂粉入新汲水攪和絞汁飲之愈解鹽滷毒生豆腐漿冷服二三碗至神至妙又方淘米水冷服三四碗亦效解鴉片煙毒急用活鴨血多多灌之凡服鴉片煙者最為神效若身冷氣絶似平已死如身體柔軟則臟腑經絡之氣尚在流通實本死也乃鴉片烈性醉迷之故耳將其人放在潮濕陰地用筷子撬開牙齒宜用烏梅擦之撬開以筷橫放口內使口常開以白砂糖調冷水灌之外用手帕二三條以冷水浸透放胸前輪流更換又用冷水一盆將頭髮撒放盆內時時換水切不可見太陽一見日照即不可救三四日後鴉片之氣散盡即活如身體不硬雖七日內亦可回生切忌服醬油活後宜多服白砂糖水最效解野菌毒鮮銀花葉搗汁飲之如無鮮者用於銀花濃煎飲之或取地漿水飲三四碗入喉即活如中六畜肉毒以伏龍肝研末水調服服吐即解解螞蝗毒此物入腹久必生子食人肝血腹痛不可忍面目黃瘦不治必死用桂圓肉包煙油吞之即死隨干大便而出屢試神效解食鱓鱉龜蝦諸魚毒淡豆豉八兩水煎冷眼或飲藍靛汁即解或飲橄欖汁及麻油均解解附子烏頭天雄芫花毒防風二錢煎水飲之或用小黑豆緑豆各一升濃煎冷服解飲食毒飲饌中毒倉卒不知何物急以生甘草薺尼等分煎湯飲之入口即活酒醉傷唯燒酒醉傷宜飲鍋蓋上氣流水半盞灌下即醒凡酒醉死者急解醉人頭髮放新汲井水盆內將衣解開用豆腐遍身貼之或用布泡井水貼之少刻再換數次必醒唯寒天不宜又方白蘿蔔汁灌之又酒醉心痛宜服白砂糖三兩淡酒沖服止痛如神酒醉小便不通葛花三錢燈心草七根酒煮服即通人咬傷腫如腫爛宜用童便洗去汙血或用人中黃煎湯洗之人牙一個炭火燒枯鱉頭兩個用瓦焙枯共研末加冰片一分擦上全好瘋犬咬傷倉卒無藥急用百草霜麻油調敷或用蔥搗爛貼之或用牛糞敷之或用米泔水洗淨虎骨煅灰敷之被咬時先看頭頂如有紅髮二三根宜急拔去最為緊要隨於無風處以冷茶洗淨汙血用杏仁搗爛敷之內服韭菜汁一碗隔七日再服一碗四十九日共服七碗傷口上再用煮熟雞蛋白蓋上用艾絨在上燒數十次百日內忌鹽醋一年內忌雞肉魚腥酒色終身忌食狗肉力得保全否則十有九死此葛仙妙方又方虎字符隨地掘一坑取無根水用新羊毛筆攬濃於患處寫一虎字即勾上連圈七圈著虎字又於字中細圈百十數自愈如至六七日頭頂上生紅毛一根即拔去之此方驗過蛇咬傷凡遇毒蛇咬傷惡毒攻心半日必死急取竹杆煙筒內煙油又名煙屎其色如醬用冷水洗去飲一二碗受毒重者其味必甜不辣以多飲為佳傷口痛甚者內有蛇牙多用煙油揉擦必出此為蛇咬第一仙方切不可疑而自誤也又方白芷研末麥冬去心灘煎湯洗之傷口流出黃水待腫消皮合以此藥渣敷之又方蛇纏人身愈纏愈緊最難解脫急令其人在地遍身轉滾蛇自骨軟而解放也神效蜈蚣咬傷一人誤吸蜈蚣腹痛難忍後服生雞蛋數枚而痛稍定復啖生油須臾大吐而出續服雄黃水效以右手中指虛向東方一指即以中指在地上書一日字其日字須要四邊先寫次寫中間一點隨即將中指以大拇指在地上日字中一點之處撮泥少許在患處擦之即刻止痛如神黃蜂傷蚯蚓糞井水調敷效又方咒曰四金剛八菩薩抬的抬插的插一氣誦七遍以右手虛向患處撮於他處神效湯泡火傷急用童便灌之或白砂糖湯調服或服熱蜜水均妙以免火毒攻心切忌用冷水井溝泥等物瓦楞子煅研細末配冰片少許如濕處燥敷於處麻油調搽數次收功又方柳樹燒汁搽或紋銀磨人乳搽愈後均無痕去刺字方用糯米升許將煮成飯時以生甲片須度字影之大小平突入飯鍋上蒸透乘熱將甲片貼上以綢束之周時即愈無痕跌打損傷赤貧無藥者用韭菜汁和童便飲之散其瘀血骨折者蜜和蔥白搗勻厚封酒調白芨末二錢效生地歸身丹皮五加皮乳香沒藥海金砂自然銅共八味各一錢酒水各半煎服無不立效又方番木鱉五斤枳殼二斤半用童便浸番鱉四十九日浸枳殼二十四日半每日換之番鱉去皮枳殼去心用河水洗淨切片再用黃泥拌炒磨末紗篩篩過壯實者每服四五分瘦弱者每服三四分老者每服一二分用無灰酒吞服醉臥輕傷一服即愈重傷三服久傷五六服全愈須每日一服傷若見血敷之即愈腫者用酒調敷如服藥發抖飲薄冷粥一碗即止此方嚴氏傳與華氏制合施送多見奇效回生第一仙方治跌傷壓傷打傷刀傷銃傷割喉吊死驚死溺水死等症雖遍體重傷死已數日只要身體稍軟用此丹灌服少刻即有微氣再服一次即活此方大有起死回生之妙如能施藥傳方救一人之生可全兩人之命造福真無量也活土鱉蟲又名地鱉又名簸箕蟲多生米店有糠之處及碓臼下倉底灶腳冬天灶腳更多或油榨坊並空屋乾燥之處總在鬆土內尋覓取活的去足放瓦上小火焙黃研細用淨末五錢死的不效自然銅同放瓦上炭火內燒紅入好醋內淬半刻取出再燒再淬連制九次研末要親手製用淨末三錢真乳香形如乳頭黃色如膠者為真每一兩用燈草二錢五分同炒枯與燈草同研細吹去燈草用淨末二錢真陳血竭真硃砂飛淨各二錢巴豆去殼研用紙包壓數次去淨油用淨末二錢真麝香三分要當門子以上各藥揀選明淨眼看研極細末收入小口瓷瓶用蠟封口不可泄氣大人每用一分五釐小兒七釐酒沖服牙關不開著打開一齒灌之即活灌時多用水酒使藥下喉為妙活後宜避風調養如心腹疼痛乃瘀血末淨宜服白糖二三兩或酒或水沖服玉真散治跌打損傷無論傷口大小不省人事或傷口潰爛進風即破傷風口眼喎斜手足扯動只要心前微溫用此藥敷傷口有膿者用溫茶避風洗淨再敷另用熱酒沖服三錢不飲酒者滾水沖服亦能起死回生唯嘔吐者難治藥雖平淡功最神奇功在七釐鐵扇諸方之上藥料易廉傳方施藥者功德亦非淺也明天麻羌活防風生南星薑汁炒白芷各一兩白附子十二兩以上藥料須揀明淨眼看研極細末收入小口瓷瓶以蠟封口勿泄如濕爛不能收口用熟石膏二錢黃丹三分共研極細加入敷之當歸湯治跌打損傷未破者功能散瘀活血雖已氣絶打一牙灌之亦活此少林寺教師方也當歸澤瀉各五錢川芎紅花桃仁丹皮各三錢好蘇木二錢酒水各一碗煎六分服頭傷加藁本手傷加桂枝腰傷加杜仲脅傷加白芥子腳傷加牛膝均加一錢按傷口血流不止以精豬肉切厚片貼效或用莫紙灰候冷敷上亦止割頸斷喉急宜早救遲則額冷氣絶乘初割時輕輕扶住抑睡將頭墊起合攏刀口將血拭去急用大雄雞一隻快手輕去其毛剝雞皮乘熱貼傷口內服玉真散自愈愈後雞皮自落按腸出以好醋溫熱不可過熱隨洗隨入外用雞皮乘熱貼之再服玉真散愈後雞皮自落手指砍斷者以老薑嚼融敷之舊棉包裹神效跌打傷筋以韭菜搗爛敷之一宿即愈損傷縮筋年久者用楊梅樹皮曬乾研末以好燒酒調塗用布扎好每日一換三五次全愈接骨法按碎骨在內作膿以田螺捶爛加酒糖和勻敷四圍中留一孔其骨即出杉木炭研極細末用白砂糖蒸極融化將炭末和勻攤紙上乘熱貼之無論破骨傷筋斷指折足皆治忌食生冷發物屢試神效又方古銅錢燒紅入醋淬之再燒再淬連制七次研末用酒沖服二錢重者三錢其骨自接真神方又方活螃蟹二隻生搗爛滾酒沖服亦效被毆傷風方荊芥黃蠟魚螵魚螵炒黃色各五錢艾葉三片用無灰酒一碗煮一炷香熱飲汗出即愈唯百日內忌食雞肉耳刀刃損傷一方以陳年石灰研末用韭菜汁拌作膏搭在無日光雨牆上陰乾再研細貯瓶取用極效龍眼核去皮將核搗極細擦之立刻止血定痛收口為刀傷第一藥也杖傷按受傷瘀血注痛以生大黃末薑汁調塗一夜黑者變紫二夜變白急飲童便一碗外用熱豆腐鋪傷處其氣如蒸豆腐漸成紫色再換腐鋪之須得紫色散盡轉淡紅為度中風症倘口開不噤者筋先絶也不治若口開心絶手撒脾絶眼開肝絶遺尿腎絶也即是脫症宜大劑理中湯灌之及灸臍下亦可救十中之一誤服蘇合丸牛黃至寶之類不救用烏梅擦牙齦涎出即開再有皂角半夏末搐鼻取嚏有嚏者肺氣未絶可治宜用三生飲小續命酌服若口開手撤三生飲斷不宜服宜延明醫診視不可忽之風濕癱瘓治風癱腰腿手足疼痛不能起臥等症老楊樹蟲蛀糞干菊花連枝葉梗桑木柴先將房內土地掃淨長五尺外寬三尺外取上三物鋪勻加火燒之以地熱為度掃去灰燼乘熱噴黃酒於地上用干稻草鋪上又噴酒於草再用稻草蓋之將病人脫盡衣褲臥於草上以被蓋之俟出透汗緩緩去被密室避風數日行走如舊傷寒點眼法按此症死於病者少死於醫者多唯宜避風勿食粥飯或飲薑茶勿藥可愈古云傷寒勿藥得中醫正此謂也故用外治法為當粉甘草六分梅冰片四分共研細末病起一日至六日將此藥點男左女右眼角出汗而愈如過七日不論男女兩眼並點神效盜汗五倍子為末津唾和為餅貼臍以布束之一宿即止又方蓮子黑棗各七個浮小麥馬料豆各一分水煎服數次全愈風濕疹子疹乃熱也不可用人參白朮當理血而不宜散血疹初起必發熱口渴狀如紅雲一片與斑相同但斑無頭粒而疹有頭粒如蟲咬之狀用元參三錢當歸二錢升麻甘草各五分葛根一錢水煎眼心火加黃連三分肝火加梔子六分肺火加黃芩麥冬各一分又方生地牛子丹參各三錢荊芥防風木通各錢半石斛連翹各二錢紫草蟬蛻鬱金犀角各一錢西河柳葉五錢水煎服此葉天士方也屢試如神痱子癢痛滑石五錢緑豆四兩研成粉微炒和勻以棉撲之鼠瘡單方文蛤一兩石膏一兩焙枯研末加桐油調用雞毛調搽立效闢水火刀兵法及闢一切凶殺諸邪系孫真人祕傳先叩齒立通先以左手掐鬼目即食指二節卯宮是也咒曰咄某甲左青龍蓋章甲寅右白虎監兵甲申頭上朱雀陵光甲午足下元武執明甲子脾為貴子中央甲辰甲戌急急如津令加入凶喪家將到門首先默誦三遍出門時再誦三七遍永吉無凶闢撲燈蛾法一說別種柴芯亦可取薺菜梗雙手拱執端肅立定咒曰波利瑟叱護生草救度離苦惱須一氣誦七遍橫放盞上或作挑燈杖蟲不飛撲冬夜課讀點燈宜用麻油少加桐油不壞眼睛兼鼠不耗油盞以生薑擦之無滓止火法凡遇火起之處用雞蛋三個每個大頭寫溫字小頭寫瓊字向火焰絶高處盡力擲去誠心口念敷施發潤天尊連擲連念其蛋落處火焰自低熄矣山西黃淡翁所傳食戒牛犬有功千人黑魚謂之地厭均不可食衛生歌曰雁行有序大有義黑魚拱北知臣禮人無禮義反食之天地鬼神皆不喜鱉有頭足不縮者腹有橫紋及有王字卜字紋者足不全者俱有大毒食之殺人蟬魚昂首項下有白點通浮水上者是蛇所化不可食善只尾及蟹獨螫獨目羊一角雞四足白烏烏首烏雞白百叉蝦無須者腹下通黑者凡肉自動者落水浮者著地不沾塵者雞暴死鴨目白者雞鴨卵上有八字紋者六畜自死口不閉者俱有毒不可食諸果異樣者雙仁雙蒂或沉水者均有毒食忌飯落水缸日久生毛食之生疔最宜留心檢點茶不可與韭同食令人耳聾酒醉後飲茶傷腎臟芥菜同鯽魚食發水腫鯽魚同砂糖食成疳蟲棗與魚同食令人腰腹痛豬肉不可與炒豆同食並忌生薑蝦與糖同食食之害人魚同荊芥食之殺人蠟炒雞蛋食之不救柿子同蟹誤食不救緑豆與棐子同食者死蔥蜜食之斷腸夜間茶湯食物未經蓋好恐有蟲毒不可誤飲若遇守宮遺精其中食之不救陰虛無上妙方天一生水命曰真陰真陰不能制火以致心火上炎而克肺金咳嗽者火刑金吐痰者腎水虛泛而為痰如鍋中之水熱甚則騰濕也豈區區草木之功所能濟哉必須取華池之水頻頻吞咽以靜治於無形然後以湯丸佐之庶幾木升火降面成地天交泰之象耳主方在吞津液華池之水人身之金液出敷布五臟灑陳六腑然後注之於腎而為精腎中陰虧則真水上泛而為痰將並華池之水一擁俱出痰愈多而肌愈瘦誠可畏今處一法二六時中常以舌抵上齶令華池之水充滿口中乃正體舒氣以意用力送至丹田口復一口數十乃止此所謂以真水補真陰同氣相求必然之理也每見今之治陰虛專主六味地黃等味以為滋陰壯水之法未為不善而獨不知於本源之水取其點滴以自相灌溉是含真求假不得為保生十全之計此余諄諄為是言也衛生君子尚明聽之愈病法凡人有病如照方醫治即愈大屬妙事若患病危篤醫藥罔效不拘老幼但能放生百萬無不起死回生蓋放生延生事本一貫救死兔死理自不誣無奈世人狃於師巫邪說殺生祀神者頗多言及放生則群笑為迂而不顧世俗皆然鄉農更甚殊不知人之與物知疼覺苦總是一般試思物之將殺而望救何異人之將死而求生乎我能救物命於臨危而我命自必增延於欲絶理固必然報元或爽請以殺生祀神之費用以放生必能勿藥有喜也天醫大帝寶誥混元始祖一氣分真多劫之前積修至道勤苦備悉經緯逾逾深萬法千門罔不斯歷救災拔難除害蕩妖功濟生靈名高玉籍衆真推仰宜有甄陛大悲大願大孝大仁九州都仙太史高明大使雷霆泰省天樞伏魔上相至道玄應神功妙濟掌九天司籍太乙定命注生真君三天按察都檢校普天奏議大夫天醫大帝歷劫度人祖師淨明普化天尊是誥虔誦最為感應如能立願叩禱無不立愈彬薰沐敬刊於上文帝戒魚篇孽海茫茫首惡無如色欲塵寰擾攏易犯唯有淫邪礪山帶河之人坐此亡身喪國繡口錦心之士因茲敗節隳名始為一念之差遂至畢生莫贖何乃淫風日熾天理淪亡以當悲當恨之行反為得汁而衆怒衆賤之事恬不知羞刊淫詞談麗色目注道左嬌姿腸斷簾中窈窕聞正論嫉若仇讎好邪言甘如酒醴或貞節或淑德可敬可嘉乃計誘而使無完行若婢子若僕婦宜憐宜憫何勢逼而致玷終身既令親族含羞又使子孫蒙垢嗟嗟總由心昏濁賢遠佞親豈知天地難容神人共憤或妻女酬償或子孫受報絶嗣之墳墓無非好色之徒妓女之祖宗盡是貪花之浪子當富則玉樓削籍應貴則金榜除名笞杖徙流大辟生遭五等之誅地獄餓鬼畜生役受三途之苦從前恩愛至此成空昔日風流而今安在與其後悔以無從胡弗早思而勿犯謹勸發覺悟之心破色魔之障芙蓉白麵不過帶肉骷髏美豔紅粧乃是殺人利刃縱對如花似玉之貌常存若姊若妹之心未犯者宜防失足曾行者務早回頭更祈展轉流通迭相化導必使在在齊歸覺路人人共出迷津畜德録曰世人無不急於生子亦知生子之道真精交媾氣清精濃溶液成胎故少欲之人恆多子且易育氣固而精凝也多欲之人恆少子且易夭氣泄而精薄也譬如釀酒然鬥水下鬥米則釅且耐久其質全也鬥米倍下水則淡三倍四倍則酒非酒水非水矣其真元少也今人夜夜交媾遍御妾婢精氣妄泄邪火上升邪火愈熾真陽愈枯安能成胎即僥悻生子亦不能育或殤於痘或殤於驚痘者熱毒驚者熱風毒者父母之真精不足風者父母之真氣不固也過此二關稍通人道便有火毒虛損怔忡五癆七傷等症皆由於邪火熾而真陽虛色欲逞而元精竭也昔有人艱於子息醫教於節欲靜攝勿勞心神心靜則精不搖神完則氣不走每妻經淨乃一交媾否則各榻如是半年妻果有娠娠後即異榻足月之後果生男子後來天花三五粒彼求子而廣畜婢妾不知節欲豈有當哉迪吉録曰士子讀書作文辛苦更當節欲蓋勞心而不節欲則火動火動則腎水耗散水不能制火而火愈熾則肺金受傷金又不能生水相剋而傳變為癆擦必至夭亡又曰人終身疾病恆從初婚時起年少興高力強恣情無度不知陰陽禁忌多成癆怯甚者早死纍妻孀苦百年姻眷終身配偶何苦從一月內種一生禍根古人遇子孫將婚必諄諄以此戒之玉峰曰木有根則榮根絶則枯魚有水則活水涸則死燈有膏則明膏盡則滅人有真精保之則壽伐之則夭惜命之士守之戒之
