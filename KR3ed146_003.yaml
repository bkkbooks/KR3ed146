body:
  text: 卷三陽和湯治鶴膝風貼骨疽及一切陰疽如治乳癖乳岩加土貝五錢熟地一兩肉桂二錢去皮研末麻黃五分鹿角膠三錢白芥子一錢薑炭五分生甘草一錢煎服二陳湯治流注初起橘江五錢半夏二錢白芥子二錢炒研茯苓一錢生甘草三分加陽和丸同煎服千金內托湯治乳岩潰者並治一切潰爛紅癰最效陰症忌服黨參或用人參黃耆防風官桂川朴白芷川芎桔梗當歸生甘草分兩隨時斟酌煎服敗毒湯治紅腫成癰初起立消花粉黃芩連翹赤芍銀花歸身各二錢生甘草節一錢水酒各半煎好以醒消丸送下立消唯疔忌用酒煎奪命湯治一切疔毒一切癰腫銀花金線重樓即草河車黃連赤芍澤蘭細辛殭蠶蟬蛻青皮甘草羌活防風獨活分兩隨時斟酌煎服四仁湯治大便燥結叭噠杏仁火麻仁松子仁柏子仁各三錢研末滾水沖蓋俟溫當茶飲用加熱重加甘蔗汁半酒杯瀉熱湯治囊脫黃連六分黃芩歸尾連翹各錢半木通甘草各一錢煎服桂薑湯治喉痛傾刻而起前無毫恙者此虛寒也並治喉瘴一切危急之症肉桂炮姜甘草各五分各研極細末滾水沖灼將碗燉於滾水內再灼慢以咽下立愈但先以鵝毛蘸桐油入喉卷痰痰出服藥更效又去以生川附切片塗以白蜜火炙透黑收貯磁瓶臨用取如粞大一粒口含咽津立愈枸橘湯治子癰枸橘全枚川楝秦艽陳皮防風澤瀉赤芍甘草各錢半煎服龍膽瀉肝湯治牙癰歸尾龍膽草各二錢銀花花粉連翹黃芩各錢半丹皮防風木通知母甘草各一錢煎服清暑湯治一切暑熱頭面生石癤連翹花粉赤芍銀花甘草滑石車前澤瀉各等分煎服外貼洞天膏初起即消潰者亦斂紫銀茶治楊梅結毒惡瘡復發者牛蒡子忍冬藤紫花地丁草白甘菊各等分煎服六味地黃湯治潰精並治一切潰爛不能斂口者立效熟地山藥萸肉澤瀉丹皮雲苓煎服如治遺精刪去澤瀉加入龍骨線魚膠二味十全大補湯外症潰後老年虛弱者服黨參黃耆白芍冬朮肉桂雲苓歸身熟地川芎甘草或生或炙時議分兩隨酌煎服加味四物湯治毒根與保湯同服更妙原方川芎歸身白芍熟地今加人參肉桂炒白芷五味子雲苓生甘草分兩隨酌煎服加味保元湯治解凝斂口並治毒根與四物湯同服原方人參炙草炙耆今加肉桂耆草宜用生忌炙分兩隨酌煎服蘇前湯治纏喉風並治一切喉症蘇子前胡赤芍各二錢甘草桔梗各一錢元參連翹浙貝各錢半煎服赤荊湯治纏喉風並治一切喉症先服蘇前湯次服此方川連甘草各一錢蘇梗牛蒡元參赤芍荊芥連翹黃芩花粉射干防風各錢半煎服銀荷湯治纏喉風並治一切喉症連翹黃芩防風荊芥射干各一錢銀花錢半薄荷八分黃連甘草各五分煎服雙砂湯治骨鯁縮砂草果威靈仙各等分加砂糖少許清水煎服金烏湯治赤眼淹纏杜仲厚朴桑白皮檳榔各一錢不落水雄雞肝一枚去紅筋入白酒釀六兩隔湯燉熱去渣以湯與肝食隔兩日再服一劑立愈以上煎劑陽和丸治一切陰疽初起如紅癰腫痛者忌服肉桂一錢麻黃五分薑炭五分各研細末黃米飯搗爛為丸服之犀黃丸治乳岩橫痃瘰癧痰核流注肺癰小腸癰等症犀黃三分麝香錢半乳香沒藥各去油各一兩各研極細末黃米飯一兩搗爛為丸忌火烘曬乾陳酒送下三錢患生上部臨臥服下部空心服醒消丸治癰腫聖藥立能消腫止痛並治魚肚癰及翻花起肛門久爛不堪者乳香沒藥各去油一兩麝香錢半雄精五錢各研細末黃米板一兩搗爛為丸如萊蔔子大忌火烘曬乾每服陳酒下三錢醉蓋取汗立愈小金丹治一切流注痰核瘰癧乳岩橫痃貼骨疽鱔疒貢頭等症白膠香草烏五靈脂地龍木鱉各一兩五錢為細末乳香沒藥各去油歸身俱淨末各七錢半麝香三錢墨炭一錢二分亦各研細末用糯米粉一兩二錢同上藥末糊厚千捶打融為丸如芡實大每料約二百萬十粒臨用陳酒送下一丸醉蓋取汗如流注將潰及潰久者以十丸均作五日服完以杜流走不定可絶增入者如小兒不能服煎劑以一丸研碎酒調服之但丸內有五靈脂與人參相反斷不可與參劑同日服也五通丸凡大癰生於要緊穴道處將在發威之際服此甚效加與三黃丸間服更妙並治魚肚癰廣木香五靈脂麻黃乳香沒藥俱去油各等分各研細末黃米飯打和為丸如梧桐子大臨用以川芎當歸赤芍連翹甘草煎服送下五錢忌用參劑三黃丸治紅腫熱毒疼痛大癰懸癰楊梅廣瘡結毒等症制軍三兩酒浸隔水蒸軟打爛如泥乳香沒藥俱去油各一兩雄精五錢麝香錢半犀黃三分各為細末千捶為丸如梧仁大曬乾每服五錢連服十次立愈子龍丸治瘰癧初起並治橫痃貼骨疽如瘰癧淡薑湯送下甘遂大戟各研細粉白芥子炒研細粉各等分煉蜜為細丸每日服三次每次服三分但甘遂與甘草相反斷不可同日服之梅花點舌丹治紅腫癰癤初起一丸即消熊膽冰片腰黃硼砂爪竭葶藶沉香乳香沒藥各一錢破大珠子三錢牛黃麝香蟾酥人乳化硃砂各二錢各研細末為丸如胖緑豆大金箔為衣每服一丸以蔥白打碎陳酒送下醉蓋取汗飛龍丹即蟾酥丸小癤立愈白疽忌用寒水石蟾酥酒化蜈蚣去足各三錢血竭乳香沒藥雄精膽礬銅青殭蠶全竭酒炒穿山甲各一錢紅砒枯礬硃砂冰片角刺輕粉各三分蝸牛二十一個各研細末以酒化蟾酥為丸金箔為衣大如緑豆蔥白包一丸酒送醉蓋取汗代刀散立穿一切外症角刺炒黃耆各一兩生甘草乳香各五錢各研細末陳酒送下每服三錢峒丸治跌打損傷腫毒危重之症內服外敷皆效峒二字外國地名牛黃冰片各二錢半阿魏雄黃各一兩生軍乳香沒藥兒茶天竺黃血竭參三七各二兩各研細末以山羊血五錢半曬乾透再磨為粉加藤黃二兩隔水煮透去浮膩丸如芡實大曬乾忌火烘以黃蠟為殼包裹臨用以一丸陳酒送服護心散治毒氣攻心並治狗咬緑豆粉一兩乳香五錢去油燈心炭三錢共研細末生甘草一兩煎濃汁攪調藥末令病者時刻呷咽咽至大半自然止嘔邪氣清爽接服醒消丸立愈角刺粥治橫痃角刺末六錢糯米二合布袋同盛煮粥如有鮮角當用膏二錢同糯米煮粥日食至愈鮮角膏見敷藥門白芷散治乳痛乳癤乳香沒藥各去油白芷浙貝歸身各等分為末陳酒調服每服五錢醉蓋取汗洞天救苦丹治一應久爛不堪並瘰癧乳癰乳岩潰爛不堪者有子蜂窠露天者佳尖鼠糞樹楝子立冬後者佳青皮各等分炙研細末每服三錢陳酒送下隔二日再服愈大棗丸治久爛不堪將見內腑者服之立效並治瘰癧並治護膜托裡山羊屎炒存性大棗頭去皮核和勻分兩以好丸為度每服四錢用黑棗湯送下神仙棗治患瘡日久體虛如瘡最重者外敷瘡藥內服此方更力速效銀花歸身各一兩甘草三錢乳香去油五倍子黃耆白殭蠶白芷各五錢用水六碗煎剩一半取渣再以水六碗煎至一半共成六碗去渣代水以紅棗二斤煮熟四五日食完紅棗丸治瘡臌大紅棗子四兩去皮核先煮三滾以棗湯洗淨殭蠶曬乾淨末二兩二味打和為丸以紅棗湯送下愈瘡棗治瘡症紅棗三斤豬板油一斤陳酒三斤共入砂鍋煮乾加水三斤煎至一半不時取食暑天五六次愈雪梅丸治喉癬冰片犀黃各一分膽礬雄精硼砂山豆根兒茶各八分白梅二枚共打為丸均含十日聖靈丹治楊梅結毒廣瘡等症珍珠犀黃冰片各一錢的乳石二錢琥珀四錢劈砂三錢研粉和飛面四兩各研極細勻和每服五分土茯苓湯調含再以湯送下回疔散治一切疔走黃有子土蜂窠一兩蛇蛻一條不經地上者佳泥裹煅存性研細末白湯送下二錢杜痔丸治外痔地骨皮生地各三兩黃芩丹皮各一兩五錢槐花焦蒼朮各一兩焦黃柏甘草各五錢共為細末白蜜為丸早晚每服五錢白湯送下雙鱉丸治痔管使其自出苦參四兩川連二兩酒炒當歸槐花畢澄茄各一兩五倍子五錢六味共為細末另以馬蹄鱉二枚每重八九兩柿餅四兩二味水煮去鱉骨搗爛入前藥末打和為丸空心每服四錢白湯送下其管自出退管散治漏管自出或服雙鱉丸亦可黃荊條上子炙燥為末每服五錢拌黑糖陳酒送下至管出乃止以上丸散一筆消治癰癤白疽忌用大黃二兩藤黃一兩明礬蟾酥各五錢麝香乳香沒藥各二錢用蝸牛打爛作錠曬乾滴醋研磨以新筆蘸藥空患頂圈圍患處至消乃止拔釘線治一切疔毒番砂白丁香輕粉乳香蜈蚣各一錢瓜竭麝香各二錢金頂砒六分均研細末以蟾酥一錢酒化和打為丸作短線形刺疔出血插入疔孔平安餅治毒根凸起烏梅肉一錢輕粉五分同研不見粉亮為度加硬用津潤之斷不可用水研至成膏照患口大小作薄餅兒個以貼毒根外用膏掩口易一次俟毒根不痛落下乃止雄腦散治瘰癧敷藥樟腦腰黃各等分共研細末麻油調敷每日以荊芥根煎湯洗合掌散治遍身癩疥瘡毒並治陰囊癢繡球風硫黃一兩鐵鏽一錢紅砒六分共研極細如面以蔥汁調和塗大碗內勿使厚薄以碗覆於瓦上取艾置碗下熏藥熏干敲碗聲與空碗無異為度將藥刮下再研極細臨用以右手中指羅門拈滿香油在包內黏藥塗入左手心中兩手合掌數摩只有藥氣不見藥形以兩手掌擦瘡每日早晚二次三日掃光再擦三四日永不復發二美敏治癩疥膿窠間雜者吳茱萸焙硫黃各等分研極細如面照前合掌散法以香油蘸藥入左手心合掌摩擦每日二次愈後再擦三四日不發五美散治膿窠坐板濕毒臁瘡疳等症炒透東丹皮脂各一兩硫黃雄精各三錢輕粉一錢共為細末入洞天嫩膏調敷外以棉紙掩幫不可動揭五日後揭下再敷一二次全愈如濕毒癢極先以金銀散敷上次以前膏加敷金銀散治惡瘡極癢硫黃一兩入銅器化熔銀硃五錢入硫攪勻離火倒油紙上冷透取研極細滴醋調敷止癢如破爛爛孔癢極者白蜜調敷掃雪散治癩痢瘡獨核肥皂分開去核以洋糖填人巴豆仁每爿加二粒半將皂仍舊合好扎緊泥裹入火煅取出去泥研細加入輕粉檳榔末各八分再研香油調敷剃頭後以滾灰湯洗以藥敷至愈乃止金霜散亦名杏仁散治不癢惡瘡杏仁三錢去皮尖雄黃錢半輕粉一錢研末豬苦膽調敷癬酒治一切諸癬本地白槿皮南星檳榔各一兩樟腦生木鱉各五錢斑蝥三十個蟾酥三錢上藥浸滴花燒酒一斤凡癬症三日一剃一拂至愈乃止蜈蚣油治蛀髮癬活蜈蚣三條菜油浸三四日先取生木鱉片浸數日入鍋煮透取湯洗髮洗後取蜈蚣油搽頭至愈方止或取草烏切片炙脆研細醋調日搽三次數日全愈結子油治頭面肥瘡白明礬研粉鋪棉紙上卷作長條打成結子兒個入菜油內浸透取油結子放鐵篩上用火燒結子內所滴下油仍滴於所浸油碗內燒至焦枯以諸結研粉加制松香末約一半共調油內日以拂瘡早晚兩次五六日愈戒食豬肉蝦蟹並忌煎炒熬油發毒等物食則延開難愈錦線油治湯火燙當歸生軍各一兩共為細末麻油調敷立愈紅油治鵝掌風及一切瘋症紅砒一錢敲細如棲以麻油一兩煎至砒枯煙絶為度去砒留油凡有瘋之處每日以烘油擦二三次乃愈刻歡丸治風火牙痛亦名過街笑蟾酥酒化透五靈脂麝香各一錢研和為丸約二百粒新綢包好絲線扎緊固藏勿泄香氣每取一丸咬於痛牙丸化即愈香清餅治小兒口疳生香附生半夏各等分共為細末蛋白調作餅貼男左女右湧泉穴一周時愈如小兒口內生毒塊不能食乳俗名螳螂子用生地酒浸打爛塗男左女右足心自愈水金散治舌上出血並治鼻衄白茅根車前子血餘各等分為末吹擦即止以此煎服治尿血鼻衄加龍骨末吹鼻立止五寶散治生肌長肉人指甲五錢紅棗去核逐枚包入指甲以長髮五錢細扎同象皮薄片瓦上炙成圓脆存性取出研粉加麝香一錢冰片三分研細和勻瓷器固貯臨用少許摻膏上神效推車散治多骨自出推車蟲即蜣螂炙研末每一錢人乾薑末五分再研極細吹入孔內次日骨出若吹過周時不痛者無骨出矣則知內無多骨也山蓮散治潰爛不堪者大活鯽魚一條去肚雜以山羊屎填實瓦上慢火炙乾存性研末加麝香一錢再研固貯如潰爛不堪與內腑止隔一膜者摻上立效象皮散治爛孔極大者並治刀傷跌損血出不止者豬身前蹄扇骨十兩煅炭研粉象皮炙炭存性研研末一兩和勻固貯凡爛孔如掌大者摻上收小後用六和散敷六和散治爛孔收小者海螵蛸水飛龍齒象皮炙存性研極細瓜竭乳香輕粉各等分共研細末收貯或用雞蛋熬油調拂紫金錠消癰腫通節竅消熱痰山茹菰去皮淨文蛤去末淨各三兩麝香一兩二錢千金子去油淨大戟洗淨焙各一兩共為極細末老米糊勻入臼千杵成膏作錠好醋磨塗並化服勝金散治潰爛並斧破傷人參三七研極細末塗患消腫止痛患濕者乾摻五音錠治紅腫惡毒白疽忌用雄黃熊膽京墨硃砂各一錢麝香五分牛黃一分各研細末先將京墨用酒少許化之再入雄膽研膩後入諸末共研作錠臨用以清水磨以新筆蘸藥空頭圍患處全消無不神效觀音救苦丹治小癤疼痛硫黃三錢硃砂二錢共研細末入銅器熔化離火加入麝香一錢調和澆油紙上取作為米粒大如遇小癤取一粒放患頂以燃火點立刻燒過膏掩次日愈拔毒散拔一切毒巴霜雄黃麝香各一錢冰片五分共為細末摻膏上貼之則毒氣盡拔便無後患胎前産後之婦忌用消管方治漏管角刺尖炙柘樹膜各淨膜五錢炙紅腹金錢鱉炙淨末三錢蟾酥榆面各一錢研極細末臨用以棉紙作條子量其管之深淺以津拌藥末卷上塞入管中乃愈枯痔藥治痔漏明礬一兩紅砒各三錢共入陽乘罐內外圍炭火燒至礬熔煙起即砒毒忌立上風聞氣俟煙盡礬枯去炭次日取出研粉每取一錢加水飛硃砂一分再研和勻臨用以津調藥時拂乃愈槐梅膏治外痔蘇合油槐花粉各一兩猩膽冰片各五錢研和加嫩膏一兩五錢再研封固勿使泄氣臨用塗患處痛息日塗兩次內服杜痔丸鮮角膏治陰頑惡癬並治橫痃五月初旬取鮮皂角數斤打爛入鍋煮湯煎濃瀝出易水再煎二三度出渣以汁共歸一鍋漫煎成膏治橫痃煮糯米粥飲治頑癬加醋熬至稠膩洗剃後塗日剃日塗神效異常四妙膏治甲疽狼毒一兩黃耆二兩醋浸一宿入豬油五錢微火煎熬取二兩絞去渣退火氣以封患口日易三次毒消口斂麝蘇膏治一切大癰麝香當門子更佳蟾酥五錢天嫩膏八兩五靈脂雄黃乳香沒藥各一兩蘇合油二兩各藥研為細末與蘇合油嫩膏攪勻極和空頭塗圍患處如干以雞毛潤灑拂之神效內服醒消丸立愈扎藥治癰腫能拔毒止痛唯紅腫非不得已而用之白疽忌用萆麻仁打爛如泥以絹包好扎於患處唯無孕婦及男子患陽症者可扎痛止即去他如千槌膏有篦麻仁鯽魚膏有巴豆二物提拔之力甚狠孕婦貼則墜胎白疽貼則成患敷藥治楊梅結毒人指甲血餘瓦上炙存性研細每粉一兩加麝香一錢再研日敷如初發以三黃丸每日五鼓時取四錢熱陳酒送下醉蓋取汗或以瀉肝湯每日早晚輪服以上敷藥壁錢散治熱症喉痛六七月中取有子壁窠七個老壁二個以發扎好用明礬七分熔化將扎好之壁入熔礬中黏足燈火炙透研粉吹喉立愈珍珠散治牙疳牙根紅腫口喉等症硼砂雄精川連兒茶人中白冰片薄荷黃柏各等分大破珍減半各為極細末以刀點之吹之立效赤霜散治走馬牙疳延爛穿腮不堪危險者紅棗一枚去核入如黃豆大紅砒一粒絲線扎好放瓦上炙煙盡為度取以悶熄冷透研細加入冰片一分再研吹之速效久爛之孔生肌亦速南星散治牙蝕因患骨糟風所致並透骨穿腮南星一枚挖空入雄黃一塊面白粉固火炙俟雄熔以杯合定冷透去面加麝香少許共研細拂患處數日愈固齒散治齒牙動搖用鼠之頭骨及鼠牙鹽煅存性研細擦之即收上最固最利也取齒丹取牙立落活鯽魚一條約十兩重白砒一錢入魚腹懸之無貓犬及無風雨處七日後魚身發白毛雞羽拂下以膏藥滋少許收拌每遇病牙以膏藥少許貼於患齒片刻落下淨湯漱口四黃散治口舌之症二冬散犀黃散亦皆治口舌荊芥山梔大力黃連黃芩連翹薄荷木通蒲黃各一錢燈心一撮甘草四分共研細末擦患處立愈二冬散治口舌生疳久患不愈天冬麥冬各去心元參各等分研油末為丸含齒舌間丸化即愈犀黃散治舌硬生衣牙關不開犀黃一分硃砂一分元精石二兩和勻研極細末吹之立愈燈心散治骨鯁立愈活竹一段留兩頭節一節上刻一眼以燈心塞實仍封固眼裹濕草紙火煨取出俟冷剖開去竹炭取燈心炭研細吹三四次即愈再服雙砂湯更妙停耳散治耳內有膿作痛鮮鰉魚胸中枕骨俗呼鰉魚牙齒煅研每一兩重加冰片一錢先卷干膿水吹三四次立愈以上吹藥陽和解凝膏治一應陰疽流注潰爛不堪及凍瘡毒根等症未潰者一夜全消已潰者三張全愈瘧疾貼背心立愈鮮大力子梗葉根三斤活大風仙梗四兩大麻油十斤先煎至枯去渣次日用川附桂枝大黃當歸肉桂官桂草烏川烏地龍殭蠶赤芍白芷白蘞白及各二兩川芎四兩續斷防風荊芥五靈脂木香香櫞陳皮各一兩再煎藥枯瀝渣隔宿油冷見過斤兩每油一斤用炒透桃丹七兩攪和明日文火再熬至滴水成珠不黏指為度以濕草紙掩火移鍋於冷處將乳香沒藥末各二兩蘇合油四兩麝香一兩研細入膏攪和極勻出火氣半月後攤貼洞天鮮草膏治一切熱毒癰癤乳癰紅腫等症大麻油三斤先熬壯年頭髮一斤熬至發枯浮去渣再用活牛蒡蒼耳草根葉忍冬藤馬鞭草仙人對坐草各鮮草各一斤再另用油十斤將各草熬枯瀝出再以白芷甘草五靈脂當歸各八兩入鍋熬至藥枯出渣俟冷併入前煎頭髮油每油一斤用當時炒透桃丹七兩加入攪勻熬至滴水成珠不黏指為度離火俟退火氣以油紙攤貼又嫩膏照前製法每油一斤入炒透桃丹四兩熬至黑色為度白玉夾紙膏治夾棍瘡杖傷刀斧傷槍棍損傷為效甚速麻油四兩熬成珠加制好松香五錢白蠟黃蠟各二錢半再熬去煙沫用絹瀝清一加輕粉一兩研細二加冰片分三加麝香三分隨攪隨加勻極增雞蛋白一個再攪勻磁瓶貯蠟封口聽用如過兩月後藥干無用矣化核膏治瘰癧結核惡核貼之即消倘毒根不除必以子龍丸日服三次外貼此膏方可除根以杜後發壁虎十四條蜘蛛二十八個蝸牛三十六枚大麻油四斤熬枯三物浮於油麵撈去再入首烏藤葉甘菊花根簿荷牛蒡蒼耳等草俱用鮮者各半斤武火熬至草枯出渣俟冷再入連翹元參苦參白蘞白芥子殭蠶水紅子仁各打碎大黃荊芥防風各四兩浸一宿再熬至黑枯以油瀝清見過斤兩熬至滴水不散將另制木鱉油歸入配炒透東丹慢入慢攪攪勻文火再熬熬至滴水成珠加入丁香油二錢麝香二錢蘇合抽一兩攪勻退火氣攤貼白花膏治癢極見骨者並臁瘡孔內發癢者香油一斤青槐枝一百段次第入油熬枯去枝俟至滴水不散加入蠟澱粉各一兩五錢離火溫時再下制淨乳香沒藥兒茶白花蛇各三錢潮腦一兩麝香一錢同油攪勻成膏浸水內一宿攤貼紫微膏治生肌收口香油四兩燭油黃蠟各一兩五錢熬至滴水不散離火入炒鉛粉三兩再入輕粉乳香沒藥阿魏白蠟雄黃龍骨珍珠各五錢兒茶六分攪勻遠火再入麝香五錢成膏聽用以此生肌收口最效咬頭膏咬穿毒頭神效銅青松香乳香沒藥杏仁生木鱉粉萆麻仁各等分巴豆不去油倍用共打成膏每兩膏內加入白砒一分再攪勻臨用取緑大一粒放患頂用膏掩之潰即揭下洗淨換膏貼之胎前産後忌用烏金膏治爛腿日久不愈者烏鉛每一斤用白砒三錢熔化次日鉛面刮下者名曰金頂砒再以鉛熔澆薄如紙片照患孔大小剪如膏藥一方針刺二三十眼取光面貼孔上每日煎紫花地丁草湯洗孔並洗膏二次三日內毒水流盡色變紅活以水飛伏龍散摻上仍用前膏貼外戒多立行走房事食毒物凡婦人須待月信之後貼起以上膏藥見全生集均林屋山人經驗方也護膜托裡丸治一切惡毒服之護膜托裡使毒不攻心黃蠟二兩白礬一兩先將蠟熔化候稍冷入礬末和勻為丸酒送每服十丸二十丸漸至百丸若再加雄黃少許更佳或為毒蛇蟲犬所傷並宜服之拔管散治一切毒爛成管者推車蟲二個乾薑三分共研極細加冰片一和勻臨用以棉紙作緊條子入香油浸透取出以拌藥末卷上塞入管中外用膏藥掩之乃愈天然透邪丹治感受風寒暑濕及四時不正之氣以致頭痛脹悶鼻塞不通胸膈不舒等症鵝不食草曬乾研細末瓷瓶收貯以蠟封口每用少許吹鼻即刻打嚏氣通而愈功同痧藥冬月用之尤妙再加川芎細辛各等分名撥雲散亦治頭痛風寒脹悶等症並治牙疼以藥末擦之效治盤腸産下子腸不收枳殼三錢水煎服即收又方用醋半盞冷水七分調勻噴婦面三噴三收生化湯治産後兒枕骨痛及惡露不行腹痛等症當歸六錢川芎三錢炮姜桃仁去皮尖甘草炒各五分水煎服若惡露已行腹痛已止減去桃仁多服數劑不妨或以益母草二兩煎湯代水更妙八寶紅靈丹方專治時疫霍亂吐瀉絞腸腹痛面青手冷汗出不止四時感冒頭痛鼻塞寒熱胸脹中暑痧氣等症硃砂水飛二錢雄黃水飛六錢當歸麝香三錢冰片三錢礞石四錢馬牙硝一兩硼砂六錢真金箔五十張上藥共研極細末置瓷瓶內蠟封瓶口勿令泄氣每服一分開水送下孕婦忌服純陽正氣丸方專治感受寒濕痧暑上吐下瀉腹中絞痛四肢闕冷氣閉脈伏霍亂轉筋俗名吊腳痧一切急症每服五分陰陽水送下重者加倍並治水瀉瘧痢等症孕婦虛弱慎勿輕服土藿香官桂陳皮薑製半夏丁香生於術茯苓茅朮米泔水浸土青木香上藥九味生曬燥各為細末各取淨末一兩切不可烘炒加九鳳丹九錢即八寶紅靈丹加一味同藥末和勻用鮮花椒葉煎湯泛丸此丸分兩合九九純陽之數不可增減輕重收藏燥處不可泄氣純陽正氣丸一方道光間湖州沈君得之仙傳合施於人治霍亂吐瀉俗稱吊腳痧者其效如神及後得其方而修合者頗不乏人間有從中謀利者故其方甚祕豫求之多年無從弋獲茲於修水逸士處抄得全方內中八寶紅靈丹寫作九鳳丹注云即紅靈丹加一味詢逸士以所加之味則管然曰此謀利者恐泄露其真特用之以欺世耳蓋所加之味系雷經一部而已經能治病與否豫所未知即不用此亦未必無效茲刊附經驗選祕方後冀傳播遠方以廣仙人救世之心雷經之用與不用修合者自能審處無煩余之多讀也新安胡增彬識
